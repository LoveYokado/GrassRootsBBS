# ./config.toml
# ==============================================================================
# GrassRootsBBS Main Configuration File
#
# This file contains the primary settings for the GrassRootsBBS application.
# Settings are organized into sections (e.g., [webapp], [security]).
# Changes to this file often require a server restart to take effect.
#
# ==============================================================================
#
# ==============================================================================
# GrassRootsBBS メイン設定ファイル
#
# このファイルは、GrassRootsBBSアプリケーションの主要な設定を格納します。
# 設定はセクション（例: [webapp], [security]）ごとに整理されています。
# このファイルを変更した場合、多くはサーバーの再起動が必要です。
#
# ==============================================================================

title = "BicliModel Configuration"

[security]
PBKDF2_ROUNDS = 100000                            # パスワードハッシュのストレチッング数
GUEST_ID_SALT = "korekaranonagaitatakiwosonaeeyo" # 必ずランダムで複雑な文字列に変更してください
ID_MIN_LENGTH = 3                                 #IDの最小文字数
ID_MAX_LENGTH = 20                                #IDの最大文字数
PASSWORD_MIN_LENGTH = 8                           #パスワードの最小文字数
PASSWORD_MAX_LENGTH = 64                          #パスワードの最大文字数
MAX_PASSWORD_ATTEMPTS = 3                         # パスワード最大試行回数
LOCKOUT_TIME_SECONDS = 300                        # アカウントロック時間（秒）
# --- Proxy/VPN/Tor Blocking ---
# trueに設定すると、ip-api.comを使用してプロキシやホスティング経由の接続をブロックします。
# この機能は外部APIへの問い合わせを行うため、パフォーマンスに影響を与える可能性があります。
block_proxies = true
[limits]
mail_subject_max_length = 42                           #メールタイトルの最大文字数
mail_body_max_length = 8192                            #メール本文の最大文字数
bbs_title_max_length = 42                              #掲示板タイトルの最大文字数
bbs_body_max_length = 8192                             #掲示板本文の最大文字数
telegram_message_max_length = 42                       #電報の最大文字数
attachment_max_size_mb = 10                            # 添付ファイルの最大サイズ (MB)
allowed_attachment_extensions = "jpg,jpeg,png,gif,txt" # 許可する拡張子 (カンマ区切り)

[webapp]
# --- WebAppの公開URL設定 ---
# PasskeyやPush通知など、ブラウザのセキュリティ機能で必要になります。
#ORIGIN = "https://synovially-establishable-margherita.ngrok-free.dev"
ORIGIN = "http://localhost:5000" # BBSにアクセスする際の完全なURL (プロトコル、ホスト、ポートを含む)
RP_ID = "localhost"              # Passkeyで使われるドメイン名 (ポート番号は含めない)

# WEBAPP_KEY_PATH removed from here
WEBAPP_BIND_PORT = 50000
MAX_CONCURRENT_WEBAPP_CLIENTS = 4        # WebAppの同時接続可能クライアント数(0で無制限)
WEBAPP_USER = 'user'                     # WebAppのデフォルトユーザー名 (本番環境では変更を推奨)
WEBAPP_PASSWORD = 'pass'                 # WebAppのデフォルトパスワード (本番環境では変更を強く推奨)
LOGIN_PAGE_LOGO_PATH = "images/logo.png" # static/からの相対パス

[site_info]
operator_name = "[事業者名または運営者名]"
server_name = "[あなたのBBS名]"
contact_email = "[連絡先メールアドレス]"
contact_x_url = "[ご自身のXアカウントのURL]"
contact_threads_url = "[ご自身のThreadsアカウントのURL]"
contact_bluesky_url = "[ご自身のBlueskyアカウントのURL]"
contact_mastodon_url = "[ご自身のMastodonアカウントのURL]"

[admin]
# 管理画面へのIPアドレスアクセス制限
ip_restriction_enabled = false # trueで有効化
# 許可するIPアドレス/CIDRのリスト (例: ["192.168.1.10", "192.168.1.0/24", "127.0.0.1"])
allowed_ips = ["127.0.0.1", "::1"]
# 管理画面のURLプレフィックス。セキュリティ向上のため、推測されにくい文字列に変更することを推奨します。
# 例: url_prefix = "/adm-panel"
url_prefix = "/admin"

[push]
VAPID_PRIVATE_KEY = """-----BEGIN PRIVATE KEY-----
MIGHAgEAMBMGByqGSM49AgEGCCqGSM49AwEHBG0wawIBAQQgDKStVK5Dp26dVBne
q1RiwGXyc+BZuhw31P3Tzc2uBomhRANCAASY0ltQ0a2lQeqIGO4dEQ0t2/JZ+DVc
OQOgCjDs+l2FYrvhyqDXUAv+edsZviGsEqSRPv8ZG/nmMfWjnDybyOsp
-----END PRIVATE KEY-----
"""
VAPID_CLAIMS_EMAIL = "mailto:your-email@example.com" # あなたのメールアドレスに変更
NOTIFICATION_COOLDOWN_SECONDS = 60 # 同じルームへの入室通知のクールダウン時間（秒）

[paths]
db_name = "data/bbs.db"                   # DBファイル名
log_dir = "logs"                          # ログファイルの保存先
text_data_yaml = "setting/textdata.yaml"  # BBS内で使われる定型文データ
bbs_mode1_yaml = "setting/bbs_mode1.yaml" # mode1での掲示板の階層設定ファイル
bbs_mode3_yaml = "setting/bbs_mode3.yaml" # mode2,3での掲示板の階層設定ファイル
chatroom_yaml = "setting/chatroom.yaml"   # チャットルームの階層設定ファイル
bbs_sync_config = "setting/bbs.yaml"      # 掲示板同期設定ファイル (BoardManager用)

[scheduler]
# バックアップの自動スケジューリングを有効にするか (true / false)
enabled = true

# スケジュール設定 (cron形式: 分 時 日 月 曜日)
# 以下の例は、毎日午前3時に実行
schedule = "0 3 * * *"

# 保持するバックアップの最大数 (0は無制限)
# これを超えた最も古いバックアップは自動的に削除されます
max_backups = 7

[clamav]
# ClamAVによるウイルススキャンを有効にするか
enabled = true
# ClamAVデーモン(clamd)のホスト名（Dockerコンテナ名）
host = "clamav"
port = 3310

[backup]
# バックアップ関連のパス設定
# パスはプロジェクトルートからの相対パスで指定します
backup_directory = "data/backups"
temp_directory_prefix = "temp_"

# バックアップ対象のディレクトリ (プロジェクトルートからの相対パス)
source_directories = ["data/attachments", "setting"]

# データベースダンプファイル名
db_dump_filename = "dump_{db_name}.sql"

# アーカイブファイル名のフォーマット
archive_name_format = "grbbs_backup_{timestamp}.tar.gz"

# アーカイブ内のルートディレクトリ名フォーマット
archive_root_dir_format = "backup_{timestamp}"

[bbs]
# 掲示板のコマンドループ中のソケットタイムアウト秒数
socket_timeout_seconds = 25
# 記事本文の折り返し幅
article_wrap_width = 78
# 返信本文の折り返し幅 (インデントを考慮)
reply_wrap_width = 76

[plugins]
# プラグイン実行のタイムアウト時間（秒）
execution_timeout = 60

[database]
# アクセスログなどをDBに保持する日数。この日数を超えた古いログは自動的に削除されます。
log_retention_days = 90
# 古いログを削除するジョブを実行する時刻 (cron形式)。
# デフォルトは "5 4 * * *" (毎日 AM 4:05)。
log_cleanup_cron = "5 4 * * *"
