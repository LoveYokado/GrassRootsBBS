# chatrooms.yml

# 階層の最上位に位置するチャットルームのカテゴリー定義
categories:
  - id: "chat_free"
    number: 1 # 親階層での表示順
    name: "フリーチャットルーム"
    description: | # カテゴリの概要説明（複数行）
      話題に限定はありません。
      初心者の方からベテランまで、どなたでもお気軽にご参加ください。

    # フリーチャットルーム直下のチャットルーム
    items:
      - id: "chat_free1"
        number: 1 # このカテゴリ内での表示順
        name: "フリールーム１"
        description: "どなたでもどうぞ！"
        type: "room"
      - id: "chat_free2"
        number: 2
        name: "フリールーム２"
        description: "まったりお話ししましょう。"
        type: "room"
      - id: "chat_free3"
        number: 3
        name: "フリールーム３"
        description: "ご自由にどうぞ。"
        type: "room"
      - id: "chat_deep_dive"
        number: 4
        name: "フリー深堀りトピック"
        description: |
          フリーチャットルームの特定の話題を深く掘り下げる場所です。
          議論が白熱しやすい内容はこちらへどうぞ。
        type: "child"
        items:
          - id: "chat_deep_a"
            number: 1
            name: "深掘り部屋A"
            type: "room"
          - id: "chat_expert_discussion"
            number: 2
            name: "フリー専門議論"
            description: |
              さらに専門的なフリーテーマを議論する場です。
              特定の分野に精通した方向け。

            items:
              - id: "expert_room_alpha"
                number: 1
                name: "アルファ専門室"
                type: "room"
            type: "child"
  - id: "chat_specialized"
    number: 2
    name: "専門チャットルーム"
    description: |
      特定のテーマに特化したチャットルームです。
      専門的な知識や情報交換にご利用ください。

    items: # 専門カテゴリ直下のルーム
      - id: "chat_military"
        number: 1
        name: "軍事ルーム"
        type: "room"
      - id: "chat_room_pc_related"
        number: 2
        name: "パソコン関連"
        description: |
          パソコンに関する様々な話題を扱うカテゴリです。
          ハードウェアからソフトウェアまで。
        type: "child"
        items: # パソコン関連直下のルーム
          - id: "chat_pc_gen"
            number: 1
            name: "パソコン全般ルーム"
            type: "room"
          - id: "chat_oldpc"
            number: 2
            name: "オールドPCルーム"
            type: "room"
          - id: "chat_gaming"
            number: 3
            name: "ゲーミングPCルーム"
            type: "room"
          - id: "chat_os"
            number: 4
            name: "OS別ルーム"
            description: "特定のOSに特化した議論はこちら。"
            type: "child"
            items:
              - id: "chat_linux"
                number: 1
                name: "Linuxルーム"
                type: "room"
              - id: "chat_win"
                number: 2
                name: "Windowsルーム"
                type: "room"

# カテゴリに属さない、独立したショートカットや特別なルーム
# 例: 規約違反の報告先、イベント告知専用など
global:
  - id: "chat_fight"
    name: "喧嘩用ルーム"
    description: "議論が白熱した場合の避難所です。ここで好きにやってください。でも後腐れないように。最後は仲直りしましょう"
    type: "room"
  - id: "chat_news"
    name: "最新ニュースについて語る"
    description: "最新のニュースに関する情報交換や議論にご利用ください。"
    type: "room"
