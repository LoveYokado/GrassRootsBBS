      ----------------------------------------------------
      [ALLR] 探索リストを読む
      [ALLW] 探索リストを書く
      [LETR] アンケート処理(未実装)
      [PASC] パスワード変更(未実装)
      [MKBD] 掲示板作成
      [LSBD] 掲示板一覧
      [BDLV] 掲示板R/Wレベル設定
      [DLBD] 掲示板削除
      [REGS] 会員登録
      [DELU] 会員抹消
      [CHGU] ユーザーレベル変更
      [USRL] 会員一覧表示
      [VSET] 設定一覧表示
