hamlet_game:
  title:
    mode_1: |
            ━━━━━━━━━━━━━━━━
            ハムレットゲーム
            ━━━━━━━━━━━━━━━━
    mode_2: |
            ━━━━━━━━━━━━━━━━
            ハムレットゲーム
            ━━━━━━━━━━━━━━━━
    mode_3: |
            ------------
            Hamlet Game
            ------------
  mode:
    mode_1: "=== コネクトゲーム (人間 vs コンピュータ) ==="
    mode_2: "=== コネクトゲーム (人間 vs ヒューリスティックAI) ==="
    mode_3: "=== Connect Game (Human vs Heuristic AI) ==="
  rules:
    mode_1: |
            ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            本ゲームは、{rows} x {cols}の盤上で行う {connect_n} 目ならべです。
            しかし、ゲーム盤は、水平に設置されておりません。
            「幅」と「高さ」からなり、壁のように直立しています。
            よって、下から順に積み上げていかなければなりません。
            禁じ手は一切ありません。
            {connect_n} 以上がならんだり、2方向以上にならんでも有効です。
            すべての石を打ちつくした場合、後手勝ちとなります。
            ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    mode_2: |
            ==================================================================
            本ゲームは、{rows} x {cols}の盤上で行う {connect_n} 目ならべです。
            しかし、ゲーム盤は、水平に設置されておりません。
            「幅」と「高さ」からなり、壁のように直立しています。
            よって、下から順に積み上げていかなければなりません。
            禁じ手は一切ありません。
            {connect_n} 以上がならんだり、2方向以上にならんでも有効です。
            すべての石を打ちつくした場合、後手勝ちとなります。
            ==================================================================
    mode_3: |
            -------------------------------------------------------------------------------------
            This is a Connect {connect_n} game played on a {rows} x {cols} board.
            However, the game board is not placed horizontally.
            It stands upright like a wall, consisting of "width" and "height."
            Therefore, pieces must be stacked from the bottom up.
            There are absolutely no forbidden moves.
            Having {connect_n} or more pieces in a row, or connecting in two or more directions,
            is valid.
            If all pieces are played, the second player wins.
            -------------------------------------------------------------------------------------
  player_info: # このキーは現在未使用
    mode_1: "人間: {symbol_human}, コンピュータ: {symbol_ai}" # このキーは現在未使用
