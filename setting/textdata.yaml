       "キーワード[RETURN]  タイトル検索
       'キーワード[RETURN]  全文検索
       ;ジャンプ先[RETURN]  シグ間ジャンプ
      ━━━━━━━━━━━━━━━━━━━━
    mode_2: |
      --------- メールメニュー ヘルプ ---------
      [↑][K]            : 旧方向へ進む
      [←][H]            : 旧方向へ読み進む
      [RETURN]           : 現在位置を読む
      [→][L][TAB]       : 新方向へ読み進む
      [↓][J][ ]         : 新方向へ進む
      [ESC][E]           :  終了
      [*]                :  削除
      [W]                :  書く
      [R]                :  新方向へ読み続ける
      [T]                :  タイトル一覧
      [?]                :  説明
      --------------------------------------
      番号[RETURN]         番号指定
      "キーワード[RETURN]  タイトル検索
      'キーワード[RETURN]  全文検索
      ;ジャンプ先[RETURN]  シグ間ジャンプ
      --------------------------------------
    mode_3: |
      --- MAIL MENU HELP ---
      j : Next mail (older)
      k : Previous mail (newer)
      Enter: Read current mail
      d : Delete current mail / Toggle delete status
      s : Toggle inbox / sentbox
      w : Write new mail
      h : Display this help
      e : Exit mail menu
      ---------------------------
      Search:
        n : Search by number
        " : Search by subject
        ' : Search by body
      ; : Jump to another sig
