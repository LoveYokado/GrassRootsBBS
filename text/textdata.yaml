# --- ユーザー設定メニュー関連 ---
user_pref_menu:
  header: # メニュー本体の表示
    mode_1: |
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        端末環境設定の説明
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      [1] メニューモード変更
      [2] パスワード変更
      [3] プロフィール変更
      [4] 会員リスト
      [5] 最終ログイン日時仮設定 (未実装)
      [6] 探索リスト登録 (未実装)
      [7] 探索リスト読み出し (未実装)
      [8] 元探索リスト読み出し (未実装)
      [9] 電報受信制限 (未実装)
      [E] 終了
      [H,?]: ヘルプ
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    mode_2: |
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        Terminal Environment Settings
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      [1] Change Menu Mode
      [2] Change Password
      [3] Change Profile
      [4] Member List
      [5] Set Last Login Time (Unimplemented)
      [6] Register Search List (Unimplemented)
      [7] Load Search List (Unimplemented)
      [8] Load Original Search List (Unimplemented)
      [9] Telegram Receive Restriction (Unimplemented)
      [E] Exit
      [H,?]: Help
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    mode_3: |
      ╔═══════════════════════════════════════╗
      ║   USER PREFS                          ║
      ╚═══════════════════════════════════════╝
      [1] CHG MODE
      [2] CHG PASS
      [3] CHG PROF
      [4] MEMBER LIST
      [5] SET LAST LOGIN (N/I)
      [6] REG SEARCH (N/I)
      [7] LOAD SEARCH (N/I)
      [8] LOAD ORIG SEARCH (N/I)
      [9] TELEGRAM RESTRICT (N/I)
      [E] EXIT
      [H,?]: HELP
      ╚═══════════════════════════════════════╝

  # --- メニューモード変更サブメニュー ---
  mode_selection:
    header: # モード選択肢の表示
      mode_1: |
        メニューモードを選択してください:
        [1] モード1 (日本語)
        [2] モード2 (英語)
        [3] モード3 (ANSI)
        [E] キャンセル
      mode_2: |
        Select Menu Mode:
        [1] Mode 1 (Japanese)
        [2] Mode 2 (English)
        [3] Mode 3 (ANSI)
        [E] Cancel
      mode_3: |
        SELECT MODE:
        [1] MODE 1 (JP)
        [2] MODE 2 (US)
        [3] MODE 3 (ANSI)
        [E] CANCEL
    prompt: # モード選択プロンプト
      mode_1: "選択してください: "
      mode_2: "Select: "
      mode_3: "SELECT > "
    confirm_changed: # 変更成功メッセージ (フォーマット文字列)
      mode_1: "メニューモードを {mode} に変更しました。\r\n"
      mode_2: "Menu mode changed to {mode}.\r\n"
      mode_3: "MODE CHANGED TO {mode}.\r\n"
    confirm_failed: # 変更失敗メッセージ
      mode_1: "メニューモードの変更に失敗しました。\r\n"
      mode_2: "Failed to change menu mode.\r\n"
      mode_3: "MODE CHANGE FAILED.\r\n"
    cancel: # キャンセルメッセージ
      mode_1: "メニューモードの変更をキャンセルしました。\r\n"
      mode_2: "Menu mode change cancelled.\r\n"
      mode_3: "MODE CHANGE CANCELLED.\r\n"
    invalid_choice: # 無効な選択肢メッセージ (フォーマット文字列)
      mode_1: "無効な選択です。{valid_choices} のいずれかを入力してください。\r\n"
      mode_2: "Invalid choice. Please enter one of {valid_choices}.\r\n"
      mode_3: "INVALID CHOICE. ENTER {valid_choices}.\r\n"

  # --- 会員リストサブメニュー ---
  member_list:
    search_prompt:
      mode_1: "検索ワードを入力してください (未入力で全件表示): "
      mode_2: "Enter search term (leave blank for all): "
      mode_3: "SEARCH TERM > "
    not_found:
      mode_1: "会員が見つかりませんでした。\r\n"
      mode_2: "No members found.\r\n"
      mode_3: "NO MEMBERS FOUND.\r\n"
    # 会員情報の表示形式はコード側でフォーマットするので、ここでは不要

  #ヘルプ
  help_h:
    mode_1: ""
    mode_2: ""
    mode_3: ""
# --- WHOメニュー関連 ---
who_menu:
  header:
    mode_1: |
      オンラインメンバー一覧 (日本語)
      NAME            COMMENT
      -------------------------------------------------------------------
    mode_2: |
      Online Members List (English)
      NAME            COMMENT
      -------------------------------------------------------------------
    mode_3: |
      ONLINE MEMBERS (ANSI)
      NAME            COMMENT
      -------------------------------------------------------------------
  footer:
    mode_1: |
      -------------------------------------------------------------------
    mode_2: |
      -------------------------------------------------------------------
    mode_3: |
      -------------------------------------------------------------------
  no_members:
    mode_1: "現在オンラインのメンバーはいません。\r\n"
    mode_2: "No members are currently online.\r\n"
    mode_3: "NO ONLINE MEMBERS.\r\n"
  user_info_error: # ユーザー情報取得エラー時の表示
    mode_1: "(ユーザー情報取得エラー)"
    mode_2: "(User info error)"
    mode_3: "(USER INFO ERROR)"

# --- シスオペメニュー関連 ---
sysop_menu:
  header: # メニュー本体の表示
    mode_1: |
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        シスオペメニュー
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      [0] 設定一覧表示
      [1] 各BBSメニューのユーザレベルごとのパーミッション
      [2] ユーザ情報変更メニュー
      [Q] 終了
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    mode_2: |
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        Sysop Menu
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      [0] Show Settings
      [1] Set Permissions for BBS Menus
      [2] User Edit Menu
      [Q] Quit
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    mode_3: |
      ╔═══════════════════════════════════════╗
      ║   \x1b[31mSYSOP MENU\x1b[0m                          ║
      ╚═══════════════════════════════════════╝
      [0] SHOW SETTINGS
      [1] SET PERMISSIONS
      [2] USER EDIT
      [Q] QUIT
      ╚═══════════════════════════════════════╝
  # --- 設定一覧表示 ---
  view_settings:
    header: # 設定一覧表示時のヘッダー
      mode_1: |
        ------------------------------------
        項目名              値 (レベル)
        ------------------------------------
      mode_2: |
        ------------------------------------
        Setting Name        Value (Level)
        ------------------------------------
      mode_3: |
        ╔═══════════════════════════════════╗
        ║   SETTINGS                        ║
        ╚═══════════════════════════════════╝
    no_settings_error:
      mode_1: "設定がありません(または取得エラー)\r\n"
      mode_2: "No settings found (or error)\r\n"
      mode_3: "NO SETTINGS (OR ERROR)\r\n"

  # --- 各BBSメニューのユーザレベルごとのパーミッション ---
  set_permissions:
    header: # メニュー本体の表示
      mode_1: |
        各BBSメニューのユーザレベルごとのパーミッションを設定します。
      mode_2: |
        Set Permissions for BBS Menus
      mode_3: |
        SET PERMISSIONS FOR BBS MENUS
    prompt:
      mode_1: "ユーザレベルを設定する機能を選択してください(bbs,chat,mail,telegram,userpref,who): "
      mode_2: "Select a feature to set user level for (bbs,chat,mail,telegram,userpref,who): "
      mode_3: "SELECT A FEATURE TO SET USER LEVEL FOR (bbs,chat,mail,telegram,userpref,who): "
    user_level_message:
      mode_1: "0:無効 1:ゲスト 2:一般ユーザ 3:シグオペ 4:サブオペ 5:シスオペ\r\n"
      mode_2: "0:Disabled 1:Guest 2:User 3:Moderator 4:Sub Operator 5:System Operator\r\n"
      mode_3: "0:DISABLED 1:GUEST 2:USER 3:MOD 4:SUBOP 5:SYSOP\r\n"
    user_level_prompt:
      mode_1: "ユーザレベルを入力してください: "
      mode_2: "Enter user level: "
      mode_3: "ENTER USER LEVEL: "
    user_level_0-5_message:
      mode_1:"ユーザレベルは0~5の範囲で入力してください\r\n"
      mode_2:"User level must be between 0 and 5\r\n"
      mode_3:"USER LEVEL MUST BE BETWEEN 0 AND 5\r\n"
    user_level_changed:
      mode_1:"{menu_to_change}メニューのユーザレベルを{user_level}に変更しました\r\n"
      mode_2:"{menu_to_change} menu's user level changed to {user_level}\r\n"
      mode_3:"{menu_to_change} MENU'S USER LEVEL CHANGED TO {user_level}\r\n"

  # --- ユーザー編集サブメニュー ---
  user_edit:
    header: # ユーザー編集メニュー本体の表示
      mode_1: |
        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          ユーザ情報変更メニュー
        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        [1] ユーザ一覧表示
        [2] ユーザー情報変更 (未実装)
        [3] ユーザー追加 (未実装)
        [4] ユーザー削除 (未実装)
        [Q] 終了
        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      mode_2: |
        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          User Edit Menu
        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        [1] Show User List
        [2] Change User Info (Unimplemented)
        [3] Add User (Unimplemented)
        [4] Delete User (Unimplemented)
        [Q] Quit
        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      mode_3: |
        ╔═══════════════════════════════════════╗
        ║   USER EDIT MENU                      ║
        ╚═══════════════════════════════════════╝
        [1] SHOW USERS
        [2] CHG USER INFO (N/I)
        [3] ADD USER (N/I)
        [4] DEL USER (N/I)
        [Q] QUIT
        ╚═══════════════════════════════════════╝
    user_list_header: # ユーザー一覧表示時のヘッダー
      mode_1: "ID   NAME         LEVEL  REGIST DATE          LAST LOGIN           COMMENT      MAIL\r\n------------------------------------------------------------------------------------------"
      mode_2: "ID   NAME         LEVEL  REGIST DATE          LAST LOGIN           COMMENT      MAIL\r\n------------------------------------------------------------------------------------------"
      mode_3: "ID   NAME         LEVEL  REGIST DATE          LAST LOGIN           COMMENT      MAIL\r\n------------------------------------------------------------------------------------------"
    no_users:
      mode_1: "ユーザがいません。\r\n"
      mode_2: "No users found.\r\n"
      mode_3: "NO USERS.\r\n"
    user_list_error:
      mode_1: "ユーザ一覧表示中にエラーが発生しました。\r\n" # フォーマット文字列
      mode_2: "An error occurred while displaying user list.\r\n"
      mode_3: "USER LIST ERROR.\r\n"
  exit_sysop_menu:
    mode_1: "シスオペメニューを終了します。"
    mode_2: "Exiting sysop menu."
    mode_3: "EXITING SYSOP MENU."

# --- メールメニュー関連 ---
mail_menu:
  main_prompt:
    mode_1: "選択してください([W]送信 [R]受信 [L]一覧形式受信): "
    mode_2: "Select ([W]rite [R]ead [L]ist Inbox): "
    mode_3: "SELECT ([W] [R] [L]): "
  sender_header: # 受信箱ヘッダー
    mode_1: "-NUM-  -R.DATE- -R.TIME- -SENDER-  -MAIL-"
    mode_2: "-NUM-  -R.DATE- -R.TIME- -SENDER-  -MAIL-"
    mode_3: "-NUM-  -R.DATE- -R.TIME- -SENDER-  -MAIL-" # ANSIでも同じで良いか要検討
