    mode_2: "No members are currently online.\r\n"
    mode_3: "NO ONLINE MEMBERS.\r\n"
  user_info_error: # ユーザー情報取得エラー時の表示
    mode_1: "(ユーザー情報取得エラー)"
    mode_2: "(User info error)"
    mode_3: "(USER INFO ERROR)"

