      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    mode_3: |
      +-----------------------------------------------------------------------+
      | Command | Description                                                 |
      +---------+-------------------------------------------------------------+
      | A       | Auto Board Scan: Reads configured search path automatically |
      | B       | Bulletin Board: Access the BBS system                       |
      | C       | Live Chat: Join real-time chat rooms                        |
      | E       | Logoff: Exit the GRBBS system                               |
      | H, ?    | Help Desk: Display this help menu                           |
      | L       | Online Signup: Register new users                           |
      | M       | Mailbox: Check your messages                                |
      | N       | New Article Hunt: Read only new info from search path       |
      | O       | New Article News: View new entry headlines                  |
      | S       | Sysop Menu: Admin controls (Sysop+ only)                    |
      | T, #    | Telegram: Send quick messages                               |
      | U       | User Preferences: Customize terminal settings               |
      | W       | Online Crew: List active members                            |
      | X       | Full SIG Search: Scan all corners automatically             |
      | Z       | Hamlet Game: Play 2D 4-way adventure                        |
      +---------+-------------------------------------------------------------+
  help_q:
    mode_1: |
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        メインメニューの説明
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        [A] 自動ダウンロード       (設定された探索経路を自動的に読み出します   )
        [B] 電子掲示板             (文章を読み書きするコーナーです             )
        [C] チャット               (会員同士でおしゃべりをするコーナーです     )
        [D] *書籍ﾃﾞｰﾀﾍﾞｰｽ          (出版物のデータベースです                   )
        [E] 終了                   (アクセスを終了します                       )
        [H] ヘルプファイル         (このネットのマップを表示します             )
        [L] オンラインサインアップ (入会のためのアンケートに答えます           )
        [M] メールボックス         (会員同士が電子郵便を送ります               )
        [N] 新アーティクル探索     (探索経路から新しい情報だけを読み出します   )
        [O] 新アーティクル見出し   (探索経路から新しい見出しだけを読み出します )
        [P] *プログラムコーナー    (プログラムやデータを蓄積するコーナーです   )
        [Q] *企業内BBSサンプル     (企業内BBSのサンプルです                    )
        [#] 電報                   (BIG-Modelお試し版では使えません            )
        [U] 端末環境変更           (通信する環境を変更する                     )
        [W] アクセス状況通知       (現在アクセスしている会員を調べます         )
        [X] 全シグ探索             (すべてのコーナーを自動的に読み出します     )
        [Z] ハムレットゲーム       (２次元４目並べ                             )
        [?] ヘルプ                 (この文章を表示します                       )
