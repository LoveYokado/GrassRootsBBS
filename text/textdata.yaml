# --- ユーザー設定メニュー関連 ---
user_pref_menu:
  header: # メニュー本体の表示
    mode_1: |
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      ○[1] メニューモード変更 [5] 最終ログイン日時仮設定  [9] 電報受信制限           ●
      ●[2] パスワード変更     [6] 探索リスト登録          [10] ブラックリスト編集    ○
      ○[3] プロフィール変更   [7] 探索リスト読み出し      [11] メールアドレス変更    ●
      ●[4] 会員リスト         [8] 元探索リスト読み出し                               ○
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    mode_2: |
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        端末環境設定の説明
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      [1] メニューモード変更
      [2] パスワード変更
      [3] プロフィール変更
      [4] 会員リスト
      [5] 最終ログイン日時仮設定
      [6] 探索リスト登録
      [7] 探索リスト読み出し
      [8] 元探索リスト読み出し
      [9] 電報受信制限
      [10] ブラックリスト編集
      [11] メールアドレス変更
      [E] 終了
      [H,?]: ヘルプ
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    mode_3: |
      +----------------------------------------------------------+
      | Command | Description                                    |
      +---------+------------------------------------------------+
      | 1       | Switch Menu Mode: Change display style         |
      | 2       | Change Password: Update login password         |
      | 3       | Edit Profile: Modify user info                 |
      | 4       | Member List: View registered users             |
      | 5       | Set Last Login: Update login time              |
      | 6       | Register Search List: Save search paths        |
      | 7       | Load Search List: Apply saved searches         |
      | 8       | Load Default Search: Reset to original paths   |
      | 9       | Telegram Restrictions: Limit incoming messages |
      | 10      | Edit Blacklist: Manage blocked users           |
      | 11      | Change Email: Update mail address              |
      | E       | Exit: Return to main menu                      |
      | H, ?    | Help: Display this help menu                   |
      +---------+------------------------------------------------+
  # --- メニューモード変更サブメニュー ---
  mode_selection:
    header: # モード選択肢の表示
      mode_1: |
        メニューモードを選択してください:
        [1] モード1 (Big-Model)
        [2] モード2 (GR-BBS)
        [3] モード3 (GR-BBS English)
        [E] キャンセル
      mode_2: |
        メニューモードを選択してください:
        [1] モード1 (Big-Model)
        [2] モード2 (GR-BBS)
        [3] モード3 (GR-BBS English)
        [E] キャンセル
      mode_3: |
        Select Menu Mode:
        [1] Mode 1 (Big-Model)
        [2] Mode 2 (GR-BBS)
        [3] Mode 3 (GR-BBS English)
        [E] Cancel
    confirm_changed: # 変更成功メッセージ (フォーマット文字列)
      mode_1: "メニューモードを {mode} に変更しました。\r\n"
      mode_2: "メニューモードを {mode} に変更しました。\r\n"
      mode_3: "Menu mode changed to {mode}.\r\n"
    confirm_failed: # 変更失敗メッセージ
      mode_1: "メニューモードの変更に失敗しました。\r\n"
      mode_2: "メニューモードの変更に失敗しました。\r\n"
      mode_3: "Failed to change menu mode.\r\n"
  # --- 会員リストサブメニュー ---
  member_list:
    search_prompt:
      mode_1: "検索ワードを入力してください (未入力で全件表示): "
      mode_2: "検索ワードを入力してください (未入力で全件表示): "
