      S    : シスオペメニュー (Sysop以上)
      W    : オンラインメンバー一覧
      T, ! : 電報送信
      U    : ユーザー環境設定
      M    : メールメニュー
      B    : 掲示板
      C    : チャット
      E    : ログオフ
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    mode_2: |
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        Command List (English)
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      H, ? : Show Help
      S    : Sysop Menu (Sysop+)
      W    : Online Members List
      T, ! : Send Telegram
      U    : User Preferences
      M    : Mail Menu
      B    : BBS
      C    : Chat
      E    : Logoff
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
