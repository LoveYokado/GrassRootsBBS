##
## GrassRootsBBS テキストデータファイル
## このファイルには、各メニューモードに対応した表示テキストが格納されています。
##
## 構造:
## feature_name: # 例: user_pref_menu, sysop_menu, common_messages
##   element_name: # 例: header, prompt, options, messages
##     mode_1: "モード1のテキスト"
##     mode_2: "モード2のテキスト"
##     mode_3: "モード3のテキスト"
##     # 複数行の場合は | または > を使用
##     mode_1: |
##       複数行のテキスト
##       です。
##

# --- トップメニュー関連 ---
top_menu:
  prompt:
    mode_1: "コマンドを入力してください: "
    mode_2: "Enter command: "
    mode_3: "CMD > "
  help_h: # Hキーで表示されるヘルプ
    mode_1: |
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        コマンド一覧 (日本語)
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      H, ? : ヘルプ表示
      S    : シスオペメニュー (Sysop以上)
      W    : オンラインメンバー一覧
      T, ! : 電報送信
      U    : ユーザー環境設定
      M    : メールメニュー
      B    : 掲示板
      C    : チャット
      E    : ログオフ
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    mode_2: |
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        Command List (English)
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      H, ? : Show Help
      S    : Sysop Menu (Sysop+)
      W    : Online Members List
      T, ! : Send Telegram
      U    : User Preferences
      M    : Mail Menu
      B    : BBS
      C    : Chat
      E    : Logoff
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    mode_3: |
      ╔═══════════════════════════════════════╗
      ║   COMMAND LIST (ANSI)                 ║
      ╚═══════════════════════════════════════╝
      H, ? : HELP
      S    : SYSOP (LVL 5+)
      W    : WHO
      T, ! : TELEGRAM
      U    : USER PREFS
      M    : MAIL
      B    : BBS
      C    : CHAT
      E    : LOGOFF
      ╚═══════════════════════════════════════╝
  help_q: # ?キーで表示されるヘルプ (Hと同じ内容で良いか、別途定義するかは要検討)
    mode_1: |
      (Hキーと同じ内容をここに記述するか、参照させる)
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        コマンド一覧 (日本語)
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      H, ? : ヘルプ表示
      S    : シスオペメニュー (Sysop以上)
      W    : オンラインメンバー一覧
      T, ! : 電報送信
      U    : ユーザー環境設定
      M    : メールメニュー
      B    : 掲示板
      C    : チャット
      E    : ログオフ
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    mode_2: |
      (Same as H key)
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        Command List (English)
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      H, ? : Show Help
      S    : Sysop Menu (Sysop+)
      W    : Online Members List
      T, ! : Send Telegram
      U    : User Preferences
      M    : Mail Menu
      B    : BBS
      C    : Chat
      E    : Logoff
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    mode_3: |
      (SAME AS H)
      ╔═══════════════════════════════════════╗
      ║   COMMAND LIST (ANSI)                 ║
