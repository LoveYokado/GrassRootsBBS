# --- 共通メッセージ ---
common_messages:
  select_prompt: # 選択プロンプト
    mode_1: "選択してください: "
    mode_2: "選択してください: "
    mode_3: "Select: "
  invalid_command:
    mode_1: "無効なコマンドです。\r\n"
    mode_2: "無効なコマンドです。\r\n"
    mode_3: "Invalid command.\r\n"
  user_not_found: # ユーザーが見つからない場合の汎用メッセージ
    mode_1: "ユーザー情報が見つかりません。\r\n"
    mode_2: "ユーザー情報が見つかりません。\r\n"
    mode_3: "User information not found.\r\n"
  db_error: # データベースエラーの汎用メッセージ
    mode_1: "データベースエラーが発生しました。シスオペに連絡してください。\r\n"
    mode_2: "データベースエラーが発生しました。シスオペに連絡してください。\r\n"
    mode_3: "A database error occurred. Please contact the sysop.\r\n"
  db_update_error:
    mode_1: "データベース更新中にエラーが発生しました。\r\n"
    mode_2: "データベース更新中にエラーが発生しました。\r\n"
    mode_3: "A database update error occurred.\r\n"
  cancel: # キャンセルメッセージ
    mode_1: "キャンセルしました。\r\n"
    mode_2: "キャンセルしました。\r\n"
    mode_3: "Canceled.\r\n"
  unexpected_error:
    mode_1: "予期せぬエラーが発生したため、切断します。"
    mode_2: "予期せぬエラーが発生したため、切断します。"
    mode_3: "Unexpected error. Disconnecting."
  error:
    mode_1: "エラーが発生しました。シスオペに連絡してください。\r\n"
    mode_2: "エラーが発生しました。シスオペに連絡してください。\r\n"
    mode_3: "An error occurred. Please contact the sysop.\r\n"
  # ... 他の共通メッセージも追加
  confirm_yn:
    mode_1: "よろしいですか? (Y または N): "
    mode_2: "よろしいですか? (Y または N): "
    mode_3: "Are you sure? (Y or N): "
  database_update_error:
    mode_1: "データベース更新中にエラーが発生しました。\r\n"
    mode_2: "データベース更新中にエラーが発生しました。\r\n"
    mode_3: "A database update error occurred.\r\n"
  permission_denied:
    mode_1: "権限がありません。\r\n"
    mode_2: "権限がありません。\r\n"
    mode_3: "Permission denied.\r\n"

# --- 認証関連 ---
auth:
  connect_message:
    mode_1: "** Connect **\r\n\n"
    mode_2: "** 接続 **\r\n\n"
    mode_3: "** Connect **\r\n\n"
  id_prompt:
    mode_1: "ID: "
    mode_2: "ID: "
    mode_3: "ID: "
  password_prompt:
    mode_1: "PASSWORD: "
    mode_2: "PASSWORD: "
    mode_3: "PASSWORD: "
  invalid_credentials:
    mode_1: "IDまたはパスワードが違います。\r\n"
    mode_2: "IDまたはパスワードが違います。\r\n"
    mode_3: "Invalid ID or password.\r\n"
  account_disabled:
    mode_1: "このIDは現在利用できません。\r\n"
    mode_2: "このIDは現在利用できません。\r\n"
    mode_3: "This ID is currently unavailable.\r\n"
  too_many_attempts:
    mode_1: "{max_attempts}回以上パスワードを間違えました。切断します。\r\n"
    mode_2: "{max_attempts}回以上パスワードを間違えました。切断します。\r\n"
    mode_3: "Too many password attempts ({max_attempts}). Disconnecting.\r\n"
  auth_error:
    mode_1: "\r\n認証中にエラーが発生しました。切断します。\r\n"
    mode_2: "\r\n認証中にエラーが発生しました。切断します。\r\n"
    mode_3: "\r\nAn error occurred during authentication. Disconnecting.\r\n"

