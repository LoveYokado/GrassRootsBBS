chat:
  welcome:
    mode_2: "チャットルーム「{room_name}」へようこそ！"
    mode_1: "Welcome to chat room: {room_name}!"
    # mode_3 も同様に
  help:
    mode_2: |
      チャットコマンド:
       行中 [CTRL+C]      - 入力行キャンセル(未実装)
       [CTRL+R]           - 入力行リプリント(未実装)
       ^,行頭[CTRL+C]     - チャットルームを退室します。
       !?,!h              - このヘルプを表示します。
       ![RETURN]          - 電報機能
       !L[RETURN]         - 鍵をかける
       !R[RETURN]         - チャットルームの状況
       !U[RETURN]         - 鍵を開ける
       !W[RETURN]         - 現在のアクセス状況
       上記以外は全てチャットメッセージとして送信されます。
    mode_1: |
      ------------------------------------
       行中 [CTRL+C] 入力行キャンセル(未実装)
       [CTRL+R]      入力行リプリント(未実装)
       行頭 [CTRL+C] チャットルームを退室
       ^[RETURN]     同上
       ![RETURN]     電報機能
       !?[RETURN]    コマンドヘルプ
       !L[RETURN]    鍵をかける
       !R[RETURN]    チャットルームの状況
       !U[RETURN]    鍵を開ける
       !W[RETURN]    現在のアクセス状況
      ------------------------------------
    mode_3: |
      ----------------------------------------------
       In-line [CTRL+C]       Cancel input line (not implemented)
       [CTRL+R]               Reprint input line (not implemented)
       At line start [CTRL+C] Exit chat room
       ^[RETURN]              Same as above
       ![RETURN]              Telegram function
       !?[RETURN]             Command help
       !L[RETURN]             Lock
       !R[RETURN]             Chat room status
       !U[RETURN]             Unlock
       !W[RETURN]             Current access status
      ----------------------------------------------
