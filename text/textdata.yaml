  # --- メニューモード変更サブメニュー ---
  mode_selection:
    header: # モード選択肢の表示
      mode_1: |
        メニューモードを選択してください:
        [1] モード1 (Big-Model)
        [2] モード2 (GR-BBS)
        [3] モード3 (GR-BBS English)
        [E] キャンセル
      mode_2: |
        メニューモードを選択してください:
        [1] モード1 (Big-Model)
        [2] モード2 (GR-BBS)
        [3] モード3 (GR-BBS English)
        [E] キャンセル
      mode_3: |
        Select Menu Mode:
        [1] Mode 1 (Big-Model)
        [2] Mode 2 (GR-BBS)
        [3] Mode 3 (GR-BBS English)
        [E] Cancel
    confirm_changed: # 変更成功メッセージ (フォーマット文字列)
      mode_1: "メニューモードを {mode} に変更しました。\r\n"
      mode_2: "メニューモードを {mode} に変更しました。\r\n"
      mode_3: "Menu mode changed to {mode}.\r\n"
    confirm_failed: # 変更失敗メッセージ
      mode_1: "メニューモードの変更に失敗しました。\r\n"
      mode_2: "メニューモードの変更に失敗しました。\r\n"
      mode_3: "Failed to change menu mode.\r\n"
  # --- 会員リストサブメニュー ---
