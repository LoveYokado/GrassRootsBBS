# --- 共通メッセージ ---
common_messages:
  select_prompt: # 選択プロンプト
    mode_2: "選択してください: "
    mode_1: "Select: "
    mode_3: "SELECT > "
  invalid_command:
    mode_2: "無効なコマンドです。\r\n"
    mode_1: "Invalid command.\r\n"
    mode_3: "INVALID COMMAND.\r\n"
  user_not_found: # ユーザーが見つからない場合の汎用メッセージ
    mode_2: "ユーザー情報が見つかりません。\r\n"
    mode_1: "User information not found.\r\n"
    mode_3: "USER NOT FOUND.\r\n"
  db_error: # データベースエラーの汎用メッセージ
    mode_2: "データベースエラーが発生しました。シスオペに連絡してください。\r\n"
    mode_1: "A database error occurred. Please contact the sysop.\r\n"
    mode_3: "DB ERROR. CONTACT SYSOP.\r\n"
  db_update_error:
    mode_2: "データベース更新中にエラーが発生しました。\r\n"
    mode_1: "A database update error occurred.\r\n"
    mode_3: "DB UPDATE ERROR.\r\n"
  cancel: # キャンセルメッセージ
    mode_2: "キャンセルしました。\r\n"
    mode_1: "Canceled.\r\n"
    mode_3: "CANCELLED.\r\n"
  unexpected_error:
    mode_2: "予期せぬエラーが発生したため、切断します。"
    mode_1: "予期せぬエラーが発生したため、切断します。"
    mode_3: "予期せぬエラーが発生したため、切断します。"
  error:
    mode_2: "エラーが発生しました。シスオペに連絡してください。\r\n"
    mode_1: "An error occurred. Please contact the sysop.\r\n"
    mode_3: "ERROR. CONTACT SYSOP.\r\n"
  # ... 他の共通メッセージも追加
  confirm_yn:
    mode_2: "よろしいですか? (Y または N): "
    mode_1: "Are you sure? (Y or N): "
    mode_3: "ARE YOU SURE? (Y OR N): "
  db_error:
    mode_2: "データベースエラーが発生しました。\r\n"
    mode_1: "A database error occurred.\r\n"
    mode_3: "DB ERROR.\r\n"
  database_update_error:
    mode_2: "データベース更新中にエラーが発生しました。\r\n"
    mode_1: "A database update error occurred.\r\n"
    mode_3: "DB UPDATE ERROR.\r\n"
  permission_denied:
    mode_2: "権限がありません。\r\n"
    mode_1: "Permission denied.\r\n"
    mode_3: "PERMISSION DENIED.\r\n"

# --- 認証関連 ---
auth:
  connect_message:
    mode_2: "** 接続 **\r\n\n"
    mode_1: "** Connect **\r\n\n"
    mode_3: "** CONNECT **\r\n\n"
  id_prompt:
    mode_2: "ID: "
    mode_1: "ID: "
    mode_3: "ID: "
  password_prompt:
    mode_2: "PASSWORD: "
    mode_1: "PASSWORD: "
    mode_3: "PASS: "
  invalid_credentials:
    mode_2: "IDまたはパスワードが違います。\r\n"
    mode_1: "Invalid ID or password.\r\n"
    mode_3: "INVALID ID/PASS.\r\n"
  account_disabled:
    mode_2: "このIDは現在利用できません。\r\n"
    mode_1: "This ID is currently unavailable.\r\n"
    mode_3: "ACCOUNT DISABLED.\r\n"
  too_many_attempts:
    mode_2: "{max_attempts}回以上パスワードを間違えました。切断します。\r\n" # フォーマット文字列
    mode_1: "Too many password attempts ({max_attempts}). Disconnecting.\r\n"
    mode_3: "TOO MANY PASSWORD ATTEMPTS ({max_attempts}). DISCONNECTING.\r\n"
  auth_error:
    mode_2: "\r\n認証中にエラーが発生しました。切断します。\r\n"
    mode_1: "\r\nAn error occurred during authentication. Disconnecting.\r\n"
    mode_3: "\r\nAUTH ERROR. DISCONNECTING.\r\n"

