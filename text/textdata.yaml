# --- ユーザー設定メニュー関連 ---
user_pref_menu:
  header: # メニュー本体の表示
    mode_1: |
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        端末環境設定の説明
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      [1] メニューモード変更
      [2] パスワード変更
      [3] プロフィール変更
      [4] 会員リスト
      [5] 最終ログイン日時仮設定
      [6] 探索リスト登録
      [7] 探索リスト読み出し
      [8] 元探索リスト読み出し
      [9] 電報受信制限
      [10] ブラックリスト編集
      [11] メールアドレス変更
      [E] 終了
      [H,?]: ヘルプ
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    mode_2: |
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        Terminal Environment Settings
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      [1] Change Menu Mode
      [2] Change Password
      [3] Change Profile
      [4] Member List
      [5] Set Last Login Time
      [6] Register Search List
      [7] Load Search List
      [8] Load Original Search List
      [9] Telegram Receive Restriction
      [10] Edit Blacklist
      [11] Change Mail Address
      [E] Exit
      [H,?]: Help
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    mode_3: |
      ╔═══════════════════════════════════════╗
      ║   USER PREFS                          ║
      ╚═══════════════════════════════════════╝
      [1] CHG MODE
      [2] CHG PASS
      [3] CHG PROF
      [4] MEMBER LIST
      [5] SET LAST LOGIN
      [6] REG SEARCH
      [7] LOAD SEARCH
      [8] LOAD ORIG SEARCH
      [9] TELEGRAM RESTRICT
      [10] EDIT BLACKLIST
      [11] CHANGE MAIL
      [E] EXIT
      [H,?]: HELP
      ╚═══════════════════════════════════════╝

  # --- メニューモード変更サブメニュー ---
  mode_selection:
    header: # モード選択肢の表示
      mode_1: |
        メニューモードを選択してください:
        [1] モード1 (日本語)
        [2] モード2 (英語)
        [3] モード3 (ANSI)
        [E] キャンセル
      mode_2: |
        Select Menu Mode:
        [1] Mode 1 (Japanese)
        [2] Mode 2 (English)
        [3] Mode 3 (ANSI)
        [E] Cancel
      mode_3: |
        SELECT MODE:
        [1] MODE 1 (JP)
        [2] MODE 2 (US)
        [3] MODE 3 (ANSI)
        [E] CANCEL
    prompt: # モード選択プロンプト
      mode_1: "選択してください: "
      mode_2: "Select: "
      mode_3: "SELECT > "
    confirm_changed: # 変更成功メッセージ (フォーマット文字列)
      mode_1: "メニューモードを {mode} に変更しました。\r\n"
      mode_2: "Menu mode changed to {mode}.\r\n"
      mode_3: "MODE CHANGED TO {mode}.\r\n"
    confirm_failed: # 変更失敗メッセージ
      mode_1: "メニューモードの変更に失敗しました。\r\n"
      mode_2: "Failed to change menu mode.\r\n"
      mode_3: "MODE CHANGE FAILED.\r\n"
    cancel: # キャンセルメッセージ
      mode_1: "メニューモードの変更をキャンセルしました。\r\n"
      mode_2: "Menu mode change cancelled.\r\n"
      mode_3: "MODE CHANGE CANCELLED.\r\n"
    invalid_choice: # 無効な選択肢メッセージ (フォーマット文字列)
      mode_1: "無効な選択です。{valid_choices} のいずれかを入力してください。\r\n"
      mode_2: "Invalid choice. Please enter one of {valid_choices}.\r\n"
      mode_3: "INVALID CHOICE. ENTER {valid_choices}.\r\n"

  # --- 会員リストサブメニュー ---
  member_list:
    search_prompt:
      mode_1: "検索ワードを入力してください (未入力で全件表示): "
      mode_2: "Enter search term (leave blank for all): "
      mode_3: "SEARCH TERM > "
    not_found:
      mode_1: "会員が見つかりませんでした。\r\n"
      mode_2: "No members found.\r\n"
      mode_3: "NO MEMBERS FOUND.\r\n"
    # 会員情報の表示形式はコード側でフォーマットするので、ここでは不要
  set_lastlogin:
    current_lastlogin:
      mode_1: "設定されている最終ログイン日時は {lastlogin}です。"
      mode_2: "The last login time is {lastlogin}."
      mode_3: "LAST LOGIN TIME IS {lastlogin}."
    newe_datetime:
      mode_1: "新しい最終ログイン日時を入力してください(YYYY-MM-DD HH:MM:SS): "
      mode_2: "Enter new last login time(YYYY-MM-DD HH:MM:SS): "
      mode_3: "ENTER NEW LAST LOGIN TIME(YYYY-MM-DD HH:MM:SS): "
    cancelled:
      mode_1: "最終ログイン日時の設定をキャンセルしました。\r\n"
      mode_2: "Last login time change cancelled.\r\n"
      mode_3: "LAST LOGIN TIME CHANGE CANCELLED.\r\n"
    invalid_format:
      mode_1: "無効な日時フォーマットです。YYYY-MM-DD HH:MM:SS で入力してください。\r\n"
      mode_2: "Invalid date format. Please enter in YYYY-MM-DD HH:MM:SS format.\r\n"
      mode_3: "INVALID DATE FORMAT. ENTER YYYY-MM-DD HH:MM:SS.\r\n"
    updated:
      mode_1: "最終ログイン日時を更新しました。\r\n"
      mode_2: "Last login time updated.\r\n"
      mode_3: "LAST LOGIN TIME UPDATED.\r\n"
  telegram_restriction:
    prompt:
      mode_1: "選択してください([1]全電報を受信 [2]会員からのみ受信 [3]全電報を拒否 [4]ブラックリストからの電報を拒否): "
      mode_2: "Select ([1]All telegrams [2]Only from members [3]Reject all telegrams [4]Reject telegrams from blacklist): "
      mode_3: "SELECT ([1]ALL TELEGRAMS [2]MEMBERS ONLY  [3]REJECT ALL [4]REJECT BLACKLIST): "
    setting_updated:
      mode_1: "電報受信制限を「{new_restriction_text}」に変更しました。"
      mode_2: 'Telegram reception restriction changed to "{new_restriction_text}".'
      mode_3: 'TELEGRAM RESTRICTION SET TO "{new_restriction_text}".'
    update_failed:
      mode_1: "電報受信制限の変更に失敗しました。"
      mode_2: "Failed to change telegram reception restriction."
      mode_3: "RESTRICTION CHANGE FAILED."
    cancelled:
      mode_1: "電報受信制限の変更をキャンセルしました。"
      mode_2: "Telegram reception restriction change cancelled."
      mode_3: "RESTRICTION CHANGE CANCELLED." #ヘルプ
    recieve_all:
      mode_1: "** すべての電報を受信します **"
      mode_2: "** All telegrams **"
      mode_3: "** ALL TELEGRAMS **"
    member_only:
      mode_1: "** ゲストからの電報を拒否します **"
      mode_2: "** Only from members **"
      mode_3: "** MEMBERS ONLY **"
    reject_all:
      mode_1: "** ゲストおよび会員からの電報を拒否します **"
      mode_2: "** Reject all telegrams **"
      mode_3: "** REJECT ALL **"
    reject_blacklist:
      mode_1: "** ブラックリストに設定された会員からの電報を拒否します **"
      mode_2: "** Reject telegrams from blacklist **"
      mode_3: "** REJECT BLACKLIST **"
  blacklist_edit:
    header:
      mode_1: "--- ブラックリスト編集 ---"
      mode_2: "--- Edit Blacklist ---"
      mode_3: "--- EDIT BLACKLIST ---"
    current_blacklist_header:
      mode_1: "現在のブラックリスト (ユーザーID):"
      mode_2: "Current Blacklist (User IDs):"
      mode_3: "CURRENT BLACKLIST (USER IDS):"
    no_blacklist:
      mode_1: "  (現在ブラックリストに登録されているユーザーはいません)"
      mode_2: "  (No users currently on the blacklist)"
      mode_3: "  (NO USERS ON BLACKLIST)"
    confirm_change_prompt:
      mode_1: "ブラックリストを変更しますか？ (y/n): "
      mode_2: "Do you want to change the blacklist? (y/n): "
      mode_3: "CHANGE BLACKLIST? (Y/N): "
    new_list_prompt:
      mode_1: "新しいブラックリストをカンマ区切りで入力してください (例: user1,test,guest 空入力でクリア): "
      mode_2: "Enter new blacklist as comma-separated User Logins (e.g., user1,test,guest. Empty to clear): "
      mode_3: "NEW BLACKLIST (LOGINS, COMMA-SEP. EMPTY TO CLEAR): "
    invalid_id_format:
      mode_1: "** 不正な入力形式です。ユーザー名をカンマで区切って入力してください。 **"
      mode_2: "** Invalid input format. Please enter usernames separated by commas. **"
      mode_3: "** INVALID INPUT. ENTER USERNAMES, COMMA-SEP. **"
    user_id_not_found:
      mode_1: "** 存在しないユーザー「{user_id}」が含まれています。 **"
      mode_2: '** User "{user_id}" not found. **'
      mode_3: '** USER "{user_id}" NOT FOUND. **'
    update_success:
      mode_1: "ブラックリストを更新しました。"
      mode_2: "Blacklist updated successfully."
      mode_3: "BLACKLIST UPDATED."
    update_failed:
      mode_1: "** ブラックリストの更新に失敗しました。 **"
      mode_2: "** Failed to update blacklist. **"
      mode_3: "** BLACKLIST UPDATE FAILED. **"
    cancelled:
      mode_1: "ブラックリストの編集をキャンセルしました。"
      mode_2: "Blacklist editing cancelled."
      mode_3: "BLACKLIST EDIT CANCELLED."
    current_list_display:
      mode_1: "  {blacklist_users}"
      mode_2: "  {blacklist_users}"
      mode_3: "  {blacklist_users}"
  register_exploration_list:
    header:
      mode_1: "** 探索リストに登録します **\r\n"
      mode_2: "** Register exploration list **\r\n"
      mode_3: "** REGISTER EXPLORATION LIST **\r\n"
    confirm_yn:
      mode_1: "この内容で良いですか?(YまたはN): "
      mode_2: "Is this content OK? (Y or N): "
      mode_3: "CONTENT OK? (Y OR N): "
    success:
      mode_1: "** 探索リストに登録しました **"
      mode_2: "** Exploration list registered **"
      mode_3: "** EXPLORATION LIST REGISTERED **"

  help_h:
    mode_1: ""
    mode_2: ""
    mode_3: ""
  change_password:
    current_password:
      mode_1: "現在のパスワードを入力してください: "
      mode_2: "Enter current password: "
      mode_3: "ENTER CURRENT PASS: "
    invalid_password:
      mode_1: "パスワードが違います。\r\n"
      mode_2: "Invalid password.\r\n"
      mode_3: "INVALID PASS.\r\n"
    new_password:
      mode_1: "新しいパスワードを入力してください: "
      mode_2: "Enter new password: "
      mode_3: "ENTER NEW PASS: "
    password_too_short:
      mode_1: "パスワードは8文字以上にしてください。\r\n"
      mode_2: "Password must be at least 8 characters long.\r\n"
      mode_3: "PASSWORD TOO SHORT.\r\n"
    new_password_confirm:
      mode_1: "新しいパスワードをもう一度入力してください: "
      mode_2: "Re-enter new password: "
      mode_3: "RE-ENTER NEW PASS: "
    password_mismatch:
      mode_1: "パスワードが一致しません。\r\n"
      mode_2: "Passwords do not match.\r\n"
      mode_3: "PASSWORD MISMATCH.\r\n"
    password_changed:
      mode_1: "パスワードを変更しました。\r\n"
      mode_2: "Password changed.\r\n"
      mode_3: "PASSWORD CHANGED.\r\n"
    confirm_regenerate_ssh_key_yn:
      mode_1: "SSH公開鍵を再生成しますか?"
      mode_2: "Regenerate SSH public key?"
      mode_3: "REGENERATE SSH KEY?"
    new_private_key_info:
      mode_1: "新しいSSH秘密鍵を生成しました。\r\n"
      mode_2: "New SSH private key generated.\r\n"
      mode_3: "NEW SSH PRIVATE KEY GENERATED.\r\n"
    ssh_key_updated_success:
      mode_1: "この鍵をなくすとSSH接続ができなくなりますので、大切に保管してください。\r\n"
      mode_2: "This key will no longer work for SSH connections, so please keep it safe.\r\n"
      mode_3: "THIS KEY WILL NO LONGER WORK FOR SSH CONNECTIONS, SO KEEP IT SAFE.\r\n"
  change_profile:
    current_profile:
      mode_1: "現在のプロフィールは「{comment}」です。\r\n"
      mode_2: "Current profile is \"{comment}\".\r\n"
      mode_3: "CURRENT PROFILE IS \"{comment}\".\r\n"
    new_profile:
      mode_1: "新しいプロフィールを入力してください: "
      mode_2: "Enter new profile: "
      mode_3: "ENTER NEW PROFILE: "
    profile_updated:
      mode_1: "プロフィールを更新しました。\r\n"
      mode_2: "Profile updated.\r\n"
      mode_3: "PROFILE UPDATED.\r\n"
