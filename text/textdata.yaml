##
## GrassRootsBBS テキストデータファイル
## このファイルには、各メニューモードに対応した表示テキストが格納されています。
##
## 構造:
## feature_name: # 例: user_pref_menu, sysop_menu, common_messages
##   element_name: # 例: header, prompt, options, messages
##     mode_1: "モード1のテキスト"
##     mode_2: "モード2のテキスト"
##     mode_3: "モード3のテキスト"
##     # 複数行の場合は | または > を使用
##     mode_2: |
##       複数行のテキスト
##       です。
##

# --- トップメニュー関連 ---
top_menu:
  menu:
    mode_1: |
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      ☆ [A] 自動ダウンロード     [L] オンラインサインアップ [#] 電報              ★
      ★ [B] 電子掲示板           [M] メールボックス         [U] 端末環境変更      ☆
      ☆ [C] チャット             [N] 新アーティクル探索     [W] アクセス状況通知  ★
      ★ [D] *書籍データベース    [O] 新アーティクル見出し   [X] 全シグ探索        ☆
      ☆ [E] 終了                 [P] *プログラムコーナー    [Z] ハムレットゲーム  ★
      ★ [H] ヘルプファイル       [Q] *企業内BBSサンプル     [?] ヘルプ            ☆
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      *は実装していません。
    mode_2: |
      ━━━━━━━━━━━━━━━━━━━━━━━━━━
      top_menu
      ----------------------------------------------------
      [A] 掲示板自動巡回         [M] メールボックス
      [B] 電子掲示板             [N] 新アーティクル探索
      [C] チャット               [O] 新アーティクル見出し
      [L] オンラインサインアップ [U] 端末環境変更
      [E] 終了                   [W] オンラインメンバー一覧
      [?] ヘルプ                 [X] 全シグ探索
      [#] 電報                   [Z] ハムレットゲーム
      ━━━━━━━━━━━━━━━━━━━━━━━━━━
    mode_3: | 
      +--------------------------------------------+
      | 🚀 Welcome to the GRBBS Command Center!   🚀 |
      +--------------------+-----------------------+
      | [A] Auto Board Scan| [M] Mailbox           |
      | [B] Bulletin Board | [N] New Article Hunt  |
      | [C] Live Chat      | [O] New Article News  |
      | [L] Online Signup  | [U] Terminal Setup    |
      | [E] Exit System    | [W] Online Crew       |
      | [?] Help Desk      | [X] Full SIG Search   |
      | [#] Telegram       | [Z] Hamlet Game       |
      +--------------------+-----------------------+
  help_h:
    mode_1: |
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      BIG-Modelの階層構造
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      [B] 電子掲示板(階層構造は可変します)

      [C] チャット(階層構造は可変します)

      [Q] *企業内BBSサンプル【BIG通信】
        ├─[1] ネット事務局から
        ├─[2] 情報交換広場
        ├─[3] 総務部からのお知らせ
        ├─[4] 営業部内連絡掲示板
        └─[5] 編集部内連絡掲示板

      [P] *プログラムコーナー

      [D] *書籍データベース
          ├─[1] パソコン関連                   ├─[6] データベースソフト
          │      ├─[1] ハンディ・シリーズ     ├─[7] 表計算ソフト
          │      ├─[2] 機種別／周辺機器       ├─[8] エディタ/グラフィック/統合型/
          │      ├─[3] OS                     │  ユーティリティ/オンラインソフト/パソコン通信
          │      ├─[4] 言語                   ├─[9] パソコン一般／辞典
          │      └─[5] ワープロソフト         └─[10]ワープロ検定／情報処理
          │
          ├─[2] 実用書関連                     ├─[10] 娯楽・ゲーム
                  ├─[1] クルマ・バイク関連     ├─[11] ビジネス・実務
                  ├─[2] 写真                   ├─[12] 文章・論文・手紙
                  ├─[3] スピーチ・マナー       ├─[13] 辞典
                  ├─[4] 出産・育児・名前       ├─[14] 雑学
                  ├─[5] 健康                   ├─[15] 資格・就職
                  ├─[6] ペット                 ├─[16] 音楽
                  ├─[7] スポーツ               ├─[17] 海外旅行
                  ├─[8] 占い・まじない         ├─[18] 語学・会話
                  └─[9] 折り紙・あやとり・工作 └─[19] その他
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      *は未実装です
    mode_2: |
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        コマンド一覧
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      A    : 掲示板自動巡回
      B    : 電子掲示板
      C    : チャット
      H, ? : ヘルプ表示
      L    : オンラインサインアップ
      M    : メールボックス
      N    : 新アーティクル探索
      O    : 新アーティクル見出し
      S    : シスオペメニュー (Sysop以上)
      W    : オンラインメンバー一覧
      #, ! : 電報送信
      U    : ユーザー環境設定
      X    : 全シグ探索
      Z    : ハムレットゲーム
