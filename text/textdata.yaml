      [?]                : 説明
      [U]Sysop           : B/Wリスト編集
      [C]Sysop           : シグオペ変更
      [G]Sysop/Sigop     : シグ看板編集
      -----------------------------------
      番号[RETURN]        : 番号指定
      "キーワード[RETURN]  : タイトル検索
      'キーワード[RETURN]  : 全文検索
      ;ジャンプ先[RETURN]  : シグ間ジャンプ
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    mode_1: |
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      電子掲示板の使い方
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      [CTRL+E][↑][K]      旧方向へ進む
      [CTRL+R][←][H]      旧方向へ読み進む
      [CTRL+D][RETURN]    現在位置を読む
      [CTRL+F][→][L][TAB] 新方向へ読み進む
      [CTRL+X][↓][J][ ]   新方向へ進む
      [CTRL+C][ESC][E]    終了
      [*]                 削除
      [W]                 記事を書く
      [S]                 シグ看板
      [T]                 タイトル一覧
      [?]                 説明
      [U]Sysop            B/Wリスト編集
      [C]Sysop            シグオペ変更
      [G]Sysop/Sigop      シグ看板編集
      -----------------------------------
      番号[RETURN]        番号指定
      "キーワード[RETURN]  タイトル検索
      'キーワード[RETURN]  全文検索
      ;ジャンプ先[RETURN]  シグ間ジャンプ
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    mode_3: |
      +--------------------+-----------------------------------------+
      | Command            | Description                             |
      +--------------------+-----------------------------------------+
      | CTRL+E, ↑, K       | Move Up: Go to previous post           |
      | CTRL+R, ←, H       | Read Up: Read in previous direction    |
      | CTRL+D, ENTER      | Read Current: View current post         |
      | CTRL+F, →, L, TAB  | Read Down: Read in next direction      |
      | CTRL+X, ↓, J, SPACE| Move Down: Go to next post             |
      | CTRL+C, ESC, E     | Exit: Leave bulletin board              |
      | *                  | Delete: Remove post (Sysop only)        |
      | W                  | Write: Create new post                  |
      | R                  | Continue Reading: Read next posts       |
      | T                  | Title List: Show all post titles        |
      | ?                  | Help: Display this help menu            |
      | S                  | SIG Banner: View SIG board info         |
      | U (Sysop)          | Edit B/W List: Manage block/allow lists |
      | C (Sysop)          | Change SIG Operator: Update SIG admin   |
      | G (Sysop/Sigop)    | Edit SIG Banner: Modify SIG info        |
      +--------------------+-----------------------------------------+
      | Number + ENTER     | Jump to Post: Go to specific post       |
      | "Keyword + ENTER   | Title Search: Find posts by title       |
      | 'Keyword + ENTER   | Full-Text Search: Search post content   |
      | ;Target + ENTER    | SIG Jump: Switch between SIGs           |
      +--------------------+-----------------------------------------+
