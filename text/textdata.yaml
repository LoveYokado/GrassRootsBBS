# --- 電報関連 ---
telegram:
  send_message:
    mode_1: "電報を送信します (オンラインメンバーのみ)\r\n"
    mode_2: "Send Telegram (Online members only)\r\n"
    mode_3: "SEND TELEGRAM (ONLINE ONLY)\r\n"
  send_prompt:
    mode_1: "宛先ID: "
    mode_2: "Recipient ID: "
    mode_3: "TO ID: "
  recipient_not_online:
    mode_1: "ID '{recipient_name}' は現在オンラインではありません。\r\n" # フォーマット文字列
    mode_2: "ID '{recipient_name}' is not currently online.\r\n"
