# --- ログオフ関連 ---
logoff:
  message: # ログオフメッセージ (util.show_textsfile で使われている想定)
    mode_1: |
      ログオフしました。またのご利用をお待ちしております。
      さようなら！
    mode_2: |
      Logged off. We look forward to seeing you again.
      Goodbye!
    mode_3: |
      LOGGED OFF.
      GOODBYE!

# --- 共通メッセージ ---
common_messages:
  invalid_command:
    mode_1: "無効なコマンドです。\r\n"
    mode_2: "Invalid command.\r\n"
    mode_3: "INVALID COMMAND.\r\n"
  user_not_found: # ユーザーが見つからない場合の汎用メッセージ
    mode_1: "ユーザー情報が見つかりません。\r\n"
    mode_2: "User information not found.\r\n"
    mode_3: "USER NOT FOUND.\r\n"
  db_error: # データベースエラーの汎用メッセージ
    mode_1: "データベースエラーが発生しました。シスオペに連絡してください。\r\n"
    mode_2: "A database error occurred. Please contact the sysop.\r\n"
    mode_3: "DB ERROR. CONTACT SYSOP.\r\n"
  permission_denied: # 権限がない場合のメッセージ
    mode_1: "この操作を行う権限がありません。\r\n"
    mode_2: "You do not have permission to perform this action.\r\n"
    mode_3: "PERMISSION DENIED.\r\n"
  # ... 他の共通メッセージも追加

# --- 認証関連 ---
auth:
  connect_message:
    mode_1: "** 接続 **\r\n\n"
    mode_2: "** Connect **\r\n\n"
    mode_3: "** CONNECT **\r\n\n"
  id_prompt:
    mode_1: "ID: "
    mode_2: "ID: "
    mode_3: "ID: "
  password_prompt:
    mode_1: "PASSWORD: "
    mode_2: "PASSWORD: "
    mode_3: "PASS: "
  invalid_credentials:
    mode_1: "IDまたはパスワードが違います。\r\n"
    mode_2: "Invalid ID or password.\r\n"
    mode_3: "INVALID ID/PASS.\r\n"
  account_disabled:
    mode_1: "このIDは現在利用できません。\r\n"
    mode_2: "This ID is currently unavailable.\r\n"
    mode_3: "ACCOUNT DISABLED.\r\n"
  too_many_attempts:
    mode_1: "{max_attempts}回以上間違えました。切断します。\r\n" # フォーマット文字列
    mode_2: "Too many attempts ({max_attempts}). Disconnecting.\r\n"
    mode_3: "TOO MANY ATTEMPTS ({max_attempts}). DISCONNECTING.\r\n"
  auth_error:
    mode_1: "\r\n認証中にエラーが発生しました。切断します。\r\n"
    mode_2: "\r\nAn error occurred during authentication. Disconnecting.\r\n"
    mode_3: "\r\nAUTH ERROR. DISCONNECTING.\r\n"
  ssh_auth_db_error: # SSH認証時のDBエラーなど
    mode_1: "サーバ設定エラー。シスオペに連絡してください\r\n"
    mode_2: "Server configuration error. Please contact the sysop.\r\n"
    mode_3: "SERVER CONFIG ERROR. CONTACT SYSOP.\r\n"

# --- ログイン後処理関連 ---
login:
  welcome_message: # util.show_textsfile で使われている想定
    mode_1: |
      ようこそ、{login_id}さん！
      最終ログイン: {last_login_str}
    mode_2: |
      Welcome, {login_id}!
      Last login: {last_login_str}
    mode_3: |
      WELCOME, {login_id}!
      LAST LOGIN: {last_login_str}


