# --- ユーザー設定メニュー関連 ---
user_pref_menu:
  header: # メニュー本体の表示
    mode_1: |
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        端末環境設定の説明 (日本語)
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      [1] メニューモード変更
      [2] パスワード変更
      [3] プロフィール変更
      [4] 会員リスト
      [5] 最終ログイン日時仮設定 (未実装)
      [6] 探索リスト登録 (未実装)
      [7] 探索リスト読み出し (未実装)
      [8] 元探索リスト読み出し (未実装)
      [9] 電報受信制限 (未実装)
      [E] 終了
      [H,?]: ヘルプ
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    mode_2: |
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        Terminal Environment Settings (English)
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      [1] Change Menu Mode
      [2] Change Password
      [3] Change Profile
      [4] Member List
      [5] Set Last Login Time (Unimplemented)
      [6] Register Search List (Unimplemented)
      [7] Load Search List (Unimplemented)
      [8] Load Original Search List (Unimplemented)
      [9] Telegram Receive Restriction (Unimplemented)
      [E] Exit
      [H,?]: Help
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    mode_3: |
      ╔═══════════════════════════════════════╗
      ║   USER PREFS (ANSI)                   ║
      ╚═══════════════════════════════════════╝
      [1] CHG MODE
      [2] CHG PASS
      [3] CHG PROF
      [4] MEMBER LIST
      [5] SET LAST LOGIN (N/I)
      [6] REG SEARCH (N/I)
      [7] LOAD SEARCH (N/I)
      [8] LOAD ORIG SEARCH (N/I)
      [9] TELEGRAM RESTRICT (N/I)
      [E] EXIT
      [H,?]: HELP
      ╚═══════════════════════════════════════╝
  prompt: # メニュー選択プロンプト
    mode_1: "YourPref (JP): "
    mode_2: "YourPref (US): "
    mode_3: "YOURPREF > "

  # --- メニューモード変更サブメニュー ---
  mode_selection:
    header: # モード選択肢の表示
      mode_1: |
        メニューモードを選択してください:
        [1] モード1 (日本語)
        [2] モード2 (英語)
        [3] モード3 (ANSI)
        [Q] キャンセル
      mode_2: |
        Select Menu Mode:
        [1] Mode 1 (Japanese)
        [2] Mode 2 (English)
        [3] Mode 3 (ANSI)
        [Q] Cancel
      mode_3: |
        SELECT MODE:
        [1] MODE 1 (JP)
        [2] MODE 2 (US)
        [3] MODE 3 (ANSI)
        [Q] CANCEL
    prompt: # モード選択プロンプト
      mode_1: "選択してください: "
      mode_2: "Select: "
      mode_3: "SELECT > "
    confirm_changed: # 変更成功メッセージ (フォーマット文字列)
      mode_1: "メニューモードを {mode} に変更しました。\r\n"
      mode_2: "Menu mode changed to {mode}.\r\n"
      mode_3: "MODE CHANGED TO {mode}.\r\n"
    confirm_failed: # 変更失敗メッセージ
      mode_1: "メニューモードの変更に失敗しました。\r\n"
      mode_2: "Failed to change menu mode.\r\n"
      mode_3: "MODE CHANGE FAILED.\r\n"
    cancel: # キャンセルメッセージ
      mode_1: "メニューモードの変更をキャンセルしました。\r\n"
      mode_2: "Menu mode change cancelled.\r\n"
      mode_3: "MODE CHANGE CANCELLED.\r\n"
    invalid_choice: # 無効な選択肢メッセージ (フォーマット文字列)
      mode_1: "無効な選択です。{valid_choices} のいずれかを入力してください。\r\n"
      mode_2: "Invalid choice. Please enter one of {valid_choices}.\r\n"
      mode_3: "INVALID CHOICE. ENTER {valid_choices}.\r\n"

  # --- 会員リストサブメニュー ---
  member_list:
    search_prompt:
      mode_1: "検索ワードを入力してください (未入力で全件表示): "
      mode_2: "Enter search term (leave blank for all): "
      mode_3: "SEARCH TERM > "
    not_found:
      mode_1: "会員が見つかりませんでした。\r\n"
      mode_2: "No members found.\r\n"
      mode_3: "NO MEMBERS FOUND.\r\n"
    # 会員情報の表示形式はコード側でフォーマットするので、ここでは不要

# --- WHOメニュー関連 ---
who_menu:
  header:
    mode_1: |
      オンラインメンバー一覧 (日本語)
      NAME            COMMENT
      -------------------------------------------------------------------
    mode_2: |
      Online Members List (English)
      NAME            COMMENT
      -------------------------------------------------------------------
    mode_3: |
      ONLINE MEMBERS (ANSI)
      NAME            COMMENT
      -------------------------------------------------------------------
  no_members:
