<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>リアルタイム・アスキーアート・カメラ</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 1em;
        }

        h1 {
            color: #4CAF50;
        }

        #ascii-output {
            background-color: #000;
            border: 1px solid #4CAF50;
            padding: 5px;
            font-size: 20px;
            /* 解像度を上げた分、文字を小さくする */
            line-height: 0.8;
            /* 文字の縦横比を調整 */
            white-space: pre;
            letter-spacing: 0.1em;
        }

        .controls {
            margin-top: 1em;
        }

        button {
            background-color: #4CAF50;
            border: none;
            color: white;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
        }

        video {
            display: none;
            /* 映像ストリーム取得用。表示はしない */
        }
    </style>
</head>

<body>
    <h1>リアルタイム・アスキーアート・カメラ</h1>
    <div class="controls">
        <button id="startButton">カメラを起動</button>
    </div>
    <pre id="ascii-output"></pre>
    <video id="video" playsinline autoplay></video>
    <canvas id="canvas" style="display: none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const asciiOutput = document.getElementById('ascii-output');
        const startButton = document.getElementById('startButton');
        const context = canvas.getContext('2d', { willReadFrequently: true });

        // ASCII文字を暗い→明るいの順で定義 (文字数を増やして階調を細かくする)
        const asciiRamp = " .'`^\",:;Il!i><~+_-?][}{1)(|\\/tfjrxnuvczXYUJCLQ0OZmwqpdbkhao*#MW&8%B@$";


        // Webセーフカラーに近い64色パレット (4x4x4 RGBキューブ)
        const palette64 = [
            [0, 0, 0], [0, 0, 85], [0, 0, 170], [0, 0, 255],
            [0, 85, 0], [0, 85, 85], [0, 85, 170], [0, 85, 255],
            [0, 170, 0], [0, 170, 85], [0, 170, 170], [0, 170, 255],
            [0, 255, 0], [0, 255, 85], [0, 255, 170], [0, 255, 255],
            [85, 0, 0], [85, 0, 85], [85, 0, 170], [85, 0, 255],
            [85, 85, 0], [85, 85, 85], [85, 85, 170], [85, 85, 255],
            [85, 170, 0], [85, 170, 85], [85, 170, 170], [85, 170, 255],
            [85, 255, 0], [85, 255, 85], [85, 255, 170], [85, 255, 255],
            [170, 0, 0], [170, 0, 85], [170, 0, 170], [170, 0, 255],
            [170, 85, 0], [170, 85, 85], [170, 85, 170], [170, 85, 255],
            [170, 170, 0], [170, 170, 85], [170, 170, 170], [170, 170, 255],
            [170, 255, 0], [170, 255, 85], [170, 255, 170], [170, 255, 255],
            [255, 0, 0], [255, 0, 85], [255, 0, 170], [255, 0, 255],
            [255, 85, 0], [255, 85, 85], [255, 85, 170], [255, 85, 255],
            [255, 170, 0], [255, 170, 85], [255, 170, 170], [255, 170, 255],
            [255, 255, 0], [255, 255, 85], [255, 255, 170], [255, 255, 255]
        ];

        // 最も近い色をパレットから見つける関数 (二乗距離で比較)
        function findClosestColor(r, g, b) {
            return palette64.reduce((prev, curr) => {
                const prevDist = Math.pow(r - prev[0], 2) + Math.pow(g - prev[1], 2) + Math.pow(b - prev[2], 2);
                const currDist = Math.pow(r - curr[0], 2) + Math.pow(g - curr[1], 2) + Math.pow(b - curr[2], 2);
                return currDist < prevDist ? curr : prev;
            });
        }

        let stream;
        let animationFrameId;
        let lastTime = 0;
        const fps = 8; // 目標フレームレート
        const interval = 1000 / fps; // 1フレームあたりのミリ秒


        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    if (animationFrameId) cancelAnimationFrame(animationFrameId);
                    animationFrameId = requestAnimationFrame(renderFrame);
                };
                startButton.textContent = "カメラを停止";
                startButton.onclick = stopCamera;
            } catch (err) {
                console.error("カメラへのアクセスエラー: ", err);
                alert("カメラにアクセスできませんでした。ブラウザの権限を確認してください。");
            }
        }

        function stopCamera() {
            if (stream) stream.getTracks().forEach(track => track.stop());
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            video.srcObject = null;
            asciiOutput.textContent = '';
            startButton.textContent = "カメラを起動";
            startButton.onclick = startCamera;
            lastTime = 0; // タイマーをリセット
        }

        function renderFrame(currentTime) {
            // 次のフレームを予約
            animationFrameId = requestAnimationFrame(renderFrame);

            const deltaTime = currentTime - lastTime;

            // 経過時間がインターバルより短い場合は描画をスキップ
            if (deltaTime < interval) {
                return;
            }
            lastTime = currentTime - (deltaTime % interval);

            const asciiWidth = 100; // 解像度を上げて全体的に細かくする
            const scaleFactor = canvas.width / asciiWidth;
            const asciiHeight = Math.floor(canvas.height / scaleFactor / 2); // 文字の縦横比を考慮

            context.drawImage(video, 0, 0, asciiWidth, asciiHeight);
            const imageData = context.getImageData(0, 0, asciiWidth, asciiHeight);
            const data = imageData.data;
            let asciiHtml = '';

            for (let y = 0; y < asciiHeight; y++) {
                for (let x = 0; x < asciiWidth; x++) {
                    const offset = (y * asciiWidth + x) * 4;
                    const r = data[offset];
                    const g = data[offset + 1];
                    const b = data[offset + 2];

                    // 元のピクセルの明るさからASCII文字を決定
                    const gray = 0.2126 * r + 0.7152 * g + 0.0722 * b;
                    const charIndex = Math.floor((gray / 255) * (asciiRamp.length - 1));
                    const char = asciiRamp[charIndex];

                    // 元のピクセルの色を16色に減色して適用
                    const [paletteR, paletteG, paletteB] = findClosestColor(r, g, b);
                    asciiHtml += `<span style="color: rgb(${paletteR},${paletteG},${paletteB});">${char}</span>`;
                }
                asciiHtml += '\n';
            }

            asciiOutput.innerHTML = asciiHtml;
        }

        startButton.onclick = startCamera;
    </script>
</body>

</html>
