<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>{% block title %}Error{% endblock %} - GR-BBS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1m:wght@400&display=swap" rel="stylesheet">
    <style>
        body,
        html {
            height: 100%;
            margin: 0;
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: '"M PLUS 1m", "Courier New", monospace';
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .container {
            border: 1px solid #444;
            padding: 2em 3em;
            background-color: #282c34;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 4em;
            margin: 0;
            color: #ff4444;
            text-shadow: 0 0 8px rgba(255, 68, 68, 0.7);
        }

        h2 {
            font-size: 1.5em;
            margin: 0.5em 0;
            color: #00cc00;
        }

        p {
            color: #cccccc;
        }

        p.details {
            font-size: 0.9em;
            color: #888;
        }

        a {
            color: #87cefa;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>{% block error_code %}Error{% endblock %}</h1>
        <h2>{% block error_title %}An Error Occurred{% endblock %}</h2>
        {% block error_message %}<p>Something went wrong on our end. We're looking into it.</p>{% endblock %}
        <p>
            {% if session.get('user_id') %}
            <a href="{{ url_for('web.index') }}">Return to Terminal</a>
            {% else %}
            <a href="{{ url_for('web.login') }}">Return to Login</a>
            {% endif %}
        </p>
    </div>
</body>

</html>
