<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+1m:wght@400&display=swap" rel="stylesheet">
    <style>
        body,
        html {
            height: 100%;
            margin: 0;
            background-color: #282c34;
            font-family: '"M+ 1m", "Courier New", monospace';
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00cc00;
            /* 基本の文字色を緑に */
        }

        .login-container {
            background-color: #000;
            /* 黒い画面 */
            border: 2px solid #008800;
            /* 中間的な緑の枠線 */
            border-radius: 10px;
            padding: 30px;
            width: 350px;
            text-align: center;
            box-sizing: border-box;
            /* 静的なグローと内側のライン */
            box-shadow: inset 0 0 0 1px rgba(0, 255, 0, 0.5),
                /* 内側の緑のライン */
                inset 0 0 10px rgba(0, 0, 0, 0.8),
                /* 内側の黒い影 */
                0 0 25px rgba(0, 255, 0, 0.5);
            /* 外側の緑のグロー */
        }

        .logo {
            max-width: 80%;
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 5px rgba(0, 255, 0, 0.5));
            /* ロゴにも少しにじみ効果 */
        }

        h1 {
            margin-top: 0;
            color: #00ff00;
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.5);
        }

        .message,
        .error {
            margin-bottom: 20px;
        }

        .error {
            background-color: #330000;
            /* 暗い赤の背景 */
            border: 1px solid #880000;
            color: #ff4444;
            /* 鮮やかな赤文字 */
            padding: 10px;
            border-radius: 3px;
            word-wrap: break-word;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            background-color: #000;
            color: #00ff00;
            border: 1px solid #005500;
            border-radius: 4px;
            font-family: '"M+ 1m", "Courier New", monospace';
            box-sizing: border-box;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #00ff00;
            box-shadow: 0 0 8px rgba(0, 255, 0, 0.5);
        }

        button {
            background-color: #003300;
            border: 1px solid #008800;
            padding: 12px;
            color: #00ff00;
            cursor: pointer;
            border-radius: 3px;
            font-size: 1em;
            font-family: '"M+ 1m", "Courier New", monospace';
            font-weight: bold;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #005500;
            border-color: #00ff00;
        }

        button:active {
            background-color: #002200;
            transform: translateY(1px);
        }

        /* --- レスポンシブ対応 --- */
        @media screen and (max-width: 768px) {
            body {
                display: block;
                /* flexboxによる中央寄せを解除 */
                padding: 2rem 1rem;
                /* 上下に余白を持たせる */
                box-sizing: border-box;
                height: auto;
                /* 高さを自動に */
            }

            .login-container {
                width: 90%;
                max-width: 400px;
                /* 最大幅は維持 */
                padding: 20px;
                box-shadow: none;
                margin: 0 auto;
                /* 水平中央寄せ */
            }

            /* ロゴとタイトルのマージンを調整してコンパクトに */
            .logo {
                max-width: 60%;
                margin-bottom: 15px;
            }

            h1 {
                font-size: 1.5em;
                margin-bottom: 15px;
            }

            .message,
            .error {
                margin-bottom: 15px;
            }

            input[type="text"],
            input[type="password"] {
                margin-bottom: 12px;
            }
        }
    </style>
</head>

<body>
    <div class="login-container">
        {% if logo_path %}
        <img src="{{ url_for('static', filename=logo_path) }}" alt="Logo" class="logo">
        {% endif %}
        <h1>{{ page_title }}</h1>
        {% if message %}
        <p class="message">{{ message }}</p>
        {% endif %}
        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
        <form method="post">
            <input type="text" id="username" name="username" placeholder="Username" required>
            <input type="password" id="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>
</body>

</html>
