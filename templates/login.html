<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
    <style>
        body {
            font-family: "M+ 1m", monospace;
            background-color: #000;
            color: #00FF00;
            text-align: center;
            padding-top: 50px;
            text-shadow: 0 0 2px #00FF00, 0 0 5px #00FF00;
        }

        .logo-container {
            margin-bottom: 20px;
        }

        .logo-container img {
            max-width: 100%;
            height: auto;
        }

        .login-box {
            background-color: #050505;
            padding: 30px;
            display: inline-block;
            border: 2px solid #008000;
            width: 320px;
            box-shadow: inset 0 0 15px #000;
        }

        .message {
            margin-bottom: 20px;
            padding: 10px;
            border: 1px dashed #008000;
            white-space: pre-wrap;
            /* 改行をそのまま表示するための設定 */
            text-align: left;
            font-size: 0.9em;
        }

        label {
            display: block;
            margin-bottom: 5px;
            text-align: left;
            text-transform: uppercase;
        }

        input {
            margin-bottom: 15px;
            padding: 8px;
            width: 95%;
            background-color: #000;
            border: 1px solid #008000;
            color: #00FF00;
            font-family: "M+ 1m", monospace;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
            background-color: #004d00;
            color: #00FF00;
            border: 1px solid #008000;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        button:hover {
            background-color: #006400;
            box-shadow: 0 0 5px #00FF00;
        }
    </style>
</head>

<body>

    <div class="login-box">
        {% if logo_path %}
        <div class="logo-container"><img src="{{ url_for('static', filename=logo_path) }}" alt="Logo"></div>
        {% endif %}
        {% if message %}
        <p class="message">{{ message }}</p>
        {% endif %}
        <h2>Login</h2>
        {% if error %}
        <p style="color: #ff6b6b;">{{ error }}</p>
        {% endif %}
        <form method="post">
            <label for="username">ID:</label>
            <input type="text" id="username" name="username" required><br>
            <label for="password">PASSWORD:</label>
            <input type="password" id="password" name="password" required><br>
            <button type="submit">Connect</button>
        </form>
    </div>
</body>

</html>
