<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="icon" href="{{ url_for('static', filename='icons/icon-32x32.png') }}" type="image/png">
    <link rel="manifest" href="{{ url_for('web.manifest') }}">
    <meta name="theme-color" content="#282c34">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GR-BBS">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1m:wght@400&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            /* レイアウト計算を容易にするため、全要素に適用 */
        }

        html {
            height: 100%;
        }

        body {
            min-height: 100%;
            /* コンテンツが少なくても画面の高さいっぱいに広がるように */
            margin: 0;
            background-color: #282c34;
            font-family: '"M PLUS 1m", "Courier New", monospace';
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00cc00;
        }

        .login-container {
            background-color: rgba(0, 20, 0, 0.75);
            border: 1px solid rgba(0, 255, 0, 0.3);
            border-radius: 10px;
            width: 350px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            /* Safari用 */
            padding: 30px;
        }

        .logo {
            max-width: 80%;
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 5px rgba(0, 255, 0, 0.5));
            /* ロゴにも少しにじみ効果 */
        }

        h1 {
            margin-top: 0;
            color: #00ff00;
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.5);
        }

        .message,
        .error {
            margin-bottom: 20px;
        }

        .error {
            background-color: #330000;
            border: 1px solid #880000;
            color: #ff4444;
            padding: 10px;
            border-radius: 3px;
            word-wrap: break-word;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            background-color: #000;
            color: #00ff00;
            border: 1px solid #005500;
            border-radius: 4px;
            font-family: '"M PLUS 1m", "Courier New", monospace';
            font-size: 16px;
            box-sizing: border-box;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #00ff00;
            box-shadow: 0 0 8px rgba(0, 255, 0, 0.5);
        }

        button {
            background-color: #003300;
            border: 1px solid #008800;
            padding: 12px;
            color: #00ff00;
            cursor: pointer;
            border-radius: 3px;
            font-size: 1em;
            font-family: '"M PLUS 1m", "Courier New", monospace';
            font-weight: bold;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #005500;
            border-color: #00ff00;
        }

        button:active {
            background-color: #002200;
            transform: translateY(1px);
        }

        .button-container {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .button-container button {
            flex: 1;
        }

        /* --- レスポンシブ対応 --- */
        @media screen and (max-width: 992px) {
            body {
                display: block;
                /* flexboxによる中央寄せを解除 */
                padding: 2rem 1rem;
            }

            .login-container {
                width: 90%;
                max-width: 400px;
                padding: 20px;
                box-shadow: none;
                margin: 0 auto;
                /* 水平中央寄せ */
            }

            .logo {
                max-width: 60%;
                margin-bottom: 15px;
            }

            h1 {
                font-size: 1.5em;
                margin-bottom: 15px;
            }

            .message,
            .error {
                margin-bottom: 15px;
            }

            input[type="text"],
            input[type="password"] {
                margin-bottom: 12px;
            }
        }
    </style>

    {{ util.get_tracking_code() | safe }}
</head>

<body>
    <div class="login-container">
        {% if logo_path %}
        <img src="{{ url_for('static', filename=logo_path) }}" alt="Logo" class="logo">
        {% endif %}
        <h1>{{ page_title }}</h1>
        {% if message %}
        <p class="message">{{ message }}</p>
        {% endif %}
        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
        <form method="post">
            <input type="text" id="username" name="username" placeholder="Username" required
                autocomplete="username webauthn">
            <input type="password" id="password" name="password" placeholder="Password" autocomplete="current-password">
            <div class="button-container">
                <button type="submit">Login</button>
                <button type="button" id="passkey-login-btn">Passkey Login</button>
            </div>
        </form>
    </div>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register("{{ url_for('web.service_worker') }}")
                    .then(registration => {
                        console.log('ServiceWorker registration successful with scope: ', registration.scope);
                    })
                    .catch(err => {
                        console.log('ServiceWorker registration failed: ', err);
                    });
            });
        }
    </script>
    <script>
        function base64urlToBuffer(base64urlString) {
            const base64 = base64urlString.replace(/-/g, '+').replace(/_/g, '/');
            const rawData = window.atob(base64);
            const outputArray = new Uint8Array(rawData.length);
            for (let i = 0; i < rawData.length; ++i) {
                outputArray[i] = rawData.charCodeAt(i);
            }
            return outputArray.buffer;
        }

        function bufferToBase64url(buffer) {
            const bytes = new Uint8Array(buffer);
            let str = '';
            for (const charCode of bytes) {
                str += String.fromCharCode(charCode);
            }
            const base64 = window.btoa(str);
            return base64.replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
        }

        async function loginWithPasskey() {
            const usernameInput = document.getElementById('username');
            const username = usernameInput.value.toUpperCase();
            if (!username) {
                alert('Please enter your username to use a Passkey.');
                usernameInput.focus();
                return;
            }

            // サーバーから認証オプションを取得
            let options;
            try {
                const resp = await fetch("{{ url_for('web.passkey_auth_options') }}", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username }),
                });
                if (!resp.ok) {
                    const err = await resp.json();
                    throw new Error(err.error || 'Could not get authentication options.');
                }
                options = await resp.json();
            } catch (e) {
                alert(`Error: ${e.message}`);
                return;
            }

            // データをブラウザAPI用に変換
            options.challenge = base64urlToBuffer(options.challenge);
            if (options.allowCredentials) {
                for (let cred of options.allowCredentials) {
                    cred.id = base64urlToBuffer(cred.id);
                }
            }

            // ブラウザAPIを呼び出して認証
            let credential;
            try {
                credential = await navigator.credentials.get({ publicKey: options });
            } catch (e) {
                alert(`Authentication failed: ${e.name}`);
                return;
            }

            // サーバー送信用にデータを変換
            const authenticationResponse = {
                id: credential.id,
                rawId: bufferToBase64url(credential.rawId),
                response: {
                    clientDataJSON: bufferToBase64url(credential.response.clientDataJSON),
                    authenticatorData: bufferToBase64url(credential.response.authenticatorData),
                    signature: bufferToBase64url(credential.response.signature),
                    userHandle: credential.response.userHandle ? bufferToBase64url(credential.response.userHandle) : null,
                },
                type: credential.type,
            };

            // サーバーに検証をリクエスト
            try {
                const verificationResp = await fetch("{{ url_for('web.passkey_verify_auth') }}", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ credential: authenticationResponse }),
                });
                const verificationJSON = await verificationResp.json();
                if (verificationJSON && verificationJSON.verified) {
                    window.location.href = "{{ url_for('web.index') }}";
                } else {
                    throw new Error(verificationJSON.error || "Authentication failed on server.");
                }
            } catch (e) {
                alert(`Error during verification: ${e.message}`);
            }
        }

        document.getElementById('passkey-login-btn').addEventListener('click', loginWithPasskey);
    </script>
</body>

</html>
