<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>お問い合わせ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <style>
        .static-container p,
        .static-container small {
            color: #99cc99;
        }
    </style>
</head>

<body>
    <div class="static-container" style="max-width: 600px;">
        <h1>お問い合わせ</h1>
        <form method="post">
            <div class="form-group">
                <label for="name">お名前</label>
                <input type="text" id="name" name="name" value="{{ session.get('username', '') }}" required
                    class="form-control">
            </div>
            <div class="form-group">
                <label for="email">メールアドレス</label>
                <input type="email" id="email" name="email" value="{{ user_email or '' }}" required
                    class="form-control">
                <small>または、下記のSNSアカウントでもご連絡いただけます。</small>
            </div>
            <div class="form-group">
                <label for="subject">件名</label>
                <input type="text" id="subject" name="subject" required class="form-control">
            </div>
            <div class="form-group">
                <label for="message">お問い合わせ内容</label>
                <textarea id="message" name="message" rows="5" required class="form-control"></textarea>
            </div>
            <button type="submit">送信</button>
        </form>
        <p style="font-size: 0.8em; text-align: center; margin-top: 15px;">
            お問い合わせを送信することにより、<a href="{{ url_for('web.privacy_policy') }}#contact-info">プライバシーポリシー</a>に同意したものとみなされます。
        </p>
        {% if success_message %}
        <script>
            document.addEventListener('DOMContentLoaded', function () {
                alert("{{ success_message }}");
                window.location.href = "{{ url_for('web.login') }}";
            });
        </script>
        {% endif %}
        <div
            style="text-align: center; margin-top: 20px; border-top: 1px solid rgba(0, 255, 0, 0.2); padding-top: 15px;">
            <p>または、以下のSNSからもお問い合わせいただけます。<br>（ダイレクトメッセージの受信が許可されていることをご確認ください）</p>
            <a href="[ご自身のXアカウントのURL]" target="_blank" rel="noopener noreferrer" style="margin: 0 10px;">X (Twitter)</a>
            <a href="[ご自身のThreadsアカウントのURL]" target="_blank" rel="noopener noreferrer"
                style="margin: 0 10px;">Threads</a>
            <a href="[ご自身のBlueskyアカウントのURL]" target="_blank" rel="noopener noreferrer"
                style="margin: 0 10px;">Bluesky</a>
        </div>
        <a href="{{ url_for('web.login') }}" style="display: block; text-align: center; margin-top: 20px;">ログイン画面に戻る</a>
    </div>
</body>

</html>
