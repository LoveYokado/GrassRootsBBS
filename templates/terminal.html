<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>GR-BBS Web Terminal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm/css/xterm.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+1m:wght@400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        body,
        html {
            height: 100%;
            margin: 0;
            background-color: #282c34;
            font-family: '"M+ 1m", "Courier New", monospace';
        }

        body {
            /* デスクトップでは中央寄せ */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .monitor-chassis {
            /* 立体感を出すためのグラデーション背景 */
            background: linear-gradient(145deg, #f0e8c0, #d3cba0);
            /* 枠線の立体感 */
            border-top: 2px solid #fdf5d5;
            border-left: 2px solid #fdf5d5;
            border-bottom: 2px solid #b0a888;
            border-right: 2px solid #b0a888;
            border-radius: 15px;
            padding: 25px;
            /* 複数の影を重ねて立体感を強調 */
            box-shadow: 8px 8px 20px rgba(0, 0, 0, 0.5), inset 3px 3px 5px rgba(255, 255, 255, 0.6), inset -3px -3px 5px rgba(0, 0, 0, 0.2);
            position: relative;
            display: flex;
            flex-direction: column;
            max-height: 95vh;
            /* 画面からはみ出ないように */
        }

        /* --- ハンバーガーメニュー --- */
        #hamburger-btn {
            display: none;
            /* デフォルトでは非表示 */
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 24px;
            background: none;
            border: none;
            cursor: pointer;
            color: #dbd4a3;
            z-index: 10;
        }

        .sidenav {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 1002;
            top: 0;
            left: 0;
            background-color: rgba(30, 30, 30, 0.95);
            overflow-x: hidden;
            transition: 0.3s;
            padding-top: 60px;
        }

        .sidenav a {
            padding: 10px 15px 10px 32px;
            text-decoration: none;
            font-size: 18px;
            color: #f1f1f1;
            display: block;
            transition: 0.2s;
        }

        .sidenav a:hover {
            color: #c0c0c0;
        }

        .sidenav .closebtn {
            position: absolute;
            top: 0;
            right: 25px;
            font-size: 36px;
            margin-left: 50px;
        }


        .monitor-chassis.bezel-off {
            background: none;
            border: none;
            padding: 0;
            box-shadow: none;
        }

        /* ベゼルオフのときはフッターロゴも非表示にする */
        .monitor-chassis.bezel-off .monitor-footer {
            display: none;
        }

        .monitor-footer {
            text-align: center;
            padding-top: 15px;
            /* 画面とロゴの間隔 */
            font-size: 1.2em;
            font-weight: bold;
            /* 筐体の色に合わせた文字色 */
            color: #706b58;
            /* 彫り込まれたような文字の効果 */
            text-shadow: 1px 1px 1px rgba(255, 255, 255, 0.7), -1px -1px 1px rgba(0, 0, 0, 0.1);
        }

        .monitor-screen {
            background-color: #000;
            padding: 10px;
            /* 画面が奥にあるように見せるための影と境界線 */
            box-shadow: inset 2px 2px 10px rgba(0, 0, 0, 0.9);
            border-style: solid;
            border-width: 2px;
            border-color: #222 #555 #555 #222;
            /* top, right, bottom, left */
            border-radius: 8px;
            /* ブラウン管の丸みを少し強く */
            display: flex;
            position: relative;
            /* 擬似要素の基準点 */
            overflow: hidden;
            /* はみ出した擬似要素を隠す */
            flex-direction: column;
            flex-grow: 1;
            min-height: 0;
            /* flexアイテムが縮むように */
        }

        /* にじみ効果 (JSのapplyThemeからも設定されるが、クラスでトグルできるようにする) */
        #terminal.blur-effect {
            /* このクラスはJSでfilterを適用するために使用 */
        }

        /* 走査線エフェクト */
        .monitor-screen.scanline-effect::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.15), rgba(0, 0, 0, 0.15) 1px, transparent 1px, transparent 2px);
            pointer-events: none;
        }

        #terminal {
            flex-grow: 1;
            min-height: 0;
            /* flexアイテムが縮むように */
            overflow: hidden;
            /* xterm自体がスクロールバーを持つため */
        }

        #function-keys-container {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 5px 0;
            background-color: #000;
            margin-top: 15px;
        }

        .f-key-group {
            display: flex;
            gap: 4px;
        }

        .f-key {
            background-color: #FFFFFF;
            color: #000000;
            padding: 2px 6px;
            font-size: 0.8em;
            cursor: pointer;
            user-select: none;
            border-radius: 2px;
            width: 90px;
            /* ボタンの幅を固定 */
            text-align: center;
            /* テキストを中央揃え */
            box-sizing: border-box;
            /* paddingとborderを幅に含める */
        }

        /* --- ログビューワーのスタイル調整 --- */
        #log-viewer-window {
            width: 80vw;
            height: 70vh;
            max-width: 1200px;
            max-height: 800px;
        }

        .log-viewer-container {
            display: flex;
            height: calc(100% - 50px);
            /* ヘッダーの高さを引く */
            gap: 15px;
        }

        .file-list-pane {
            flex: 0 0 300px;
            /* 幅を固定 */
            overflow-y: auto;
            border-right: 1px solid #b0a888;
            padding-right: 15px;
        }

        .content-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        #log-content-display {
            width: 100%;
            height: 100%;
        }

        /* --- ポップアップ --- */
        .popup-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
        }

        .popup-window {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            /* 筐体のスタイルを適用 */
            background: linear-gradient(145deg, #f0e8c0, #d3cba0);
            border-top: 2px solid #fdf5d5;
            border-left: 2px solid #fdf5d5;
            border-bottom: 2px solid #b0a888;
            border-right: 2px solid #b0a888;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 8px 8px 20px rgba(0, 0, 0, 0.5), inset 3px 3px 5px rgba(255, 255, 255, 0.6), inset -3px -3px 5px rgba(0, 0, 0, 0.2);
            z-index: 1001;
            min-width: 300px;
        }

        #line-editor-window {
            width: 80%;
            max-width: 900px;
            /* あまりに広くなりすぎないように最大幅も設定 */
        }

        .popup-overlay.visible,
        .popup-window.visible {
            display: block;
        }

        .popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            /* 筐体の影の色に合わせる */
            border-bottom: 1px solid #b0a888;
            padding-bottom: 10px;
            margin-bottom: 15px;
            cursor: grab;
            /* ドラッグ可能なことを示すカーソル */
            user-select: none;
            /* ドラッグ中のテキスト選択を無効化 */
        }

        .popup-header h2 {
            margin: 0;
            /* 彫り込み文字風 */
            color: #706b58;
            text-shadow: 1px 1px 1px rgba(255, 255, 255, 0.7), -1px -1px 1px rgba(0, 0, 0, 0.1);
        }

        .popup-close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #706b58;
            cursor: pointer;
        }

        .popup-content h3 {
            margin-top: 0;
            margin-bottom: 10px;
            /* 彫り込み文字風 */
            color: #706b58;
            text-shadow: 1px 1px 1px rgba(255, 255, 255, 0.7);
        }

        .popup-content div {
            margin-bottom: 15px;
        }

        .popup-content button {
            /* 筐体の色に合わせたボタン */
            background: linear-gradient(145deg, #e0d8b8, #c8c098);
            border: 1px solid #b0a888;
            border-top-color: #fdf5d5;
            border-left-color: #fdf5d5;
            padding: 8px 12px;
            margin: 2px;
            color: #504b38;
            cursor: pointer;
            border-radius: 3px;
        }

        /* --- ログビューワーのスタイル調整 --- */
        #log-viewer-window {
            width: 80vw;
            height: 70vh;
            max-width: 1200px;
            max-height: 800px;
        }

        .log-viewer-container {
            display: flex;
            height: calc(100% - 50px);
            /* ヘッダーの高さを引く */
            gap: 15px;
        }

        .file-list-pane {
            flex: 0 0 300px;
            /* 幅を固定 */
            overflow-y: auto;
            border-right: 1px solid #b0a888;

            padding-right: 1;
        }

        .popup-content button:hover {
            background-color: #e9e9e9;
        }

        .popup-content button:active {
            background: linear-gradient(145deg, #c8c098, #e0d8b8);
            transform: translateY(1px);
        }

        .popup-content button.active {
            background: #b0a888;
            box-shadow: inset 1px 1px 3px rgba(0, 0, 0, 0.2);
        }

        .popup-window input[type="text"] {
            width: 95%;
            padding: 8px;
            margin-bottom: 15px;
            /* ターミナル風の入力欄 */
            background-color: #000;
            color: #eee;
            border-style: solid;
            border-width: 2px;
            border-color: #222 #555 #555 #222;
            border-radius: 4px;
            font-family: '"M+ 1m", "Courier New", monospace';
        }

        .popup-window-textarea {
            width: 100%;
            background-color: #000;
            color: #eee;
            border-style: solid;
            border-width: 2px;
            border-color: #222 #555 #555 #222;
            border-radius: 4px;
            font-family: '"M+ 1m", "Courier New", monospace';
            resize: none;
            padding: 8px;
            box-sizing: border-box;
        }

        .popup-window textarea {
            height: 250px;
            padding: 8px;
            margin-bottom: 15px;
            /* ターミナル風の入力欄 */
            background-color: #000;
            color: #eee;
            border-style: solid;
            border-width: 2px;
            border-color: #222 #555 #555 #222;
            border-radius: 4px;
            font-family: '"M+ 1m", "Courier New", monospace';
            resize: vertical;
        }

        #ansi-controls {
            margin-bottom: 10px;
            text-align: left;
        }

        .control-group {
            margin-bottom: 5px;
        }

        .ansi-btn {
            background: linear-gradient(145deg, #e0d8b8, #c8c098);
            border: 1px solid #b0a888;
            border-top-color: #fdf5d5;
            border-left-color: #fdf5d5;
            padding: 2px 8px;
            margin: 2px;
            cursor: pointer;
            border-radius: 3px;
            font-size: 0.9em;
            font-family: sans-serif;
            /* 文字色はJSで動的に設定されるため、ここでは指定しない */
        }

        /* xterm.jsの点滅(blink)を有効にするためのCSSアニメーション */
        .xterm .xterm-screen .blinking {
            animation: xterm-blink 1s steps(1, start) infinite;
        }

        @keyframes xterm-blink {
            50% {
                opacity: 0;
            }
        }


        #terminal {
            /* サイズはxterm.jsが管理するため、CSSでの指定は不要 */
        }

        /* Xterm.jsが内部で生成するスクロールバーを非表示にする */
        .xterm-viewport {
            -ms-overflow-style: none;
            /* IE and Edge */
            scrollbar-width: none;
            /* Firefox */
        }

        /* --- レスポンシブ対応 --- */
        @media screen and (max-width: 768px) {
            body {
                /* モバイルでは中央寄せをやめる */
                display: block;
            }

            .monitor-chassis {
                width: 100%;
                height: 100%;
                max-height: none;
                padding: 0;
                border: 0;
                border-radius: 0;
                box-shadow: none;
                box-sizing: border-box;
            }

            .monitor-screen {
                height: 100%;
                border-radius: 0;
                padding: 2px;
                box-sizing: border-box;
            }

            #function-keys-container {
                display: none;
                /* 狭い画面ではファンクションキーを非表示 */
            }

            #hamburger-btn {
                display: block;
                /* 狭い画面ではハンバーガーメニューを表示 */
            }

            #multiline-editor-window,
            #log-viewer-window {
                width: 95vw;
                height: 85vh;
            }

            #multiline-editor-window .popup-content {
                display: flex;
                flex-direction: column;
                height: calc(100% - 60px);
                /* ヘッダーとボタンの高さを考慮 */
            }

            #multiline-editor-input {
                flex-grow: 1;
                min-height: 100px;
            }

            .log-viewer-container {
                flex-direction: column;
            }

            .file-list-pane {
                flex: 0 1 40%;
                /* 高さを40%に */
                border-right: none;
                border-bottom: 1px solid #b0a888;
                padding-right: 0;
                padding-bottom: 10px;
            }
        }

        .xterm-viewport::-webkit-scrollbar {
            display: none;
            /* Safari and Chrome */
        }
    </style>
</head>

<body>
    <div class="monitor-chassis">
        <div class="monitor-screen">
            <div id="terminal"></div>
            <div id="function-keys-container">
                <div class="f-key-group" id="f-keys-left"></div>
                <div class="f-key-group" id="f-keys-right"></div>
            </div>
        </div>
        <div class="monitor-footer">
            GR-BBS
        </div>
    </div>

    <!-- ハンバーガーメニュー本体 -->
    <div id="sidenav" class="sidenav">
        <!-- メニュー項目はJSで動的に生成 -->
    </div>
    <!-- １行エディタ用ポップアップ -->
    <div id="line-editor-overlay" class="popup-overlay"></div>
    <div id="line-editor-window" class="popup-window">
        <div class="popup-header">
            <h2>Line Editor</h2>
            <button id="line-editor-close-btn" class="popup-close-btn">&times;</button>
        </div>
        <div class="popup-content">
            <input type="text" id="line-editor-input" maxlength="256">
            <div>
                <button id="line-editor-insert-btn">Insert</button>
                <button id="line-editor-cancel-btn">Cancel</button>
            </div>
        </div>
    </div>

    <!-- マルチラインエディタ用ポップアップ -->
    <div id="multiline-editor-overlay" class="popup-overlay"></div>
    <div id="multiline-editor-window" class="popup-window">
        <div class="popup-header">
            <h2>Editor</h2>
            <button id="multiline-editor-close-btn" class="popup-close-btn">&times;</button>
        </div>
        <div class="popup-content">

            <div id="ansi-controls">
                <div class="control-group">
                    <button class="ansi-btn" data-sequence="[1m">Bold</button>
                    <button class="ansi-btn" data-sequence="[5m">Blink</button>
                    <button class="ansi-btn" data-sequence="[4m">Underline</button>
                    <button class="ansi-btn" data-sequence="[7m">Reverse</button>
                    <button class="ansi-btn" data-sequence="[0m">Reset</button>
                </div>
                <div class="control-group" id="ansi-color-buttons">
                    <button class="ansi-btn" data-sequence="[30m" data-ansi-color-name="black"
                        style="color: #000000;">Black</button>
                    <button class="ansi-btn" data-sequence="[31m" data-ansi-color-name="red">Red</button>
                    <button class="ansi-btn" data-sequence="[32m" data-ansi-color-name="green">Green</button>
                    <button class="ansi-btn" data-sequence="[33m" data-ansi-color-name="yellow">Yellow</button>
                    <button class="ansi-btn" data-sequence="[34m" data-ansi-color-name="blue">Blue</button>
                    <button class="ansi-btn" data-sequence="[35m" data-ansi-color-name="magenta">Magenta</button>
                    <button class="ansi-btn" data-sequence="[36m" data-ansi-color-name="cyan">Cyan</button>
                    <button class="ansi-btn" data-sequence="[37m" data-ansi-color-name="white">White</button>
                </div>
            </div>
            <textarea id="multiline-editor-input" class="popup-window-textarea" cols="80"></textarea>
            <div>
                <button id="multiline-editor-insert-btn">Insert</button>
                <button id="multiline-editor-cancel-btn">Cancel</button>
            </div>
        </div>
    </div>

    <!-- ログビューワー用ポップアップ -->
    <div id="log-viewer-overlay" class="popup-overlay"></div>
    <div id="log-viewer-window" class="popup-window">
        <div class="popup-header">
            <h2>ログビューワー</h2>
            <button id="log-viewer-close-btn" class="popup-close-btn">&times;</button>
        </div>
        <div class="popup-content log-viewer-container">
            <div class="file-list-pane">
                <h3>ログファイル一覧</h3>
                <ul id="log-files-list" style="list-style-type: none; padding: 0;"></ul>
            </div>
            <div class="content-pane">
                <textarea id="log-content-display" class="popup-window-textarea" readonly></textarea>
            </div>
        </div>
    </div>

    <div id="popup-overlay" class="popup-overlay"></div>
    <div id="popup-window" class="popup-window">
        <div class="popup-header">
            <h2>Settings</h2>
            <button id="popup-close-btn" class="popup-close-btn">&times;</button>
        </div>
        <div class="popup-content">
            <div id="theme-selector">
                <h3>Theme</h3>
                <button data-theme="default">Default</button>
                <button data-theme="green">Green</button>
                <button data-theme="amber">Amber</button>
            </div>
            <div id="font-selector">
                <h3>Font</h3>
                <button data-font="M+ 1m">M+ 1m</button>
                <button data-font="IBM Plex Mono">IBM Plex Mono</button>
                <button data-font="DotGothic16">DotGothic16</button>
            </div>
            <div id="speed-selector">
                <h3>Speed</h3>
                <button data-speed="full">Full</button>
                <button data-speed="9600">9600bps</button>
                <button data-speed="4800">4800bps</button>
                <button data-speed="2400">2400bps</button>
                <button data-speed="300">300bps</button>
            </div>
            <div id="effect-selector">
                <h3>画面効果</h3>
                <button class="effect-btn" data-effect="bezel">ベゼル (Bezel)</button>
                <button class="effect-btn" data-effect="blur">にじみ (Glow)</button>
                <button class="effect-btn" data-effect="scanline">走査線 (Scanline)</button>
            </div>
        </div>
    </div>
    <button id="hamburger-btn">&#9776;</button>
    <script src="https://cdn.jsdelivr.net/npm/xterm/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit/lib/xterm-addon-fit.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <!-- にじみ効果の強さを動的に変更するためのスタイルシート -->
    <style id="dynamic-glow-style">
        #terminal.blur-effect {}
    </style>

    <script>
        const themes = {
            default: {
                background: '#000000',
                foreground: '#FFFFFF',
                cursor: '#FFFFFF',
                fkey_bg: '#FFFFFF',
                fkey_fg: '#000000',
                text_shadow_glow: '-1px 0 1px rgba(255,0,0,0.3), 1px 0 1px rgba(0,255,0,0.3), 0 0 3px rgba(255,255,255,0.4)',
                black: '#000000',      // 標準の黒
                red: '#FF0000',      // 鮮やかな赤
                green: '#00FF00',      // 鮮やかな緑
                yellow: '#FFFF00',      // 鮮やかな黄
                blue: '#0000FF',      // 鮮やかな青
                magenta: '#FF00FF',      // 鮮やかなマゼンタ
                cyan: '#00FFFF',      // 鮮やかなシアン
                white: '#FFFFFF',      // 真っ白
                brightBlack: '#7F7F7F',
                brightRed: '#FF0000',
                brightGreen: '#00FF00',
                brightYellow: '#FFFF00',
                brightBlue: '#0000FF',
                brightMagenta: '#FF00FF',
                brightCyan: '#00FFFF',
                brightWhite: '#FFFFFF'
            },
            green: {
                background: '#000000',
                foreground: '#00FF00',
                cursor: '#00FF00',
                fkey_bg: '#00FF00',
                fkey_fg: '#000000',
                text_shadow_glow: '0 0 5px rgba(0,255,0,0.5), 0 0 10px rgba(0,255,0,0.3)',
                // 全てのANSIカラーをテーマ色で上書き
                black: '#00FF00',
                red: '#00FF00',
                green: '#00FF00',
                yellow: '#00FF00',
                blue: '#00FF00',
                magenta: '#00FF00',
                cyan: '#00FF00',
                white: '#00FF00',
                brightBlack: '#00FF00',
                brightRed: '#00FF00',
                brightGreen: '#00FF00',
                brightYellow: '#00FF00',
                brightBlue: '#00FF00',
                brightMagenta: '#00FF00',
                brightCyan: '#00FF00',
                brightWhite: '#00FF00'
            },
            amber: {
                background: '#1a1000',
                foreground: '#FFB000',
                cursor: '#FFB000',
                fkey_bg: '#FFB000',
                fkey_fg: '#1a1000',
                text_shadow_glow: '0 0 5px rgba(255,176,0,0.5), 0 0 10px rgba(255,176,0,0.3)',
                // 全てのANSIカラーをテーマ色で上書き
                black: '#FFB000',

        function applyEffect(effectName, isActive) {
            const monitorChassis = document.querySelector('.monitor-chassis');
            const monitorScreen = document.querySelector('.monitor-screen');
            const terminalElement = document.getElementById('terminal');

            switch (effectName) {
                case 'bezel':

                case 'blur':

                    break;
                case 'scanline':
                    monitorScreen.classList.toggle('scanline-effect', isActive);
                    break;
            }
        }

        function toggleEffect(effectName) {

            effectStates[effectName] = !effectStates[effectName];
            // 画面に適用
            applyEffect(effectName, effectStates[effectName]);
            // localStorageに保存
            localStorage.setItem('effectStates', JSON.stringify(effectStates));
            // ボタンの見た目を更新

        // ターミナルのレイアウトを更新する関数
        function updateTerminalLayout() {
            const chassis = document.querySelector('.monitor-chassis');
            const screenContainer = document.querySelector('.monitor-screen');
            const terminalContainer = document.getElementById('terminal');
            const isMobile = window.innerWidth <= 768;
            const isFullscreen = chassis.classList.contains('fullscreen');

            // フルスクリーンでない場合は、コンテナの幅をリセットして通常表示に戻す
            if (!isFullscreen) {
                screenContainer.style.width = '';
            }

            if (isMobile) {
                // モバイル端末では、コンテナの幅に合わせてターミナルの桁数を自動調整します。
                try {
                    fitAddon.fit();
                } catch (e) {
                    console.error("fitAddon.fit() failed:", e);
                }
            } else if (isFullscreen) {
                // デスクトップのフルスクリーンモード
                if (term.renderer && term.renderer.dimensions && term.renderer.dimensions.actualCellHeight > 0) {
                    const cellHeight = term.renderer.dimensions.actualCellHeight;
                    const cellWidth = term.renderer.dimensions.actualCellWidth;

                    // 1. ターミナルの高さを計算
                    const fkeys = document.getElementById('function-keys-container');
                    const fkeysHeight = fkeys.offsetHeight;
                    const fkeysMargin = parseFloat(window.getComputedStyle(fkeys).marginTop);
                    const screenStyle = window.getComputedStyle(screenContainer);
                    const screenPaddingVertical = parseFloat(screenStyle.paddingTop) + parseFloat(screenStyle.paddingBottom);
                    const availableHeightForTerm = window.innerHeight - fkeysHeight - fkeysMargin - screenPaddingVertical;
                    const newRows = Math.floor(availableHeightForTerm / cellHeight);

                    // 2. ターミナルの幅を計算してコンテナに設定
                    const termWidth = 80 * cellWidth;
                    const screenPaddingHorizontal = parseFloat(screenStyle.paddingLeft) + parseFloat(screenStyle.paddingRight);
                    screenContainer.style.width = `${termWidth + screenPaddingHorizontal}px`;

                    // 3. xtermをリサイズ
                    term.resize(80, newRows);
                } else {
                    // レンダラが準備できていない場合、少し待ってから再試行
                    setTimeout(updateTerminalLayout, 50);
                }
            } else {
                // デスクトップの通常表示では、伝統的な80x25のサイズに固定します。
                term.resize(80, 25);
            }
        }

        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // ANSIコード挿入処理
        ansiControls.addEventListener('click', (e) => {
            if (e.target.tagName === 'BUTTON' && e.target.dataset.sequence) {
                const sequenceCode = e.target.dataset.sequence;
                const startSequence = '\x1b' + sequenceCode;
                const endSequence = '\x1b[0m'; // 基本的にリセットシーケンスで閉じる
                const textarea = multilineEditorInput;
                const start = textarea.selectionStart;
                const end = textarea.selectionEnd;
                const text = textarea.value;
                const selectedText = text.substring(start, end);

                let newText;
                let newStart;
                let newEnd;

                // リセットボタンの場合は、選択範囲があっても単純挿入
                if (sequenceCode === '[0m') {
                    newText = text.substring(0, start) + startSequence + text.substring(end);
                    newStart = start + startSequence.length;
                    newEnd = newStart;
                } else if (selectedText) {
                    // テキストが選択されている場合、選択範囲を囲む
                    const replacement = startSequence + selectedText + endSequence;
                    newText = text.substring(0, start) + replacement + text.substring(end);
                    newStart = start; // 変更後の選択範囲の開始位置
                    newEnd = start + replacement.length; // 変更後の選択範囲の終了位置
                } else {
                    // テキストが選択されていない場合（カーソル位置に挿入）
                    newText = text.substring(0, start) + startSequence + text.substring(end);
                    newStart = start + startSequence.length;
                    newEnd = newStart;
                }

                textarea.value = newText;
                textarea.selectionStart = newStart;
                textarea.selectionEnd = newEnd;
                textarea.focus();
            }
        });

        function openLineEditor() {
            lineEditorInput.value = ''; // 以前の入力をクリア
            historyIndex = lineEditorHistory.length; // 履歴の末尾にインデックスを設定
            lineEditorOverlay.classList.add('visible');

            if (textToInsert) {
                // 履歴に追加（最後の履歴と重複しない場合）
                if (lineEditorHistory.length === 0 || lineEditorHistory[lineEditorHistory.length - 1] !== textToInsert) {
                    lineEditorHistory.push(textToInsert);
                }
                // サーバーの入力バッファに送る
                socket.emit('client_input', textToInsert);
            }
            closeLineEditor();
        });

        lineEditorInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault(); // フォームの送信を防ぐ

            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (historyIndex > 0) {
                    historyIndex--;
                    lineEditorInput.value = lineEditorHistory[historyIndex];
                }
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (historyIndex < lineEditorHistory.length - 1) {
                    historyIndex++;
                    lineEditorInput.value = lineEditorHistory[historyIndex];
                } else if (historyIndex === lineEditorHistory.length - 1) {
                    historyIndex++;
                    lineEditorInput.value = ''; // 履歴の末尾の次は新しい入力

                if (definition.action === 'open_popup') {
                    key.addEventListener('click', openPopup);
                } else if (definition.action === 'send_command') {
                    key.addEventListener('click', () => {
                        // コマンドを送信し、Enterキーも送信する

                    key.addEventListener('click', openMultilineEditor);

                } else if (definition.action === 'toggle_logging') {

        // --- ポップアップのドラッグ機能 ---
        function makePopupDraggable(popup) {
            const header = popup.querySelector('.popup-header');
            if (!header) return;

            let isDragging = false;
            let offsetX, offsetY;

            header.addEventListener('mousedown', (e) => {
                // クリックされたのがボタン(閉じるボタンなど)でない場合のみドラッグ開始
                if (e.target.tagName.toLowerCase() === 'button') {
                    return;
                }
                isDragging = true;
                // ポップアップの左上隅からマウスポインタまでのオフセットを計算
                offsetX = e.clientX - popup.offsetLeft;
                offsetY = e.clientY - popup.offsetTop;
                header.style.cursor = 'grabbing';
            });

            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                // マウスの位置からオフセットを引いて、ポップアップの新しい位置を計算
                popup.style.left = `${e.clientX - offsetX}px`;
                popup.style.top = `${e.clientY - offsetY}px`;
            });

            document.addEventListener('mouseup', () => {
                if (isDragging) {
                    isDragging = false;
                    header.style.cursor = 'grab';
                }
            });
        }
        // すべてのポップアップをドラッグ可能にする
        document.querySelectorAll('.popup-window').forEach(makePopupDraggable);
        makePopupDraggable(logViewerWindow);

        // ページ読み込み時に設定を適用
        document.addEventListener('DOMContentLoaded', () => {
            loadSettings();
            updateTerminalLayout(); // 初期レイアウトを適用
        });

        // ウィンドウリサイズ時にターミナルをフィットさせる（デバウンス付き）
        window.addEventListener('resize', debounce(updateTerminalLayout, 100));

    </script>

    <script>
        // --- ハンバーガーメニューのロジック ---
        function openNav() {
            document.getElementById("sidenav").style.width = "250px";
        }

        function closeNav() {
            document.getElementById("sidenav").style.width = "0";
        }

        document.addEventListener('DOMContentLoaded', () => {
            const hamburgerBtn = document.getElementById('hamburger-btn');
            if (hamburgerBtn) {
                hamburgerBtn.addEventListener('click', openNav);
            }

            const sidenav = document.getElementById('sidenav');
            const closeBtn = document.createElement('a');
            closeBtn.href = 'javascript:void(0)';
            closeBtn.className = 'closebtn';
            closeBtn.innerHTML = '&times;';
            closeBtn.onclick = closeNav;
            sidenav.appendChild(closeBtn);

            // fkey_definitions を使ってサイドナビゲーションのメニュー項目を動的に生成
            for (const fkeyId in fkeyDefinitions) {
                const definition = fkeyDefinitions[fkeyId];
                const link = document.createElement('a');
                link.href = '#'; // ページ遷移を防ぐ
                link.textContent = `${fkeyId.toUpperCase()}: ${definition.label}`;

                // アクションに応じてIDを付与
                if (definition.action === 'toggle_logging') {
                    link.id = 'sidenav-log-btn';
                }

                link.addEventListener('click', (e) => {
                    e.preventDefault(); // ページ遷移を防ぐ
                    // ファンクションキーの定義に基づいてアクションを実行
                    if (definition.action === 'open_popup') { openPopup(); }
                    else if (definition.action === 'toggle_logging') { socket.emit('toggle_logging'); }
                    else if (definition.action === 'open_line_editor') { openLineEditor(); }
                    else if (definition.action === 'open_multiline_editor') { openMultilineEditor(); }
                    else if (definition.action === 'open_log_viewer') { openLogViewer(); }
                    else if (definition.action === 'redirect') { window.location.href = definition.value; }

                    closeNav(); // メニュー項目をクリックしたらメニューを閉じる
                });
                sidenav.appendChild(link);
            }
        });
    </script>
</body>
