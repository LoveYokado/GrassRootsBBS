<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>GR-BBS Web Terminal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm/css/xterm.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+1m:wght@400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono&display=swap" rel="stylesheet">
    <style>
        body,
        html {
            height: 100%;
            margin: 0;
            background-color: #282c34;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: '"M+ 1m", "Courier New", monospace';
        }

        .monitor-chassis {
            /* 立体感を出すためのグラデーション背景 */
            background: linear-gradient(145deg, #f0e8c0, #d3cba0);
            /* 枠線の立体感 */
            border-top: 2px solid #fdf5d5;
            border-left: 2px solid #fdf5d5;
            border-bottom: 2px solid #b0a888;
            border-right: 2px solid #b0a888;
            border-radius: 15px;
            padding: 25px;
            /* 複数の影を重ねて立体感を強調 */
            box-shadow: 8px 8px 20px rgba(0, 0, 0, 0.5), inset 3px 3px 5px rgba(255, 255, 255, 0.6), inset -3px -3px 5px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        /* --- ハンバーガーメニュー --- */
        #hamburger-btn {
            display: none;
            /* デフォルトでは非表示 */
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 24px;
            background: none;
            border: none;
            cursor: pointer;
            color: #dbd4a3;
            z-index: 10;
        }

        .sidenav {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 1002;
            top: 0;
            left: 0;
            background-color: rgba(30, 30, 30, 0.95);
            overflow-x: hidden;
            transition: 0.3s;
            padding-top: 60px;
        }

        .sidenav a {
            padding: 10px 15px 10px 32px;
            text-decoration: none;
            font-size: 18px;
            color: #f1f1f1;
            display: block;
            transition: 0.2s;
        }

        .sidenav a:hover {
            color: #c0c0c0;
        }

        .sidenav .closebtn {
            position: absolute;
            top: 0;
            right: 25px;
            font-size: 36px;
            margin-left: 50px;
        }


        .monitor-chassis.bezel-off {
            background: none;
            border: none;
            padding: 0;
            box-shadow: none;
        }

        /* ベゼルオフのときはフッターロゴも非表示にする */
        .monitor-chassis.bezel-off .monitor-footer {
            display: none;
        }

        .monitor-footer {
            text-align: center;
            padding-top: 15px;
            /* 画面とロゴの間隔 */
            font-size: 1.2em;
            font-weight: bold;
            /* 筐体の色に合わせた文字色 */
            color: #706b58;
            /* 彫り込まれたような文字の効果 */
            text-shadow: 1px 1px 1px rgba(255, 255, 255, 0.7), -1px -1px 1px rgba(0, 0, 0, 0.1);
        }

        .monitor-screen {
            background-color: #000;
            padding: 10px;
            /* 画面の埋め込み感を強調 */
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.9);
            border: 2px solid #333;
            border-radius: 5px;
            /* 画面の角を少し丸める */
            display: flex;
            position: relative;
            /* 擬似要素の基準点 */
            overflow: hidden;
            /* はみ出した擬似要素を隠す */
            flex-direction: column;
            height: 100%;
            /* 必要に応じて高さを調整 */
        }

        /* にじみ効果 (JSのapplyThemeからも設定されるが、クラスでトグルできるようにする) */
        #terminal.blur-effect {
            /* このクラスはJSでfilterを適用するために使用します */
        }

        /* 走査線エフェクト */
        .monitor-screen.scanline-effect::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.15), rgba(0, 0, 0, 0.15) 1px, transparent 1px, transparent 2px);
            pointer-events: none;
        }

        #terminal {
            flex-grow: 1;
            /* ターミナルが可能な限り伸びる */
            /* xterm.jsがサイズを管理するため、明示的な高さは不要 */
        }

        #function-keys-container {
            display: flex;
            justify-content: center;
            /* 中央揃えに変更 */
            gap: 8px;
            /* グループ間の隙間を追加 */
            padding: 5px 0;
            /* ターミナルとの間隔を調整 */
            background-color: #000;
            /* ターミナル画面に合わせる */
            margin-top: 15px;
            /* 視覚的な区切り */
        }

        .f-key-group {
            display: flex;
            gap: 4px;
        }

        .f-key {
            background-color: #FFFFFF;
            color: #000000;
            padding: 2px 6px;
            font-size: 0.8em;
            cursor: pointer;
            user-select: none;
            border-radius: 2px;
            width: 90px;
            /* ボタンの幅を固定 */
            text-align: center;
            /* テキストを中央揃え */
            box-sizing: border-box;
            /* paddingとborderを幅に含める */
        }

        /* --- ポップアップ --- */
        .popup-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
        }

        .popup-window {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #e0e0e0;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            z-index: 1001;
            min-width: 300px;
        }

        #line-editor-window {
            width: 80%;
            max-width: 900px;
            /* あまりに広くなりすぎないように最大幅も設定 */
        }

        .popup-overlay.visible,
        .popup-window.visible {
            display: block;
        }

        .popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ccc;
            padding-bottom: 10px;
            margin-bottom: 15px;
            cursor: grab;
            /* ドラッグ可能なことを示すカーソル */
            user-select: none;
            /* ドラッグ中のテキスト選択を無効化 */
        }

        .popup-header h2 {
            margin: 0;
            color: #333;
        }

        .popup-close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .popup-content h3 {
            margin-top: 0;
            margin-bottom: 10px;
            color: #444;
        }

        .popup-content div {
            margin-bottom: 15px;
        }

        .popup-content button {
            background-color: #f0f0f0;
            border: 1px solid #ccc;
            border-bottom: 2px solid #aaa;
            padding: 8px 12px;
            margin: 2px;
            cursor: pointer;
            border-radius: 3px;
        }

        .popup-content button:hover {
            background-color: #e9e9e9;
        }

        .popup-content button:active {
            border-bottom-width: 1px;
            transform: translateY(1px);
        }

        .popup-content button.active {
            background-color: #c0c0c0;
            border-bottom-width: 1px;
        }

        .popup-window input[type="text"] {
            width: 95%;
            padding: 8px;
            margin-bottom: 15px;
            background-color: #fff;
            border: 1px solid #ccc;
            color: #333;
            font-family: '"M+ 1m", "Courier New", monospace';
        }

        .popup-window textarea {
            height: 250px;
            padding: 8px;
            margin-bottom: 15px;
            background-color: #fff;
            border: 1px solid #ccc;
            color: #333;
            font-family: '"M+ 1m", "Courier New", monospace';
            resize: vertical;
        }

        #ansi-controls {
            margin-bottom: 10px;
            text-align: left;
        }

        .control-group {
            margin-bottom: 5px;
        }

        .ansi-btn {
            background-color: #f0f0f0;
            border: 1px solid #ccc;
            border-bottom: 2px solid #aaa;
            padding: 2px 8px;
            margin: 2px;
            cursor: pointer;
            border-radius: 3px;
            font-size: 0.9em;
            font-family: sans-serif;
            /* ボタンのフォントは読みやすく */
        }

        /* xterm.jsの点滅(blink)を有効にするためのCSSアニメーション */
        .xterm .xterm-screen .blinking {
            animation: xterm-blink 1s steps(1, start) infinite;
        }

        @keyframes xterm-blink {
            50% {
                opacity: 0;
            }
        }


        #terminal {
            /* サイズはxterm.jsが管理するため、CSSでの指定は不要 */
        }

        /* Xterm.jsが内部で生成するスクロールバーを非表示にする */
        .xterm-viewport {
            -ms-overflow-style: none;
            /* IE and Edge */
            scrollbar-width: none;
            /* Firefox */
        }

        /* --- レスポンシブ対応 --- */
        @media screen and (max-width: 768px) {
            #function-keys-container {
                display: none;
                /* 狭い画面ではファンクションキーを非表示 */
            }

            #hamburger-btn {
                display: block;
                /* 狭い画面ではハンバーガーメニューを表示 */
            }
        }

        .xterm-viewport::-webkit-scrollbar {
            display: none;
            /* Safari and Chrome */
        }
    </style>
</head>

<body>
    <div class="monitor-chassis">
        <div class="monitor-screen">
            <div id="terminal"></div>
            <div id="function-keys-container">
                <div class="f-key-group" id="f-keys-left"></div>
                <div class="f-key-group" id="f-keys-right"></div>
            </div>
        </div>
        <div class="monitor-footer">
            GR-BBS
        </div>
    </div>

    <!-- ハンバーガーメニュー本体 -->
    <div id="sidenav" class="sidenav">
        <!-- メニュー項目はJSで動的に生成されます -->
    </div>
    <!-- １行エディタ用ポップアップ -->
    <div id="line-editor-overlay" class="popup-overlay"></div>
    <div id="line-editor-window" class="popup-window">
        <div class="popup-header">
            <h2>Line Editor</h2>
            <button id="line-editor-close-btn" class="popup-close-btn">&times;</button>
        </div>
        <div class="popup-content">
            <input type="text" id="line-editor-input" maxlength="256">
            <div>
                <button id="line-editor-insert-btn">Insert</button>
                <button id="line-editor-cancel-btn">Cancel</button>
            </div>
        </div>
    </div>

    <!-- マルチラインエディタ用ポップアップ -->
    <div id="multiline-editor-overlay" class="popup-overlay"></div>
    <div id="multiline-editor-window" class="popup-window">
        <div class="popup-header">
            <h2>Editor</h2>
            <button id="multiline-editor-close-btn" class="popup-close-btn">&times;</button>
        </div>
        <div class="popup-content">

            <div id="ansi-controls">
                <div class="control-group">
                    <button class="ansi-btn" data-sequence="[1m">Bold</button>
                    <button class="ansi-btn" data-sequence="[5m">Blink</button>
                    <button class="ansi-btn" data-sequence="[4m">Underline</button>
                    <button class="ansi-btn" data-sequence="[7m">Reverse</button>
                    <button class="ansi-btn" data-sequence="[0m">Reset</button>
                </div>
                <div class="control-group">
                    <button class="ansi-btn" data-sequence="[30m" data-ansi-color-name="black">Black</button>
                    <button class="ansi-btn" data-sequence="[31m" data-ansi-color-name="red">Red</button>
                    <button class="ansi-btn" data-sequence="[32m" data-ansi-color-name="green">Green</button>
                    <button class="ansi-btn" data-sequence="[33m" data-ansi-color-name="yellow">Yellow</button>
                    <button class="ansi-btn" data-sequence="[34m" data-ansi-color-name="blue">Blue</button>
                    <button class="ansi-btn" data-sequence="[35m" data-ansi-color-name="magenta">Magenta</button>
                    <button class="ansi-btn" data-sequence="[36m" data-ansi-color-name="cyan">Cyan</button>
                    <button class="ansi-btn" data-sequence="[37m" data-ansi-color-name="white">White</button>
                </div>
            </div>
            <textarea id="multiline-editor-input" cols="80"></textarea>
            <div>
                <button id="multiline-editor-insert-btn">Insert</button>
                <button id="multiline-editor-cancel-btn">Cancel</button>
            </div>
        </div>
    </div>

    <div id="popup-overlay" class="popup-overlay"></div>
    <div id="popup-window" class="popup-window">
        <div class="popup-header">
            <h2>Settings</h2>
            <button id="popup-close-btn" class="popup-close-btn">&times;</button>
        </div>
        <div class="popup-content">
            <div id="theme-selector">
                <h3>Theme</h3>
                <button data-theme="default">Default</button>
                <button data-theme="green">Green</button>
                <button data-theme="amber">Amber</button>
            </div>
            <div id="font-selector">
                <h3>Font</h3>
                <button data-font="M+ 1m">M+ 1m</button>
                <button data-font="IBM Plex Mono">IBM Plex Mono</button>
            </div>
            <div id="speed-selector">
                <h3>Speed</h3>
                <button data-speed="full">Full</button>
                <button data-speed="9600">9600bps</button>
                <button data-speed="4800">4800bps</button>
                <button data-speed="2400">2400bps</button>
                <button data-speed="300">300bps</button>
            </div>
            <div id="effect-selector">
                <h3>画面効果</h3>
                <button class="effect-btn" data-effect="bezel">ベゼル (Bezel)</button>
                <button class="effect-btn" data-effect="blur">にじみ (Glow)</button>
                <button class="effect-btn" data-effect="scanline">走査線 (Scanline)</button>
            </div>
        </div>
    </div>
    <button id="hamburger-btn">&#9776;</button>
    <script src="https://cdn.jsdelivr.net/npm/xterm/lib/xterm.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <!-- にじみ効果の強さを動的に変更するためのスタイルシート -->
    <style id="dynamic-glow-style">
        #terminal.blur-effect {}
    </style>

    <script>
        const themes = {
            default: {
                background: '#000000',
                foreground: '#FFFFFF',
                cursor: '#FFFFFF',
                fkey_bg: '#FFFFFF',
                fkey_fg: '#000000',
                filter_glow: 'drop-shadow(0 0 1px rgba(255, 255, 255, 0.3))',
                // パソコン通信時代を彷彿とさせる、より鮮やかなANSIカラーパレット
                black: '#000000',      // 標準の黒はそのまま
                red: '#FF0000',      // 鮮やかな赤
                green: '#00FF00',      // 鮮やかな緑
                yellow: '#FFFF00',      // 鮮やかな黄
                blue: '#0000FF',      // 鮮やかな青
                magenta: '#FF00FF',      // 鮮やかなマゼンタ
                cyan: '#00FFFF',      // 鮮やかなシアン
                white: '#FFFFFF',      // 真っ白
                brightBlack: '#7F7F7F',
                brightRed: '#FF0000',
                brightGreen: '#00FF00',
                brightYellow: '#FFFF00',
                brightBlue: '#0000FF',
                brightMagenta: '#FF00FF',
                brightCyan: '#00FFFF',
                brightWhite: '#FFFFFF'
            },
            green: {
                background: '#000000',
                foreground: '#00FF00',
                cursor: '#00FF00',
                fkey_bg: '#00FF00',
                fkey_fg: '#000000',
                filter_glow: 'drop-shadow(0 0 1px rgba(180, 255, 180, 0.4)) drop-shadow(0 0 3px rgba(100, 255, 100, 0.3))',
                // 全てのANSIカラーをテーマ色で上書き
                black: '#00FF00',
                red: '#00FF00',
                green: '#00FF00',
                yellow: '#00FF00',
                blue: '#00FF00',
                magenta: '#00FF00',
                cyan: '#00FF00',
                white: '#00FF00',
                brightBlack: '#00FF00',
                brightRed: '#00FF00',
                brightGreen: '#00FF00',
                brightYellow: '#00FF00',
                brightBlue: '#00FF00',
                brightMagenta: '#00FF00',
                brightCyan: '#00FF00',
                brightWhite: '#00FF00'
            },
            amber: {
                background: '#1a1000',
                foreground: '#FFB000',
                cursor: '#FFB000',
                fkey_bg: '#FFB000',
                fkey_fg: '#1a1000',
                filter_glow: 'drop-shadow(0 0 1px rgba(255, 176, 0, 0.4)) drop-shadow(0 0 3px rgba(255, 176, 0, 0.3))',
                // 全てのANSIカラーをテーマ色で上書き
                black: '#FFB000',
                red: '#FFB000',
                green: '#FFB000',
                yellow: '#FFB000',
                blue: '#FFB000',
                magenta: '#FFB000',
                cyan: '#FFB000',
                white: '#FFB000',
                brightBlack: '#FFB000',
                brightRed: '#FFB000',
                brightGreen: '#FFB000',
                brightYellow: '#FFB000',
                brightBlue: '#FFB000',
                brightMagenta: '#FFB000',
                brightCyan: '#FFB000',
                brightWhite: '#FFB000'
            }
        };

        // にじみ効果のスタイルを動的に更新する
        const dynamicGlowStyle = document.getElementById('dynamic-glow-style');

        function applyTheme(themeName) {
            const theme = themes[themeName] || themes.default;
            term.options.theme = theme;

            // 動的スタイルシートを更新して、テーマに合わせたにじみ効果を適用
            if (dynamicGlowStyle) {
                dynamicGlowStyle.innerHTML = `#terminal.blur-effect { filter: ${theme.filter_glow || 'none'}; }`;
            }
            // ファンクションキーのスタイルを更新
            const fkeys = document.querySelectorAll('.f-key');
            fkeys.forEach(key => {
                key.style.backgroundColor = theme.fkey_bg;
                key.style.color = theme.fkey_fg;
            });

            // マルチラインエディタのカラーボタンの色を更新
            const colorBtns = document.querySelectorAll('.ansi-btn[data-ansi-color-name]');
            colorBtns.forEach(btn => {
                const colorName = btn.dataset.ansiColorName;
                if (theme[colorName]) {
                    btn.style.color = theme[colorName];
                }
            });
            localStorage.setItem('terminalTheme', themeName); // 選択を保存
            updateThemeButtons(themeName);
        }

        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        const BASE_FONT_SIZE = 16;
        const MIN_FONT_SIZE = 6; // 読みやすさを保つための最小フォントサイズ

        function autoResizeFont() {
            const chassis = document.querySelector('.monitor-chassis');
            const availableWidth = window.innerWidth;

            // 基準となるフォントサイズで一度設定して、その時の幅を計測
            term.options.fontSize = BASE_FONT_SIZE;

            // DOMの更新を待ってから幅を計測するために少し遅延させる
            setTimeout(() => {
                const baseWidth = chassis.offsetWidth;
                if (baseWidth > availableWidth) {
                    const scale = (availableWidth * 0.98) / baseWidth; // 2%のマージン
                    const newFontSize = Math.floor(BASE_FONT_SIZE * scale);
                    term.options.fontSize = Math.max(newFontSize, MIN_FONT_SIZE);
                }
            }, 50);
        }

        function applyFont(fontName) {
            const fontFamily = `"${fontName}", "Courier New", monospace`; // フォント名を引用符で囲む
            term.options.fontFamily = fontFamily;
            localStorage.setItem('terminalFont', fontFamily); // 選択を保存
            updateFontButtons(fontName);
        }

        function applySpeed(speedName) {
            // サーバに速度設定を通知
            socket.emit('set_speed', speedName);
            localStorage.setItem('terminalSpeed', speedName); // 選択を保存
            updateSpeedButtons(speedName);
        }

        // --- 画面効果の管理 ---
        const effectStates = {
            bezel: true,
            blur: false,
            scanline: false
        };

        function applyEffect(effectName, isActive) {
            const monitorChassis = document.querySelector('.monitor-chassis');
            const monitorScreen = document.querySelector('.monitor-screen');
            const terminalElement = document.getElementById('terminal');

            switch (effectName) {
                case 'bezel':
                    monitorChassis.classList.toggle('bezel-off', !isActive);
                    // ベゼルの表示/非表示で全体の幅が変わるため、フォントサイズを再調整
                    autoResizeFont();
                    break;
                case 'blur':
                    terminalElement.classList.toggle('blur-effect', isActive);
                    break;
                case 'scanline':
                    monitorScreen.classList.toggle('scanline-effect', isActive);
                    break;
            }
        }

        function toggleEffect(effectName) {
            // 状態を反転
            effectStates[effectName] = !effectStates[effectName];
            // 画面に適用
            applyEffect(effectName, effectStates[effectName]);
            // localStorageに保存
            localStorage.setItem('effectStates', JSON.stringify(effectStates));
            // ボタンの見た目を更新
            updateEffectButtons();
        }

        function updateEffectButtons() {
            document.querySelectorAll('.effect-btn').forEach(button => {
                const effectName = button.dataset.effect;
                if (effectStates[effectName]) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function updateThemeButtons(themeName) {
            document.querySelectorAll('#theme-selector button').forEach(btn => btn.classList.remove('active'));
            const activeButton = document.querySelector(`#theme-selector button[data-theme="${themeName}"]`);
            if (activeButton) activeButton.classList.add('active');
        }

        function updateFontButtons(fontName) {
            document.querySelectorAll('#font-selector button').forEach(btn => btn.classList.remove('active'));
            const activeButton = document.querySelector(`#font-selector button[data-font="${fontName}"]`);
            if (activeButton) activeButton.classList.add('active');
        }

        function updateSpeedButtons(speedName) {
            document.querySelectorAll('#speed-selector button').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`#speed-selector button[data-speed="${speedName}"]`).classList.add('active');
        }

        const term = new Terminal({
            cols: 80, // 幅を80文字に固定
            rows: 25, // 高さを25行に戻す
            cursorBlink: true,
            fontSize: 16, // 固定サイズなので少し見やすく
            scrollback: 0, // スクロールバックバッファを行数と同じにし、スクロールバーを非表示にする
        });

        term.open(document.getElementById('terminal'));

        const socket = io();

        // --- ポップアップ処理 ---
        const popupOverlay = document.getElementById('popup-overlay');
        const popupWindow = document.getElementById('popup-window');
        const popupCloseBtn = document.getElementById('popup-close-btn');

        // --- １行エディタ用ポップアップ ---
        const lineEditorOverlay = document.getElementById('line-editor-overlay');
        const lineEditorWindow = document.getElementById('line-editor-window');
        const lineEditorCloseBtn = document.getElementById('line-editor-close-btn');
        const lineEditorInput = document.getElementById('line-editor-input');
        const lineEditorInsertBtn = document.getElementById('line-editor-insert-btn');
        const lineEditorCancelBtn = document.getElementById('line-editor-cancel-btn');
        const lineEditorHistory = [];
        let historyIndex = -1;

        // --- マルチラインエディタ用ポップアップ ---
        const multilineEditorOverlay = document.getElementById('multiline-editor-overlay');
        const multilineEditorWindow = document.getElementById('multiline-editor-window');
        const multilineEditorCloseBtn = document.getElementById('multiline-editor-close-btn');
        const multilineEditorInput = document.getElementById('multiline-editor-input');
        const multilineEditorInsertBtn = document.getElementById('multiline-editor-insert-btn');
        const multilineEditorCancelBtn = document.getElementById('multiline-editor-cancel-btn');
        const ansiControls = document.getElementById('ansi-controls');

        // ANSIコード挿入処理
        ansiControls.addEventListener('click', (e) => {
            if (e.target.tagName === 'BUTTON' && e.target.dataset.sequence) {
                const sequenceCode = e.target.dataset.sequence;
                const startSequence = '\x1b' + sequenceCode;
                const endSequence = '\x1b[0m'; // 基本的にリセットシーケンスで閉じる
                const textarea = multilineEditorInput;
                const start = textarea.selectionStart;
                const end = textarea.selectionEnd;
                const text = textarea.value;
                const selectedText = text.substring(start, end);

                let newText;
                let newStart;
                let newEnd;

                // リセットボタンの場合は、選択範囲があっても単純挿入
                if (sequenceCode === '[0m') {
                    newText = text.substring(0, start) + startSequence + text.substring(end);
                    newStart = start + startSequence.length;
                    newEnd = newStart;
                } else if (selectedText) {
                    // テキストが選択されている場合、選択範囲を囲む
                    const replacement = startSequence + selectedText + endSequence;
                    newText = text.substring(0, start) + replacement + text.substring(end);
                    newStart = start; // 変更後の選択範囲の開始位置
                    newEnd = start + replacement.length; // 変更後の選択範囲の終了位置
                } else {
                    // テキストが選択されていない場合（カーソル位置に挿入）
                    newText = text.substring(0, start) + startSequence + text.substring(end);
                    newStart = start + startSequence.length;
                    newEnd = newStart;
                }

                textarea.value = newText;
                textarea.selectionStart = newStart;
                textarea.selectionEnd = newEnd;
                textarea.focus();
            }
        });

        function openMultilineEditor() {
            multilineEditorInput.value = ''; // 以前の入力をクリア
            multilineEditorOverlay.classList.add('visible');
            multilineEditorWindow.classList.add('visible');
            multilineEditorInput.focus(); // 入力フィールドにフォーカス
        }

        function closeMultilineEditor() {
            multilineEditorOverlay.classList.remove('visible');
            multilineEditorWindow.classList.remove('visible');
        }

        multilineEditorInsertBtn.addEventListener('click', () => {
            const textToInsert = multilineEditorInput.value;
            if (textToInsert) {
                const lines = textToInsert.split('\n');
                lines.forEach(line => {
                    socket.emit('client_input', line + '\r');
                });
            }
            closeMultilineEditor();
        });

        function openLineEditor() {
            lineEditorInput.value = ''; // 以前の入力をクリア
            historyIndex = lineEditorHistory.length; // 履歴の末尾にインデックスを設定
            lineEditorOverlay.classList.add('visible');
            lineEditorWindow.classList.add('visible');
            lineEditorInput.focus(); // 入力フィールドにフォーカス
        }

        function closeLineEditor() {
            lineEditorOverlay.classList.remove('visible');
            lineEditorWindow.classList.remove('visible');
        }

        lineEditorInsertBtn.addEventListener('click', () => {
            const textToInsert = lineEditorInput.value;
            if (textToInsert) {
                // 履歴に追加（最後の履歴と重複しない場合）
                if (lineEditorHistory.length === 0 || lineEditorHistory[lineEditorHistory.length - 1] !== textToInsert) {
                    lineEditorHistory.push(textToInsert);
                }
                // サーバーの入力バッファに送る
                socket.emit('client_input', textToInsert);
            }
            closeLineEditor();
        });

        lineEditorInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault(); // フォームの送信を防ぐ
                lineEditorInsertBtn.click();
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (historyIndex > 0) {
                    historyIndex--;
                    lineEditorInput.value = lineEditorHistory[historyIndex];
                }
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (historyIndex < lineEditorHistory.length - 1) {
                    historyIndex++;
                    lineEditorInput.value = lineEditorHistory[historyIndex];
                } else if (historyIndex === lineEditorHistory.length - 1) {
                    historyIndex++;
                    lineEditorInput.value = ''; // 履歴の末尾の次は新しい入力
                }
            }
        });

        function openPopup() {
            popupOverlay.classList.add('visible');
            popupWindow.classList.add('visible');
        }

        function closePopup() {
            popupOverlay.classList.remove('visible');
            popupWindow.classList.remove('visible');
        }

        // --- ファンクションキー生成 ---
        const fkeysLeftContainer = document.getElementById('f-keys-left');
        const fkeysRightContainer = document.getElementById('f-keys-right');
        const fkeyDefinitions = {{ fkey_definitions | tojson }};

        for (let i = 1; i <= 8; i++) {
            const key = document.createElement('div');
            key.classList.add('f-key');
            const fkeyId = `f${i}`;
            const definition = fkeyDefinitions[fkeyId];

            if (definition) {
                key.textContent = `${definition.label}`;
                if (definition.action === 'open_popup') {
                    key.addEventListener('click', openPopup);
                } else if (definition.action === 'send_command') {
                    key.addEventListener('click', () => {
                        // コマンドを送信し、Enterキーも送信する
                        socket.emit('client_input', definition.value + '\r');
                    });
                } else if (definition.action === 'open_multiline_editor') {
                    key.addEventListener('click', openMultilineEditor);
                } else if (definition.action === 'open_line_editor') {
                    key.addEventListener('click', openLineEditor);
                } else if (definition.action === 'toggle_logging') {
                    key.id = 'f2-log-btn'; // スタイル変更のためにIDを付与
                    key.addEventListener('click', () => {
                        socket.emit('toggle_logging');
                    });
                } else if (definition.action === 'redirect') {
                    key.addEventListener('click', () => {
                        window.location.href = definition.value;
                    });
                }
            } else {
                key.textContent = `NoFunction`;
            }

            if (i <= 4) {
                fkeysLeftContainer.appendChild(key);
            } else {
                fkeysRightContainer.appendChild(key);
            }
        }

        popupCloseBtn.addEventListener('click', closePopup);
        popupOverlay.addEventListener('click', closePopup);
        lineEditorCloseBtn.addEventListener('click', closeLineEditor);
        lineEditorCancelBtn.addEventListener('click', closeLineEditor);
        lineEditorOverlay.addEventListener('click', closeLineEditor);
        multilineEditorCloseBtn.addEventListener('click', closeMultilineEditor);
        multilineEditorCancelBtn.addEventListener('click', closeMultilineEditor);
        multilineEditorOverlay.addEventListener('click', closeMultilineEditor);


        // ボタンにイベントリスナーを設定
        document.getElementById('theme-selector').addEventListener('click', (e) => {
            if (e.target.tagName === 'BUTTON') {
                applyTheme(e.target.dataset.theme); // ウィンドウは閉じない
            }
        });

        document.getElementById('font-selector').addEventListener('click', (e) => {
            if (e.target.tagName === 'BUTTON') {
                const fontName = e.target.dataset.font;
                applyFont(fontName); // ウィンドウは閉じない
            }
        });

        document.getElementById('speed-selector').addEventListener('click', (e) => {
            if (e.target.tagName === 'BUTTON') {
                applySpeed(e.target.dataset.speed); // ウィンドウは閉じない
            }
        });

        document.getElementById('effect-selector').addEventListener('click', (e) => {
            if (e.target.classList.contains('effect-btn')) {
                toggleEffect(e.target.dataset.effect);
            }
        });

        term.onData(data => {
            socket.emit('client_input', data);
        });

        socket.on('server_output', data => {
            term.write(data);
        });

        // --- ログ記録関連のイベントリスナー ---
        socket.on('logging_started', () => {
            const f2LogBtn = document.getElementById('f2-log-btn');
            if (f2LogBtn) {
                f2LogBtn.textContent = 'LOGGING...';
            }
        });

        socket.on('log_saved', (data) => {
            const f2LogBtn = document.getElementById('f2-log-btn');
            if (f2LogBtn) {
                f2LogBtn.textContent = 'LOGGING';
            }

            // ダウンロードをトリガーするための隠しリンクを作成してクリック
            const link = document.createElement('a');
            link.href = data.url;
            link.download = data.filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        socket.on('logging_stopped', (data) => {
            const f2LogBtn = document.getElementById('f2-log-btn');
            // ログが空だった場合などのメッセージはターミナルに表示しない
        });

        // サーバーからの切断要求を処理
        socket.on('force_disconnect', (data) => {
            // サーバーから送られてきたメッセージを表示する
            const message = (data && data.message) ? data.message : '[Connection closed by server]';
            term.writeln('\r\n\n' + message);
            socket.disconnect();
        });

        function loadSettings() {
            // テーマ
            const savedTheme = localStorage.getItem('terminalTheme') || 'default';
            applyTheme(savedTheme);

            // フォント
            const savedFont = localStorage.getItem('terminalFont') || '"M+ 1m", "Courier New", monospace';
            applyFont(savedFont.split(',')[0].replace(/"/g, ''));

            // 速度
            const savedSpeed = localStorage.getItem('terminalSpeed') || 'full';
            applySpeed(savedSpeed);

            // 画面効果
            const savedEffects = localStorage.getItem('effectStates');
            if (savedEffects) {
                Object.assign(effectStates, JSON.parse(savedEffects));
            }
            for (const effectName in effectStates) {
                applyEffect(effectName, effectStates[effectName]);
            }
            updateEffectButtons();
        }
        // ページ読み込み時に一度フォントサイズを調整
        autoResizeFont();

        socket.on('connect', () => {
            // 接続が確立したら、保存されている設定をサーバに送信
            loadSettings();
        });


        // --- ポップアップのドラッグ機能 ---
        function makePopupDraggable(popup) {
            const header = popup.querySelector('.popup-header');
            if (!header) return;

            let isDragging = false;
            let offsetX, offsetY;

            header.addEventListener('mousedown', (e) => {
                // クリックされたのがボタン(閉じるボタンなど)でない場合のみドラッグ開始
                if (e.target.tagName.toLowerCase() === 'button') {
                    return;
                }
                isDragging = true;
                // ポップアップの左上隅からマウスポインタまでのオフセットを計算
                offsetX = e.clientX - popup.offsetLeft;
                offsetY = e.clientY - popup.offsetTop;
                header.style.cursor = 'grabbing';
            });

            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                // マウスの位置からオフセットを引いて、ポップアップの新しい位置を計算
                popup.style.left = `${e.clientX - offsetX}px`;
                popup.style.top = `${e.clientY - offsetY}px`;
            });

            document.addEventListener('mouseup', () => {
                if (isDragging) {
                    isDragging = false;
                    header.style.cursor = 'grab';
                }
            });
        }
        // すべてのポップアップをドラッグ可能にする
        document.querySelectorAll('.popup-window').forEach(makePopupDraggable);

        // ページ読み込み時に設定を適用
        loadSettings();

        // ウィンドウリサイズ時にもフォントサイズを調整（デバウンス付き）
        window.addEventListener('resize', debounce(autoResizeFont, 100));
    </script>

    <script>
        // --- ハンバーガーメニューのロジック ---
        function openNav() {
            document.getElementById("sidenav").style.width = "250px";
        }

        function closeNav() {
            document.getElementById("sidenav").style.width = "0";
        }

        document.addEventListener('DOMContentLoaded', () => {
            const hamburgerBtn = document.getElementById('hamburger-btn');
            if (hamburgerBtn) {
                hamburgerBtn.addEventListener('click', openNav);
            }

            const sidenav = document.getElementById('sidenav');
            const closeBtn = document.createElement('a');
            closeBtn.href = 'javascript:void(0)';
            closeBtn.className = 'closebtn';
            closeBtn.innerHTML = '&times;';
            closeBtn.onclick = closeNav;
            sidenav.appendChild(closeBtn);

            // fkey_definitions を使ってサイドナビゲーションのメニュー項目を動的に生成
            for (const fkeyId in fkeyDefinitions) {
                const definition = fkeyDefinitions[fkeyId];
                const link = document.createElement('a');
                link.href = '#'; // ページ遷移を防ぐ
                link.textContent = `${fkeyId.toUpperCase()}: ${definition.label}`;

                link.addEventListener('click', (e) => {
                    e.preventDefault(); // ページ遷移を防ぐ
                    // ファンクションキーの定義に基づいてアクションを実行
                    if (definition.action === 'open_popup') openPopup();
                    else if (definition.action === 'toggle_logging') socket.emit('toggle_logging');
                    else if (definition.action === 'open_line_editor') openLineEditor();
                    else if (definition.action === 'open_multiline_editor') openMultilineEditor();
                    else if (definition.action === 'redirect') window.location.href = definition.value;

                    closeNav(); // メニュー項目をクリックしたらメニューを閉じる
                });
                sidenav.appendChild(link);
            }
        });
    </script>
</body>

</html>
