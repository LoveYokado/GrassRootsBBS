<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>GR-BBS Web Terminal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- PWA化のための追加 -->
    <link rel="manifest" href="{{ url_for('manifest') }}">
    <meta name="theme-color" content="#282c34">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GR-BBS">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm/css/xterm.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+1m:wght@400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1+Code&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        body,
        html {
            height: 100%;
            margin: 0;
            background-color: #282c34;
            font-family: '"M+ 1m", "Courier New", monospace';
        }

        body {
            /* デスクトップでは中央寄せ */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .monitor-chassis {
            /* 立体感を出すためのグラデーション背景 */
            background: linear-gradient(145deg, #f0e8c0, #d3cba0);
            /* 枠線の立体感 */
            border-top: 2px solid #fdf5d5;
            border-left: 2px solid #fdf5d5;
            border-bottom: 2px solid #b0a888;
            border-right: 2px solid #b0a888;
            border-radius: 15px;
            padding: 25px;
            /* 複数の影を重ねて立体感を強調 */
            box-shadow: 8px 8px 20px rgba(0, 0, 0, 0.5), inset 3px 3px 5px rgba(255, 255, 255, 0.6), inset -3px -3px 5px rgba(0, 0, 0, 0.2);
            position: relative;
            display: flex;
            flex-direction: column;
            max-height: 95vh;
            /* 画面からはみ出ないように */
        }

        /* --- ハンバーガーメニュー --- */
        #hamburger-btn {
            display: none;
            /* デフォルトでは非表示 */
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 24px;
            background: none;
            border: none;
            cursor: pointer;
            color: #dbd4a3;
            z-index: 10;
        }

        .sidenav {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 1002;
            top: 0;
            left: 0;
            background-color: rgba(30, 30, 30, 0.95);
            overflow-x: hidden;
            transition: 0.3s;
            padding-top: 60px;
        }

        .sidenav a {
            padding: 10px 15px 10px 32px;
            text-decoration: none;
            font-size: 18px;
            color: #f1f1f1;
            display: block;
            transition: 0.2s;
        }

        .sidenav a:hover {
            color: #c0c0c0;
        }

        .sidenav .closebtn {
            position: absolute;
            top: 0;
            right: 25px;
            font-size: 36px;
            margin-left: 50px;
        }


        .monitor-chassis.bezel-off {
            background: none;
            border: none;
            padding: 0;
            box-shadow: none;
        }

        /* ベゼルオフのときはフッターロゴも非表示にする */
        .monitor-chassis.bezel-off .monitor-footer {
            display: none;
        }

        .monitor-footer {
            text-align: center;
            padding-top: 15px;
            /* 画面とロゴの間隔 */
            font-size: 1.2em;
            font-weight: bold;
            /* 筐体の色に合わせた文字色 */
            color: #706b58;
            /* 彫り込まれたような文字の効果 */
            text-shadow: 1px 1px 1px rgba(255, 255, 255, 0.7), -1px -1px 1px rgba(0, 0, 0, 0.1);
        }

        .monitor-screen {
            background-color: #000;
            padding: 10px;
            /* 画面が奥にあるように見せるための影と境界線 */
            box-shadow: inset 2px 2px 10px rgba(0, 0, 0, 0.9);
            border-style: solid;
            border-width: 2px;
            border-color: #222 #555 #555 #222;
            /* top, right, bottom, left */
            border-radius: 8px;
            /* ブラウン管の丸みを少し強く */
            display: flex;
            position: relative;
            /* 擬似要素の基準点 */
            overflow: hidden;
            /* はみ出した擬似要素を隠す */
            flex-direction: column;
            flex-grow: 1;
            min-height: 0;
            /* flexアイテムが縮むように */
        }

        /* にじみ効果 (JSのapplyThemeからも設定されるが、クラスでトグルできるようにする) */
        #terminal.blur-effect {
            /* このクラスはJSでfilterを適用するために使用 */
        }

        /* 走査線エフェクト */
        .monitor-screen.scanline-effect::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.15), rgba(0, 0, 0, 0.15) 1px, transparent 1px, transparent 2px);
            pointer-events: none;
        }

        #terminal {
            flex-grow: 1;
            min-height: 0;
            /* flexアイテムが縮むように */
            overflow: hidden;
            /* xterm自体がスクロールバーを持つため */
        }

        #function-keys-container {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 5px 0;
            background-color: #000;
            margin-top: 15px;
        }

        .f-key-group {
            display: flex;
            gap: 4px;
        }

        .f-key {
            background-color: #FFFFFF;
            color: #000000;
            padding: 2px 6px;
            font-size: 0.8em;
            cursor: pointer;
            user-select: none;
            border-radius: 2px;
            width: 90px;
            /* ボタンの幅を固定 */
            text-align: center;
            /* テキストを中央揃え */
            box-sizing: border-box;
            /* paddingとborderを幅に含める */
        }

        /* --- ログビューワーのスタイル調整 --- */
        #log-viewer-window {
            width: 80vw;
            height: 70vh;
            max-width: 1200px;
            max-height: 800px;
        }

        .log-viewer-container {
            display: flex;
            height: calc(100% - 50px);
            /* ヘッダーの高さを引く */
            gap: 15px;
        }

        .file-list-pane {
            flex: 0 0 300px;
            /* 幅を固定 */
            overflow-y: auto;
            border-right: 1px solid #b0a888;
            padding-right: 15px;
        }

        .content-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        #log-content-display {
            width: 100%;
            height: 100%;
        }

        /* --- ポップアップ --- */
        .popup-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
        }

        .popup-window {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            /* 筐体のスタイルを適用 */
            background: linear-gradient(145deg, #f0e8c0, #d3cba0);
            border-top: 2px solid #fdf5d5;
            border-left: 2px solid #fdf5d5;
            border-bottom: 2px solid #b0a888;
            border-right: 2px solid #b0a888;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 8px 8px 20px rgba(0, 0, 0, 0.5), inset 3px 3px 5px rgba(255, 255, 255, 0.6), inset -3px -3px 5px rgba(0, 0, 0, 0.2);
            z-index: 1001;
            min-width: 300px;
        }

        #line-editor-window {
            width: 80%;
            max-width: 900px;
            /* あまりに広くなりすぎないように最大幅も設定 */
        }

        .popup-overlay.visible,
        .popup-window.visible {
            display: block;
        }

        .popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            /* 筐体の影の色に合わせる */
            border-bottom: 1px solid #b0a888;
            padding-bottom: 10px;
            margin-bottom: 15px;
            cursor: grab;
            /* ドラッグ可能なことを示すカーソル */
            user-select: none;
            /* ドラッグ中のテキスト選択を無効化 */
        }

        .popup-header h2 {
            margin: 0;
            /* 彫り込み文字風 */
            color: #706b58;
            text-shadow: 1px 1px 1px rgba(255, 255, 255, 0.7), -1px -1px 1px rgba(0, 0, 0, 0.1);
        }

        .popup-close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #706b58;
            cursor: pointer;
        }

        .popup-content h3 {
            margin-top: 0;
            margin-bottom: 10px;
            /* 彫り込み文字風 */
            color: #706b58;
            text-shadow: 1px 1px 1px rgba(255, 255, 255, 0.7);
        }

        .popup-content div {
            margin-bottom: 15px;
        }

        .popup-content button {
            /* 筐体の色に合わせたボタン */
            background: linear-gradient(145deg, #e0d8b8, #c8c098);
            border: 1px solid #b0a888;
            border-top-color: #fdf5d5;
            border-left-color: #fdf5d5;
            padding: 8px 12px;
            margin: 2px;
            color: #504b38;
            cursor: pointer;
            border-radius: 3px;
        }

        /* --- ログビューワーのスタイル調整 --- */
        #log-viewer-window {
            width: 80vw;
            height: 70vh;
            max-width: 1200px;
            max-height: 800px;
        }

        .log-viewer-container {
            display: flex;
            height: calc(100% - 50px);
            /* ヘッダーの高さを引く */
            gap: 15px;
        }

        .file-list-pane {
            flex: 0 0 300px;
            /* 幅を固定 */
            overflow-y: auto;
            border-right: 1px solid #b0a888;

            padding-right: 1;
        }

        .popup-content button:hover {
            background-color: #e9e9e9;
        }

        .popup-content button:active {
            background: linear-gradient(145deg, #c8c098, #e0d8b8);
            transform: translateY(1px);
        }

        .popup-content button.active {
            background: #b0a888;
            box-shadow: inset 1px 1px 3px rgba(0, 0, 0, 0.2);
        }

        .popup-window input[type="text"] {
            width: 95%;
            padding: 8px;
            margin-bottom: 15px;
            /* ターミナル風の入力欄 */
            background-color: #000;
            color: #eee;
            border-style: solid;
            border-width: 2px;
            border-color: #222 #555 #555 #222;
            border-radius: 4px;
            font-family: '"M+ 1m", "Courier New", monospace';
        }

        .popup-window-textarea {
            width: 100%;
            background-color: #000;
            color: #eee;
            border-style: solid;
            border-width: 2px;
            border-color: #222 #555 #555 #222;
            border-radius: 4px;
            font-family: '"M+ 1m", "Courier New", monospace';
            resize: none;
            padding: 8px;
            box-sizing: border-box;
        }

        .popup-window textarea {
            height: 250px;
            padding: 8px;
            margin-bottom: 15px;
            /* ターミナル風の入力欄 */
            background-color: #000;
            color: #eee;
            border-style: solid;
            border-width: 2px;
            border-color: #222 #555 #555 #222;
            border-radius: 4px;
            font-family: '"M+ 1m", "Courier New", monospace';
            resize: vertical;
        }

        #ansi-controls {
            margin-bottom: 10px;
            text-align: left;
        }

        .control-group {
            margin-bottom: 5px;
        }

        .ansi-btn {
            background: linear-gradient(145deg, #e0d8b8, #c8c098);
            border: 1px solid #b0a888;
            border-top-color: #fdf5d5;
            border-left-color: #fdf5d5;
            padding: 2px 8px;
            margin: 2px;
            cursor: pointer;
            border-radius: 3px;
            font-size: 0.9em;
            font-family: sans-serif;
            /* 文字色はJSで動的に設定されるため、ここでは指定しない */
        }

        /* xterm.jsの点滅(blink)を有効にするためのCSSアニメーション */
        .xterm .xterm-screen .blinking {
            animation: xterm-blink 1s steps(1, start) infinite;
        }

        @keyframes xterm-blink {
            50% {
                opacity: 0;
            }
        }


        #terminal {
            /* サイズはxterm.jsが管理するため、CSSでの指定は不要 */
        }

        /* Xterm.jsが内部で生成するスクロールバーを非表示にする */
        .xterm-viewport {
            -ms-overflow-style: none;
            /* IE and Edge */
            scrollbar-width: none;
            /* Firefox */
        }

        /* --- レスポンシブ対応 --- */
        @media screen and (max-width: 992px) {
            body {
                /* モバイルでは中央寄せをやめる */
                display: block;
            }

            .monitor-chassis {
                width: 100%;
                height: 100%;
                max-height: none;
                padding: 0;
                border: 0;
                border-radius: 0;
                box-shadow: none;
                box-sizing: border-box;
            }

            .monitor-screen {
                height: 100%;
                border-radius: 0;
                padding: 2px;
                box-sizing: border-box;
            }

            #function-keys-container {
                display: none;
                /* 狭い画面ではファンクションキーを非表示 */
            }

            #hamburger-btn {
                display: block;
                /* 狭い画面ではハンバーガーメニューを表示 */
            }

            #multiline-editor-window,
            #log-viewer-window {
                width: 95vw;
                height: 85vh;
            }

            #multiline-editor-window .popup-content {
                display: flex;
                flex-direction: column;
                height: calc(100% - 60px);
                /* ヘッダーとボタンの高さを考慮 */
            }

            #multiline-editor-input {
                flex-grow: 1;
                min-height: 100px;
            }

            .log-viewer-container {
                flex-direction: column;
            }

            .file-list-pane {
                flex: 0 1 40%;
                /* 高さを40%に */
                border-right: none;
                border-bottom: 1px solid #b0a888;
                padding-right: 0;
                padding-bottom: 10px;
            }
        }

        /* --- デスクトップでのモバイルUI強制非表示 --- */
        @media screen and (min-width: 993px) {

            #mobile-bbs-controls,
            #mobile-chat-controls,
            #mobile-userpref-controls,
            #mobile-mail-controls,
            #mobile-bbs-entry-controls,
            #mobile-top-menu-controls {
                /* JSで .visible クラスが付与されても、PCでは強制的に非表示にする */
                display: none !important;
            }

            /* デスクトップでは設定ボタンを非表示にし、DIPスイッチのみにする */
            #theme-selector,
            #font-selector,
            #speed-selector,
            #effect-selector {
                display: none;
            }
        }

        .xterm-viewport::-webkit-scrollbar {
            display: none;
            /* Safari and Chrome */
        }

        /* --- モバイルBBSコントロール --- */
        #mobile-bbs-controls {
            display: none;
            /* JSで表示を制御 */
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: rgba(20, 20, 20, 0.9);
            padding: 10px;
            box-sizing: border-box;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 5px;
            z-index: 100;
        }

        #mobile-bbs-controls.visible {
            display: grid;
        }


        .mobile-btn {
            background-color: #444;
            border: 1px solid #666;
            color: #eee;
            font-size: 1.2em;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            font-family: '"M+ 1m", "Courier New", monospace';
            font-weight: bold;
        }

        #bbs-btn-y {
            grid-column: 2;
            grid-row: 1;
        }

        #bbs-btn-n {
            grid-column: 4;
            grid-row: 1;
        }

        .mobile-btn:active {
            background-color: #666;
        }

        /* グリッドレイアウトでの位置指定 */
        #bbs-btn-end-write {
            grid-column: 1;
            grid-row: 1;
        }

        #bbs-btn-write {
            grid-column: 1;
            grid-row: 2;
        }

        #bbs-btn-up {
            grid-column: 3;
            grid-row: 1;
            font-size: 1.5em;
        }

        #bbs-btn-delete {
            grid-column: 5;
            grid-row: 2;
        }

        #bbs-btn-left {
            grid-column: 2;
            grid-row: 2;
            font-size: 1.5em;
        }

        #bbs-btn-read {
            grid-column: 3;
            grid-row: 2;
        }

        #bbs-btn-right {
            grid-column: 4;
            grid-row: 2;
            font-size: 1.5em;
        }

        #bbs-btn-help {
            grid-column: 1;
            grid-row: 3;
        }

        #bbs-btn-down {
            grid-column: 3;
            grid-row: 3;
            font-size: 1.5em;
        }

        #bbs-btn-exit {
            grid-column: 5;
            grid-row: 3;
        }

        /* --- テーマごとのボタンのスタイル --- */
        /* デフォルトテーマ */
        #mobile-bbs-controls.theme-default #bbs-btn-read {
            background-color: #a83232;
        }

        #mobile-bbs-controls.theme-default #bbs-btn-read:active {
            background-color: #c85252;
            /* 少し明るく */
        }

        /* グリーンテーマ */
        #mobile-bbs-controls.theme-green .mobile-btn {
            background-color: #000000;
            border-color: #00FF00;
            color: #00FF00;
        }

        #mobile-bbs-controls.theme-green .mobile-btn:active {
            background-color: #00FF00;
            color: #000000;
        }

        #mobile-bbs-controls.theme-green #bbs-btn-read {
            background-color: #00FF00;
            color: #000000;
        }

        #mobile-bbs-controls.theme-green #bbs-btn-read:active {
            background-color: #000000;
            color: #00FF00;
        }

        /* アンバーテーマ */
        #mobile-bbs-controls.theme-amber .mobile-btn {
            background-color: #1a1000;
            border-color: #FFB000;
            color: #FFB000;
        }

        #mobile-bbs-controls.theme-amber .mobile-btn:active {
            background-color: #FFB000;
            color: #1a1000;
        }

        #mobile-bbs-controls.theme-amber #bbs-btn-read {
            background-color: #FFB000;
            color: #1a1000;
        }

        #mobile-bbs-controls.theme-amber #bbs-btn-read:active {
            background-color: #1a1000;
            color: #FFB000;
        }

        /* --- モバイルチャットコントロールのテーマ --- */
        /* グリーンテーマ */
        #mobile-chat-controls.theme-green .mobile-btn {
            background-color: #000000;
            border-color: #00FF00;
            color: #00FF00;
        }

        #mobile-chat-controls.theme-green .mobile-btn:active {
            background-color: #00FF00;
            color: #000000;
        }

        /* アンバーテーマ */
        #mobile-chat-controls.theme-amber .mobile-btn {
            background-color: #1a1000;
            border-color: #FFB000;
            color: #FFB000;
        }

        #mobile-chat-controls.theme-amber .mobile-btn:active {
            background-color: #FFB000;
            color: #1a1000;
        }

        /* --- モバイルチャットコントロール --- */
        #mobile-chat-controls {
            display: none;
            /* JSで表示を制御 */
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: rgba(20, 20, 20, 0.9);
            padding: 10px;
            box-sizing: border-box;
            z-index: 100;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 8px;
        }

        #mobile-chat-controls.visible {
            display: grid;
        }

        /* --- モバイルユーザー設定コントロール --- */
        #mobile-userpref-controls {
            display: none;
            /* JSで表示を制御 */
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: rgba(20, 20, 20, 0.9);
            padding: 10px;
            box-sizing: border-box;
            z-index: 100;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 8px;
        }

        #mobile-userpref-controls.visible {
            display: grid;
        }

        #userpref-btn-enter {
            grid-column: 1 / -1;
            /* Span all columns */
        }

        /* --- モバイルユーザー設定コントロールのテーマ --- */
        #mobile-userpref-controls.theme-green .mobile-btn {
            background-color: #000000;
            border-color: #00FF00;
            color: #00FF00;
        }

        #mobile-userpref-controls.theme-green .mobile-btn:active {
            background-color: #00FF00;
            color: #000000;
        }

        #mobile-userpref-controls.theme-amber .mobile-btn {
            background-color: #1a1000;
            border-color: #FFB000;
            color: #FFB000;
        }

        #mobile-userpref-controls.theme-amber .mobile-btn:active {
            background-color: #FFB000;
            color: #1a1000;
        }

        /* --- モバイルメール＆掲示板入口コントロール --- */
        #mobile-mail-controls,
        #mobile-bbs-entry-controls {
            display: none;
            /* JSで表示を制御 */
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: rgba(20, 20, 20, 0.9);
            padding: 10px;
            box-sizing: border-box;
            z-index: 100;
            gap: 8px;
        }

        #mobile-mail-controls.visible,
        #mobile-bbs-entry-controls.visible {
            display: grid;
        }

        #mobile-mail-controls {
            grid-template-columns: repeat(4, 1fr);
        }

        #mobile-bbs-entry-controls {
            grid-template-columns: repeat(3, 1fr);
        }

        /* --- モバイルトップメニューコントロール --- */
        #mobile-top-menu-controls {
            display: none;
            /* JSで表示を制御 */
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: rgba(20, 20, 20, 0.9);
            padding: 10px;
            box-sizing: border-box;
            z-index: 100;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 8px;
        }

        #mobile-top-menu-controls.visible {
            display: grid;
        }

        /* --- テーマ適用 --- */
        #mobile-mail-controls.theme-green .mobile-btn,
        #mobile-bbs-entry-controls.theme-green .mobile-btn,
        #mobile-top-menu-controls.theme-green .mobile-btn {
            background-color: #000000;
            border-color: #00FF00;
            color: #00FF00;
        }

        #mobile-mail-controls.theme-green .mobile-btn:active,
        #mobile-bbs-entry-controls.theme-green .mobile-btn:active,
        #mobile-top-menu-controls.theme-green .mobile-btn:active {
            background-color: #00FF00;
            color: #000000;
        }

        #mobile-mail-controls.theme-amber .mobile-btn,
        #mobile-bbs-entry-controls.theme-amber .mobile-btn,
        #mobile-top-menu-controls.theme-amber .mobile-btn {
            background-color: #1a1000;
            border-color: #FFB000;
            color: #FFB000;
        }

        #mobile-mail-controls.theme-amber .mobile-btn:active,
        #mobile-bbs-entry-controls.theme-amber .mobile-btn:active,
        #mobile-top-menu-controls.theme-amber .mobile-btn:active {
            background-color: #FFB000;
            color: #1a1000;
        }

        /* --- ディップスイッチ --- */
        #dip-switch-container {
            margin-top: 20px;
            border-top: 1px solid #b0a888;
            padding-top: 15px;
        }

        .dip-switch-panel {
            background-color: #4a4a4a;
            /* グレーの金属パネル風に変更 */
            border: 2px solid #333333;
            border-radius: 5px;
            padding: 15px 15px 0px 15px;
            /* 上、左右、下の順。下の余白を少し詰める */
            box-shadow: inset 1px 1px 4px rgba(0, 0, 0, 0.5);
        }

        .dip-switch-bank {
            display: flex;
            justify-content: center;
            gap: 20px;
            /* グループ間の隙間 */
            flex-wrap: wrap;
            /* 画面が狭い場合に折り返す */
        }

        .dip-switch-group {
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #962d22;
            padding: 5px 8px;
            border-radius: 3px;
            background-color: #c0392b;
            /* 赤い基板の色 */
        }

        .dip-switch-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            /* スイッチと番号の間の隙間 */
        }

        .dip-switch-number {
            color: white;
            font-family: 'Courier New', monospace;
            font-size: 0.8em;
            text-shadow: 1px 1px 1px #000;
        }

        .dip-switch {
            position: relative;
            width: 22px;
            height: 44px;
            background-color: #fff;
            border: 1px solid #999;
            border-radius: 3px;
        }

        .dip-switch input[type="checkbox"] {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .dip-switch label {
            position: absolute;
            width: 18px;
            height: 20px;
            background-color: #333;
            border: 1px solid #222;
            cursor: pointer;
            transition: top 0.15s ease-in-out;
            left: 1px;
            box-shadow: inset 0 2px 2px rgba(0, 0, 0, 0.5);
        }

        /* OFF (下) */
        .dip-switch input[type="checkbox"]+label {
            top: 22px;
        }

        /* ON (上) */
        .dip-switch input[type="checkbox"]:checked+label {
            top: 1px;
        }
    </style>
</head>

                // 全てのANSIカラーをテーマ色で上書き

                green: '#00FF00',
                yellow: '#00FF00',
                blue: '#00FF00',
                magenta: '#00FF00',
                cyan: '#00FF00',
                white: '#00FF00',
                brightBlack: '#00FF00',
                brightRed: '#00FF00',
                brightGreen: '#00FF00',
                brightYellow: '#00FF00',
                brightBlue: '#00FF00',
                brightMagenta: '#00FF00',

                foreground: '#FFB000',

                text_shadow_glow: '0 0 5px rgba(255,176,0,0.5), 0 0 10px rgba(255,176,0,0.3)',
                // 全てのANSIカラーをテーマ色で上書き
                black: '#FFB000',
                red: '#FFB000',
                green: '#FFB000',
                yellow: '#FFB000',
                blue: '#FFB000',
                magenta: '#FFB000',
                cyan: '#FFB000',
                white: '#FFB000',
                brightBlack: '#FFB000',
                brightRed: '#FFB000',
                brightGreen: '#FFB000',
                brightYellow: '#FFB000',
                brightBlue: '#FFB000',
                brightMagenta: '#FFB000',
                brightCyan: '#FFB000',
                brightWhite: '#FFB000'

        };
        // --- DIPスイッチ関連 ---
        const themeMap = { 'default': 0, 'green': 1, 'amber': 2 };
        const fontMap = { 'M+ 1m': 0, 'M PLUS 1 Code': 1, 'IBM Plex Mono': 2, 'DotGothic16': 3 };
        const speedMap = { 'full': 0, '9600': 1, '4800': 2, '2400': 3, '300': 4 };
        const effectMap = { 'bezel': 0, 'blur': 1, 'scanline': 2 };

        // 逆引きマップ
        const themeMapReverse = Object.fromEntries(Object.entries(themeMap).map(([k, v]) => [v, k]));
        const fontMapReverse = Object.fromEntries(Object.entries(fontMap).map(([k, v]) => [v, k]));
        const speedMapReverse = Object.fromEntries(Object.entries(speedMap).map(([k, v]) => [v, k]));

        let isDipSwitchUpdating = false; // スイッチ操作による再帰呼び出しを防ぐフラグ

        // にじみ効果のスタイルを動的に更新する
        const dynamicGlowStyle = document.getElementById('dynamic-glow-style');

        function applyTheme(themeName) {

        // --- 画面効果の管理 ---

        function applyEffect(effectName, isActive) {
            const monitorChassis = document.querySelector('.monitor-chassis');
            const monitorScreen = document.querySelector('.monitor-screen');
            const terminalElement = document.getElementById('terminal');

            switch (effectName) {
                case 'bezel':
                    monitorChassis.classList.toggle('bezel-off', !isActive);

                case 'blur':
                    terminalElement.classList.toggle('blur-effect', isActive);
                    break;
                case 'scanline':
                    monitorScreen.classList.toggle('scanline-effect', isActive);
                    break;
            }
        }

        function toggleEffect(effectName) {
            // 状態を反転
            effectStates[effectName] = !effectStates[effectName];

            applyEffect(effectName, effectStates[effectName]);
            // localStorageに保存
            localStorage.setItem('effectStates', JSON.stringify(effectStates));

        // DIPスイッチの状態を更新するヘルパー関数
        function updateDipSwitches(groupName, value) {
            let numericValue;
            if (groupName === 'theme') {
                numericValue = themeMap[value];
            } else if (groupName === 'font') {
                numericValue = fontMap[value];
            } else if (groupName === 'speed') {
                numericValue = speedMap[value];
            } else if (groupName === 'effect') {
                // エフェクトはビットごとのON/OFFなので特別扱い
                const switches = document.querySelectorAll(`.dip-switch-group[data-group="effect"] input[type="checkbox"]`);
                switches.forEach(sw => {
                    const effectName = Object.keys(effectMap).find(key => effectMap[key] === parseInt(sw.dataset.bit));
                    sw.checked = effectStates[effectName];
                });
                return;
            }

            if (numericValue === undefined) return;

            const switches = document.querySelectorAll(`.dip-switch-group[data-group="${groupName}"] input[type="checkbox"]`);
            switches.forEach(sw => {
                const bit = parseInt(sw.dataset.bit);
                sw.checked = (numericValue & (1 << bit)) !== 0;
            });
        }

        // ターミナルのレイアウトを更新する関数
        function updateTerminalLayout() {
            const chassis = document.querySelector('.monitor-chassis');
            const screenContainer = document.querySelector('.monitor-screen');
            const terminalContainer = document.getElementById('terminal');
            const isMobile = window.matchMedia("(max-width: 992px)").matches;
            const isFullscreen = chassis.classList.contains('fullscreen');

            // フルスクリーンでない場合は、コンテナの幅をリセットして通常表示に戻す
            if (!isFullscreen) {
                screenContainer.style.width = '';
            }

            if (isMobile) {
                // モバイル端末では、コンテナの幅に合わせてターミナルの桁数を自動調整します。
                try {
                    fitAddon.fit();
                } catch (e) {
                    console.error("fitAddon.fit() failed:", e);
                }
            } else if (isFullscreen) {
                // デスクトップのフルスクリーンモード
                if (term.renderer && term.renderer.dimensions && term.renderer.dimensions.actualCellHeight > 0) {
                    const cellHeight = term.renderer.dimensions.actualCellHeight;
                    const cellWidth = term.renderer.dimensions.actualCellWidth;

                    // 1. ターミナルの高さを計算
                    const fkeys = document.getElementById('function-keys-container');
                    const fkeysHeight = fkeys.offsetHeight;
                    const fkeysMargin = parseFloat(window.getComputedStyle(fkeys).marginTop);
                    const screenStyle = window.getComputedStyle(screenContainer);
                    const screenPaddingVertical = parseFloat(screenStyle.paddingTop) + parseFloat(screenStyle.paddingBottom);
                    const availableHeightForTerm = window.innerHeight - fkeysHeight - fkeysMargin - screenPaddingVertical;
                    const newRows = Math.floor(availableHeightForTerm / cellHeight);

                    // 2. ターミナルの幅を計算してコンテナに設定
                    const termWidth = 80 * cellWidth;
                    const screenPaddingHorizontal = parseFloat(screenStyle.paddingLeft) + parseFloat(screenStyle.paddingRight);
                    screenContainer.style.width = `${termWidth + screenPaddingHorizontal}px`;

                    // 3. xtermをリサイズ
                    term.resize(80, newRows);
                } else {
                    // レンダラが準備できていない場合、少し待ってから再試行
                    setTimeout(updateTerminalLayout, 50);
                }
            } else {
                // デスクトップの通常表示では、伝統的な80x25のサイズに固定します。
                term.resize(80, 25);
            }
        }

        // リサイズイベントを効率化するデバウンス関数
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // ANSIコード挿入処理
        ansiControls.addEventListener('click', (e) => {
            if (e.target.tagName === 'BUTTON' && e.target.dataset.sequence) {
                const sequenceCode = e.target.dataset.sequence;
                const startSequence = '\x1b' + sequenceCode;
                const endSequence = '\x1b[0m'; // 基本的にリセットシーケンスで閉じる
                const textarea = multilineEditorInput;
                const start = textarea.selectionStart;
                const end = textarea.selectionEnd;
                const text = textarea.value;
                const selectedText = text.substring(start, end);

                let newText;
                let newStart;
                let newEnd;

                // リセットボタンの場合は、選択範囲があっても単純挿入
                if (sequenceCode === '[0m') {
                    newText = text.substring(0, start) + startSequence + text.substring(end);
                    newStart = start + startSequence.length;
                    newEnd = newStart;
                } else if (selectedText) {
                    // テキストが選択されている場合、選択範囲を囲む
                    const replacement = startSequence + selectedText + endSequence;
                    newText = text.substring(0, start) + replacement + text.substring(end);
                    newStart = start; // 変更後の選択範囲の開始位置
                    newEnd = start + replacement.length; // 変更後の選択範囲の終了位置
                } else {
                    // テキストが選択されていない場合（カーソル位置に挿入）
                    newText = text.substring(0, start) + startSequence + text.substring(end);
                    newStart = start + startSequence.length;
                    newEnd = newStart;
                }

                textarea.value = newText;
                textarea.selectionStart = newStart;
                textarea.selectionEnd = newEnd;
                textarea.focus();
            }
        });

        function openLineEditor() {

            lineEditorOverlay.classList.add('visible');

                // 履歴に追加（最後の履歴と重複しない場合）
                if (lineEditorHistory.length === 0 || lineEditorHistory[lineEditorHistory.length - 1] !== textToInsert) {
                    lineEditorHistory.push(textToInsert);
                }
                // サーバーの入力バッファに送る
                socket.emit('client_input', textToInsert);
            }
            closeLineEditor();
        });

        lineEditorInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault(); // フォームの送信を防ぐ
                lineEditorInsertBtn.click();
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (historyIndex > 0) {
                    historyIndex--;
                    lineEditorInput.value = lineEditorHistory[historyIndex];
                }
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (historyIndex < lineEditorHistory.length - 1) {
                    historyIndex++;
                    lineEditorInput.value = lineEditorHistory[historyIndex];
                } else if (historyIndex === lineEditorHistory.length - 1) {
                    historyIndex++;
                    lineEditorInput.value = ''; // 履歴の末尾の次は新しい入力
                }
            }
        });

            if (definition) {

                if (definition.action === 'open_popup') {

                } else if (definition.action === 'send_command') {
                    key.addEventListener('click', () => {

                    monitorScreen.style.paddingBottom = `${controlsHeight}px`;
                } else { // 'l' for hide
                    mobileControls.classList.remove('visible');
                    monitorScreen.style.paddingBottom = '';
                }
                data = data.replace(bbsEntryControlPattern, '');
                updateTerminalLayout();
            }

            // Top Menuコントロール表示/非表示シーケンスをチェック
            const topMenuControlPattern = /\x1b\[\?2031(h|l)/;
            const topMenuMatch = data.match(topMenuControlPattern);
            if (topMenuMatch) {
                const mobileControls = document.getElementById('mobile-top-menu-controls');
                const monitorScreen = document.querySelector('.monitor-screen');

                if (topMenuMatch[1] === 'h') { // 'h' for show
                    mobileControls.classList.add('visible');

                    monitorScreen.style.paddingBottom = `${controlsHeight}px`;

                    mobileControls.classList.remove('visible');
                    monitorScreen.style.paddingBottom = '';
                }
                data = data.replace(topMenuControlPattern, '');
                updateTerminalLayout();
            }

            // BBSコントロール表示/非表示シーケンスをチェック
            const bbsControlPattern = /\x1b\[\?2024(h|l)/;
            const match = data.match(bbsControlPattern);
            if (match) {
                const mobileControls = document.getElementById('mobile-bbs-controls');
                const monitorScreen = document.querySelector('.monitor-screen');

                if (match[1] === 'h') { // 'h' for show (表示)
                    mobileControls.classList.add('visible');

                    monitorScreen.style.paddingBottom = `${controlsHeight}px`;
                } else { // 'l' for hide (非表示)
                    mobileControls.classList.remove('visible');
                    // padding-bottomを元に戻す (CSSで定義された値に戻る)
                    monitorScreen.style.paddingBottom = '';
                }
                // シーケンス自体はターミナルに表示しない
                data = data.replace(bbsControlPattern, '');
                // レイアウト変更後にターミナルのサイズを再計算
                updateTerminalLayout();
            }
            // ファイルダウンロードシーケンス
            const downloadPattern = /\x1b_GRBBS_DOWNLOAD;(.*?)\x1b\\/;

                const url = downloadMatch[1];

    <script>
        // --- Passkey (WebAuthn) 関連のヘルパー関数 ---

        /**
         * Base64URL文字列をArrayBufferに変換します。
         * @param {string} base64urlString
         * @returns {ArrayBuffer}
         */
        function base64urlToBuffer(base64urlString) {
            const base64 = base64urlString.replace(/-/g, '+').replace(/_/g, '/');
            const rawData = window.atob(base64);
            const outputArray = new Uint8Array(rawData.length);
            for (let i = 0; i < rawData.length; ++i) {
                outputArray[i] = rawData.charCodeAt(i);
            }
            return outputArray.buffer;
        }

        /**
         * ArrayBufferをBase64URL文字列に変換します。
         * @param {ArrayBuffer} buffer
         * @returns {string}
         */
        function bufferToBase64url(buffer) {
            const bytes = new Uint8Array(buffer);
            let str = '';
            for (const charCode of bytes) {
                str += String.fromCharCode(charCode);
            }
            const base64 = window.btoa(str);
            return base64.replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
        }
    </script>

    <script>
        // --- Passkey (WebAuthn) メインロジック ---

        /**
         * 新しいPasskeyの登録フローを開始します。
         */
        async function registerNewPasskey() {
            // 1. サーバーから登録オプションを取得
            let options;
            try {
                const resp = await fetch('/passkey/register-options', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                });
                options = await resp.json();
            } catch (e) {
                alert(`Could not get registration options: ${e}`);
                return;
            }

            // 2. サーバーから受け取ったBase64URL文字列をArrayBufferに変換
            options.challenge = base64urlToBuffer(options.challenge);
            options.user.id = base64urlToBuffer(options.user.id);
            if (options.excludeCredentials) {
                for (let cred of options.excludeCredentials) {
                    cred.id = base64urlToBuffer(cred.id);
                }
            }

            // 3. ブラウザのAPIを呼び出して、生体認証などを要求
            let credential;
            try {
                credential = await navigator.credentials.create({
                    publicKey: options
                });
            } catch (e) {
                if (e.name === "NotAllowedError") {
                    alert("Passkeyの登録がキャンセルされたか、許可されませんでした。\n\n" +
                        "・操作をキャンセルした場合、このメッセージは正常です。\n" +
                        "・このデバイスに既にこのサイトのPasskeyが登録されている場合、一度削除してから再試行する必要があるかもしれません。");
                } else {
                    alert(`Could not create credential: ${e}`);
                }
                return;
            }

            // 4. ユーザーにこのキーのニックネームを尋ねる
            const nickname = prompt("このPasskeyのニックネームを入力してください (例: 私のiPhone, 仕事用PCなど):", "My Passkey");
            if (!nickname) {
                alert("登録をキャンセルしました。");
                return;
            }

            // 5. サーバーに送るために、ArrayBufferをBase64URL文字列に戻す
            const attestationResponse = {
                id: credential.id,
                rawId: bufferToBase64url(credential.rawId),
                response: {
                    clientDataJSON: bufferToBase64url(credential.response.clientDataJSON),
                    attestationObject: bufferToBase64url(credential.response.attestationObject),
                },
                type: credential.type,
            };

            // 6. サーバーに検証をリクエスト
            try {
                const verificationResp = await fetch('/passkey/verify-registration', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        credential: attestationResponse,
                        nickname: nickname
                    }),
                });
                const verificationJSON = await verificationResp.json();
                if (verificationJSON && verificationJSON.verified) {
                    alert("Passkeyの登録に成功しました！");
                } else {
                    throw new Error(verificationJSON.error || "Verification failed.");
                }
            } catch (e) {
                alert(`Error during verification: ${e.message}`);
            }
        }
    </script>

                    else if (definition.action === 'open_multiline_editor') { openMultilineEditor(); }
                    else if (definition.action === 'open_log_viewer') { openLogViewer(); }
                    else if (definition.action === 'redirect') { window.location.href = definition.value; }

                    closeNav(); // メニュー項目をクリックしたらメニューを閉じる
                });
                sidenav.appendChild(link);
            }
        });
    </script>
    <script>
        // --- Push Notification Logic ---
        document.addEventListener('DOMContentLoaded', () => {
            const vapidPublicKey = '{{ vapid_public_key }}';
            const enablePushButton = document.getElementById('enable-push-btn');
            const pushStatus = document.getElementById('push-status');

            if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
                if (pushStatus) {
                    pushStatus.textContent = 'Push Notifications are not supported by this browser.';
                }
                if (enablePushButton) {
                    enablePushButton.disabled = true;
                }
                return;
            }

            function urlBase64ToUint8Array(base64String) {
                const padding = '='.repeat((4 - base64String.length % 4) % 4);
                const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
                const rawData = window.atob(base64);
                const outputArray = new Uint8Array(rawData.length);
                for (let i = 0; i < rawData.length; ++i) {
                    outputArray[i] = rawData.charCodeAt(i);
                }
                return outputArray;
            }

            async function subscribeUser() {
                try {
                    const registration = await navigator.serviceWorker.ready;
                    const subscription = await registration.pushManager.subscribe({
                        userVisibleOnly: true,
                        applicationServerKey: urlBase64ToUint8Array(vapidPublicKey)
                    });

                    // 宛先情報をバックエンドに送信
                    await fetch('/push/subscribe', {
                        method: 'POST',
                        body: JSON.stringify(subscription),
                        headers: { 'Content-Type': 'application/json' }
                    });

                } catch (err) {
                    console.error('Failed to subscribe the user: ', err);
                    let errorMessage = 'Failed to enable push notifications.';
                    if (Notification.permission === 'denied') {
                        errorMessage = 'ブラウザの通知がブロックされています。設定を確認してください。';
                    } else if (err.name === 'NotAllowedError') {
                        errorMessage = '通知の許可が得られませんでした。';
                    } else if (err.message) {
                        // より詳細なエラー情報を表示
                        errorMessage += ` (${err.name}: ${err.message})`;
                    }
                    pushStatus.textContent = errorMessage;
                }
                updatePushButton();
            }

            async function unsubscribeUser() {
                try {
                    const registration = await navigator.serviceWorker.ready;
                    const subscription = await registration.pushManager.getSubscription();
                    if (subscription) {
                        // サーバーに購読解除を通知
                        await fetch('/push/unsubscribe', {
                            method: 'POST',
                            body: JSON.stringify({ endpoint: subscription.endpoint }),
                            headers: { 'Content-Type': 'application/json' }
                        });
                        await subscription.unsubscribe();
                    }
                } catch (err) {
                    console.error('Error unsubscribing', err);
                    pushStatus.textContent = 'Failed to disable notifications.';
                }
                updatePushButton();
            }

            async function updatePushButton() {
                const registration = await navigator.serviceWorker.ready;
                const subscription = await registration.pushManager.getSubscription();

                enablePushButton.removeEventListener('click', subscribeUser);
                enablePushButton.removeEventListener('click', unsubscribeUser);

                if (subscription) {
                    pushStatus.textContent = 'Push notifications are enabled.';
                    enablePushButton.textContent = 'Disable Notifications';
                    enablePushButton.addEventListener('click', unsubscribeUser);
                } else {
                    pushStatus.textContent = '';
                    enablePushButton.textContent = 'Enable Notifications';
                    enablePushButton.addEventListener('click', subscribeUser);
                }
                enablePushButton.disabled = false;
            }

            updatePushButton();
        });
    </script>
