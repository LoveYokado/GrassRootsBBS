<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>GR-BBS Web Terminal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm/css/xterm.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+1m:wght@400&display=swap" rel="stylesheet">
    <style>
        body,
        html {
            height: 100%;
            /* ページ全体をビューポートの高さに */
            margin: 0;
            background-color: #282c34;
            /* 背景色を少し明るく */
            display: flex;
            /* Flexboxを使って中央揃え */
            align-items: center;
            justify-content: center;
        }

        .terminal-container {
            padding: 15px;
            background-color: #000;
            border-radius: 5px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid #444;
        }

        #theme-selector {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 100;
        }

        #speed-selector {
            position: fixed;
            top: 40px;
            right: 10px;
            z-index: 100;
            display: flex;
            flex-direction: column;
        }

        #speed-selector button,
        #theme-selector button {
            background-color: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 5px 10px;
            cursor: pointer;
            margin-left: 5px;
            margin-top: 5px;
        }

        #terminal {
            /* サイズはxterm.jsが管理するため、CSSでの指定は不要 */
        }
    </style>
</head>

<body>
    <div id="theme-selector">
        <button data-theme="default">Default</button>
        <button data-theme="green">Green</button>
        <button data-theme="amber">Amber</button>
    </div>
    <div id="speed-selector">
        <button data-speed="full">Full</button>
        <button data-speed="9600">9600bps</button>
        <button data-speed="4800">4800bps</button>
        <button data-speed="2400">2400bps</button>
        <button data-speed="300">300bps</button>
    </div>

    <div class="terminal-container">
        <div id="terminal"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xterm/lib/xterm.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <script>
        const themes = {
            default: {
                background: '#000000',
                foreground: '#FFFFFF',
                cursor: '#FFFFFF',
            },
            green: {
                background: '#000000',
                foreground: '#00FF00',
                cursor: '#00FF00',
            },
            amber: {
                background: '#1a1000',
                foreground: '#FFB000',
                cursor: '#FFB000',
            }
        };

        function applyTheme(themeName) {
            const theme = themes[themeName] || themes.default;
            term.options.theme = theme;
            localStorage.setItem('terminalTheme', themeName); // 選択を保存
        }

        function applySpeed(speedName) {
            // サーバに速度設定を通知
            socket.emit('set_speed', speedName);
            localStorage.setItem('terminalSpeed', speedName); // 選択を保存
        }

        const term = new Terminal({
            cols: 80, // 幅を80文字に固定
            rows: 25, // 高さを25行に固定
            cursorBlink: true,
            fontFamily: '"M+ 1m", "Courier New", monospace',
            fontSize: 16, // 固定サイズなので少し見やすく
        });

        term.open(document.getElementById('terminal'));

        const socket = io();

        // 初期テーマの適用
        const savedTheme = localStorage.getItem('terminalTheme') || 'default';

        // 初期速度の適用
        const savedSpeed = localStorage.getItem('terminalSpeed') || 'full';

        // ボタンにイベントリスナーを設定
        document.getElementById('theme-selector').addEventListener('click', (e) => {
            if (e.target.tagName === 'BUTTON') {
                applyTheme(e.target.dataset.theme);
            }
        });

        document.getElementById('speed-selector').addEventListener('click', (e) => {
            if (e.target.tagName === 'BUTTON') {
                applySpeed(e.target.dataset.speed);
            }
        });

        term.onData(data => {
            socket.emit('client_input', data);
        });

        socket.on('server_output', data => {
            term.write(data);
        });

        // サーバーからの切断要求を処理
        socket.on('force_disconnect', (data) => {
            // サーバーから送られてきたメッセージを表示する
            const message = (data && data.message) ? data.message : '[Connection closed by server]';
            term.writeln('\r\n\n' + message);
            socket.disconnect();
        });

        socket.on('connect', () => {
            // 接続が確立したら、保存されている設定をサーバに送信
            applyTheme(savedTheme);
            applySpeed(savedSpeed);
        });
    </script>
</body>

</html>
