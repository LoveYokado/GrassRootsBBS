services:
  grassrootsbbs:
    build: .
    ports:
      - "5000:5000" # WebApp (ホストの5000番ポートをコンテナの5000番ポートにマッピング)
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      # .sshkey ボリュームは不要になったため削除
    env_file:
      - .env # .env 必ず先に管理者IDとパスワードを設定してください。
    restart: unless-stopped

# sshwiftyサービスは不要になったため削除