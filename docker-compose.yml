services:
  grassrootsbbs:
    build: .
    # Nginx経由でアクセスするため、直接ポートを公開する必要はなくなります
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs # アプリケーションログを永続化
      - ./src:/app/src # 開発用にソースコードをマウント
      - ./private_key.pem:/app/private_key.pem:ro # 秘密鍵を読み取り専用でマウント
      - ./public_key.pem:/app/public_key.pem:ro # 公開鍵を読み取り専用でマウント
      - ./templates:/app/templates # テンプレートファイルをマウント
      - ./static:/app/static # 静的ファイルをマウント
    ports:
      - "8183:5000"
    environment:
      # DBのホスト名をコンテナ名で指定
      - DB_HOST=mariadb
      # Redisのホスト名をコンテナ名で指定
      - REDIS_URL=redis://redis:6379/0
      # Socket.IOが許可するオリジンを指定
      - SOCKETIO_ALLOWED_ORIGINS=https://grbbs.midyuki.net
    env_file:
      - .env # .env 必ず先に管理者IDとパスワードを設定してください。
    depends_on: # depends_onを詳細設定に変更
      mariadb:
        condition: service_healthy # mariadbのhealthcheckが成功するまで待機
      redis:
        condition: service_started # redisは起動するだけでOK
    restart: unless-stopped

  mariadb:
    image: mariadb:10.6 # 特定のバージョンを指定することを推奨
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
        # ユーザーとパスワードを指定して接続をテスト
        test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost", "-u${DB_USER}", "-p${DB_PASSWORD}"]
        interval: 10s # 10秒ごとにチェック
        timeout: 5s   # 5秒でタイムアウト
        retries: 5    # 5回リトライ

  redis:
    image: "redis:alpine"
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  redis_data:
  mariadb_data:
